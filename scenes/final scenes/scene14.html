<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stoicism Visual Engine VIII — 20 Cinematic Scenes</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Georgia', serif; }
        #stage { position: fixed; top: 0; left: 0; right: 0; bottom: 110px; display: flex; align-items: center; justify-content: center; background: #000; }
        #wrapper { position: relative; transform-origin: center center; }
        #wrapper canvas { position: absolute; top: 0; left: 0; width: 1920px; height: 1080px; display: none; }
        #wrapper canvas.active { display: block; }
        #panel { position: fixed; bottom: 0; left: 0; right: 0; height: 110px; background: rgba(2,2,4,0.98); border-top: 1px solid rgba(255,255,255,0.06); display: flex; flex-direction: column; padding: 0 20px; backdrop-filter: blur(20px); }
        #progress-wrap { height: 3px; width: 100%; background: rgba(255,255,255,0.05); position: relative; cursor: pointer; flex-shrink: 0; }
        #progress-fill { height: 100%; background: linear-gradient(90deg,#e8b86d,#f0d080,#c8903a); width: 0%; transition: width 0.25s linear; position: relative; }
        #progress-fill::after { content:''; position: absolute; right:-5px; top:-4px; width:11px; height:11px; border-radius:50%; background:#e8b86d; box-shadow:0 0 12px #e8b86d88; }
        #controls { display: flex; align-items: center; gap: 14px; padding: 8px 0 4px; flex-shrink: 0; }
        #playbtn { width:44px; height:44px; border-radius:50%; border:1px solid rgba(232,184,109,0.45); background:rgba(232,184,109,0.07); color:#e8b86d; font-size:17px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .2s; flex-shrink:0; }
        #playbtn:hover { background:rgba(232,184,109,0.18); border-color:#e8b86d; }
        .navbtn { width:34px; height:34px; border-radius:50%; border:1px solid rgba(255,255,255,0.1); background:transparent; color:rgba(255,255,255,0.45); font-size:13px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .2s; flex-shrink:0; }
        .navbtn:hover { border-color:rgba(255,255,255,0.3); color:#fff; }
        #scene-info { display:flex; flex-direction:column; gap:2px; margin-right:auto; }
        #scene-name { font-size:13px; color:rgba(255,255,255,0.82); letter-spacing:.04em; }
        #scene-sub { font-size:10px; color:rgba(255,255,255,0.22); letter-spacing:.1em; text-transform:uppercase; }
        #timer-wrap { display:flex; align-items:center; gap:8px; flex-shrink:0; }
        #timer-display { font-size:12px; color:rgba(255,255,255,0.3); letter-spacing:.08em; font-variant-numeric:tabular-nums; }
        #speed-btn { padding:4px 11px; border-radius:3px; border:1px solid rgba(255,255,255,0.1); background:transparent; color:rgba(255,255,255,0.3); font-size:11px; cursor:pointer; transition:all .2s; }
        #speed-btn:hover { border-color:rgba(255,255,255,0.28); color:rgba(255,255,255,0.65); }
        #strip-wrap { overflow-x:auto; flex:1; padding:5px 0 8px; scrollbar-width:none; }
        #strip-wrap::-webkit-scrollbar { display:none; }
        #strip { display:flex; gap:7px; align-items:center; min-width:max-content; }
        .thumb { flex-shrink:0; width:90px; height:42px; border-radius:5px; border:1px solid rgba(255,255,255,0.07); background:rgba(255,255,255,0.03); cursor:pointer; transition:all .15s; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; position:relative; overflow:hidden; }
        .thumb:hover { border-color:rgba(255,255,255,0.22); background:rgba(255,255,255,0.07); }
        .thumb.active { border-color:#e8b86d; background:rgba(232,184,109,0.08); }
        .thumb .tnum { font-size:9px; color:rgba(255,255,255,0.2); letter-spacing:.08em; }
        .thumb .tname { font-size:9px; color:rgba(255,255,255,0.5); text-align:center; line-height:1.25; padding:0 5px; }
        .thumb.active .tname { color:#e8b86d; }
        .thumb .tbar { position:absolute; bottom:0; left:0; height:2px; background:linear-gradient(90deg,#e8b86d,#f0d080); width:0%; }
    </style>
</head>
<body>
    <div id="stage"><div id="wrapper"></div></div>
    <div id="panel">
        <div id="progress-wrap" onclick="seekClick(event)"><div id="progress-fill"></div></div>
        <div id="controls">
            <button class="navbtn" onclick="prev()">&#9664;</button>
            <button id="playbtn" onclick="togglePlay()">&#9654;</button>
            <button class="navbtn" onclick="next()">&#9654;&#9654;</button>
            <div id="scene-info">
                <div id="scene-name">Loading…</div>
                <div id="scene-sub">Cinematic Series VIII · 1920×1080</div>
            </div>
            <div id="timer-wrap">
                <div id="timer-display">0:00 / 0:00</div>
                <button id="speed-btn" onclick="cycleSpeed()">1×</button>
            </div>
        </div>
        <div id="strip-wrap"><div id="strip"></div></div>
    </div>
<script>
const W=1920,H=1080;
const SCENES=[
    {name:'Tide Before Storm',      sub:'The sea pulls back before it strikes',       dur:30},
    {name:'Single Feather Fall',    sub:'No wind. No hurry. Perfect arc.',            dur:30},
    {name:'Moon Through Pines',     sub:'Light that asks nothing of the branches',    dur:30},
    {name:'Old Well at Dusk',       sub:'Depth has always been there, waiting',       dur:30},
    {name:'Hawk Thermal Rise',      sub:'Effort stops. Patience does the climbing.',  dur:30},
    {name:'Temple Bell at Dawn',    sub:'The sound fills what was empty all along',   dur:30},
    {name:'River Bends Past Rock',  sub:'Force finds way around, not through',   dur:30},
    {name:'First Snow on Embers',   sub:'Two truths meeting without conflict',        dur:30},
    {name:'Cuttlefish Camouflage',  sub:'The self can be worn lightly',               dur:30},
    {name:'Old Bridge in Flood',    sub:'Built for this. Tested now. Still here.',    dur:30},
    {name:'Burning Arrow Arc',      sub:'Released. The rest is not your task.',       dur:30},
    {name:'Aurora Over Frozen Lake',sub:'The sky has always done this alone',         dur:30},
    {name:'Tortoise on Lava Field', sub:'Unhurried crossing of difficult ground',     dur:30},
    {name:'Smoke Signal at Dusk',   sub:'One column. Clear intention. Silence after.',dur:30},
    {name:'Beehive at Noon',        sub:'Purpose so complete it needs no name',       dur:30},
    {name:'Sea Stack at High Tide', sub:'Isolated. Unmoved. Enough.',                 dur:30},
    {name:'Caterpillar on Branch',  sub:'No sense of wings. Perfect faith.',      dur:30},
    {name:'Monastery at Snowfall',  sub:'Practice continues through all weather',     dur:30},
    {name:'Tidal Wave on Horizon',  sub:'It comes. You can see it. You stand.',       dur:30},
    {name:'Last Ember of Day',      sub:'The long light going. Still warm. Still.',   dur:30},
];

const SPEEDS=[1,1.5,2,0.5];
let speedIdx=0,cur=0,playing=false,sT=0,frameT=0;
const FPS=60;const ctxs=[];

const wrapper=document.getElementById('wrapper');
wrapper.style.width=W+'px';wrapper.style.height=H+'px';
for(let i=0;i<SCENES.length;i++){
    const c=document.createElement('canvas');
    c.width=W;c.height=H;c.id='cv'+i;
    wrapper.appendChild(c);ctxs.push(c.getContext('2d'));
}
function scaleStage(){
    const st=document.getElementById('stage');
    const s=Math.min(st.clientWidth/W,st.clientHeight/H);
    wrapper.style.transform=`scale(${s})`;
    wrapper.style.marginLeft=((st.clientWidth-W*s)/2)+'px';
    wrapper.style.marginTop=((st.clientHeight-H*s)/2)+'px';
}
window.addEventListener('resize',scaleStage);scaleStage();

const strip=document.getElementById('strip');
SCENES.forEach((sc,i)=>{
    const d=document.createElement('div');
    d.className='thumb'+(i===0?' active':'');d.id='th'+i;
    d.innerHTML=`<div class="tnum">${String(i+1).padStart(2,'0')}</div><div class="tname">${sc.name}</div><div class="tbar" id="tb${i}"></div>`;
    d.onclick=()=>goTo(i);strip.appendChild(d);
});
function goTo(i){
    document.getElementById('cv'+cur).classList.remove('active');
    document.getElementById('th'+cur).classList.remove('active');
    document.getElementById('tb'+cur).style.width='0%';
    cur=i;sT=0;
    document.getElementById('cv'+i).classList.add('active');
    document.getElementById('th'+i).classList.add('active');
    document.getElementById('scene-name').textContent=SCENES[i].name;
    document.getElementById('th'+i).scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
}
function prev(){if(cur>0)goTo(cur-1);}
function next(){if(cur<SCENES.length-1)goTo(cur+1);}
function togglePlay(){playing=!playing;document.getElementById('playbtn').innerHTML=playing?'&#9646;&#9646;':'&#9654;';}
function cycleSpeed(){speedIdx=(speedIdx+1)%SPEEDS.length;document.getElementById('speed-btn').textContent=SPEEDS[speedIdx]+'×';}
function seekClick(e){
    const rect=e.currentTarget.getBoundingClientRect();const pct=(e.clientX-rect.left)/rect.width;
    const tot=SCENES.reduce((a,s)=>a+s.dur,0);let acc=0,tgt=pct*tot;
    for(let i=0;i<SCENES.length;i++){if(acc+SCENES[i].dur>=tgt){goTo(i);sT=Math.floor((tgt-acc)*FPS/SPEEDS[speedIdx]);break;}acc+=SCENES[i].dur;}
}
function fmt(s){return Math.floor(s/60)+':'+(s%60<10?'0':'')+s%60;}

function masterLoop(){
    requestAnimationFrame(masterLoop);frameT++;
    const sc=SCENES[cur];const tot=sc.dur*FPS/SPEEDS[speedIdx];
    if(playing){sT++;if(sT>=tot){if(cur<SCENES.length-1)goTo(cur+1);else{playing=false;document.getElementById('playbtn').innerHTML='&#9654;';}}}
    R[cur](frameT,sT,tot);
    const pct=Math.min(1,sT/tot)*100;
    document.getElementById('tb'+cur).style.width=pct+'%';
    const el=Math.floor(sT/FPS*SPEEDS[speedIdx]);
    document.getElementById('timer-display').textContent=fmt(el)+' / '+fmt(sc.dur);
    const totD=SCENES.reduce((a,s)=>a+s.dur,0);
    const doneD=SCENES.slice(0,cur).reduce((a,s)=>a+s.dur,0)+el;
    document.getElementById('progress-fill').style.width=(doneD/totD*100)+'%';
}

const L=(a,b,t)=>a+(b-a)*t;
const rnd=(a,b)=>a+Math.random()*(b-a);
const ei=(t)=>t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;
const R=[];

/* ═══ 0 · TIDE BEFORE STORM ═══════════
   The ocean pulls impossibly far back —
   exposing ancient seabed — then nothing.
   Then the wall.
══════════════════════════════════════ */
(()=>{
    const seafloorRocks=Array.from({length:40},()=>({x:rnd(0,W),y:rnd(H*0.55,H*0.88),r:rnd(5,30),hue:rnd(20,45)}));
    const foamStrands=Array.from({length:25},(_,i)=>({x:i*(W/24),ph:Math.random()*Math.PI*2}));
    R[0]=(gt,st,tot)=>{
        const cx=ctxs[0];const p=ei(st/tot);
        cx.fillStyle='rgba(3,4,6,0.2)';cx.fillRect(0,0,W,H);
        // sky — green-yellow storm light, the famous pre-tsunami color
        const skyG=cx.createLinearGradient(0,0,0,H*0.5);
        skyG.addColorStop(0,`rgba(${Math.floor(L(12,35,p))},${Math.floor(L(14,32,p))},${Math.floor(L(8,12,p))},0.6)`);
        skyG.addColorStop(0.5,`rgba(${Math.floor(L(35,80,p))},${Math.floor(L(40,75,p))},${Math.floor(L(12,18,p))},0.4)`);
        skyG.addColorStop(1,'rgba(0,0,0,0)');
        cx.fillStyle=skyG;cx.fillRect(0,0,W,H*0.5);
        // storm clouds building on horizon
        for(let i=0;i<8;i++){
            const ccx=W*(0.06+i*0.12);const ccy=H*(0.08+i%3*0.06);
            const cg=cx.createRadialGradient(ccx,ccy,0,ccx,ccy,W*0.12);
            cg.addColorStop(0,`rgba(${Math.floor(L(28,15,p))},${Math.floor(L(28,14,p))},${Math.floor(L(22,10,p))},${0.3+p*0.2})`);
            cg.addColorStop(1,'rgba(0,0,0,0)');
            cx.fillStyle=cg;cx.fillRect(0,0,W,H*0.5);
        }
        // the water RETREATING — waterline rises (goes further back) as p increases
        const waterY=H*(0.42+p*0.36);
        // exposed seabed
        if(p>0.1){
            const bedG=cx.createLinearGradient(0,H*0.42,0,waterY);
            bedG.addColorStop(0,`rgba(${Math.floor(L(55,65,p))},${Math.floor(L(50,58,p))},${Math.floor(L(38,44,p))},0.9)`);
            bedG.addColorStop(1,`rgba(${Math.floor(L(40,50,p))},${Math.floor(L(35,44,p))},${Math.floor(L(25,32,p))},0.95)`);
            cx.fillStyle=bedG;cx.fillRect(0,H*0.42,W,waterY-H*0.42);
            // wet sand texture, rocks and shells exposed
            seafloorRocks.forEach(r=>{
                if(r.y>waterY){cx.beginPath();cx.ellipse(r.x,r.y,r.r*1.4,r.r*0.6,rnd(0,Math.PI),0,Math.PI*2);
                cx.fillStyle=`hsla(${r.hue},28%,${28+Math.floor(rnd(0,12))}%,0.8)`;cx.fill();}
            });
            // stranded fish, shells reflecting wet
            for(let i=0;i<20;i++){
                const sx=((i*337)%W),sy=H*0.45+((i*197)%(waterY-H*0.45));
                cx.beginPath();cx.ellipse(sx,sy,rnd(4,12),rnd(2,5),rnd(0,Math.PI),0,Math.PI*2);
                cx.fillStyle=`rgba(180,170,150,${0.1+Math.sin(gt*0.04+i)*0.04})`;cx.fill();
            }
        }
        // retreating water surface
        cx.beginPath();cx.moveTo(0,H);
        for(let x=0;x<=W;x+=10)cx.lineTo(x,waterY+Math.sin(x*0.005+gt*0.025)*12);
        cx.lineTo(W,H);cx.closePath();
        const wgr=cx.createLinearGradient(0,waterY,0,H);
        wgr.addColorStop(0,`rgba(${Math.floor(L(20,12,p))},${Math.floor(L(45,28,p))},${Math.floor(L(55,35,p))},0.85)`);
        wgr.addColorStop(1,'rgba(6,18,25,0.97)');
        cx.fillStyle=wgr;cx.fill();
        // foam strands at retreating waterline
        foamStrands.forEach(f=>{
            cx.beginPath();cx.ellipse(f.x,waterY+rnd(-3,3),rnd(20,60),rnd(3,8),0,0,Math.PI*2);
            cx.fillStyle=`rgba(210,225,235,${0.15+Math.sin(gt*0.04+f.ph)*0.08})`;cx.fill();
        });
        // far horizon — wall of dark water building (late scene)
        if(p>0.7){
            const wallH=(p-0.7)*H*0.6;const wallAl=(p-0.7)*1.4;
            const wallG=cx.createLinearGradient(0,H*0.12,0,H*0.12+wallH);
            wallG.addColorStop(0,`rgba(${Math.floor(L(8,5,p))},${Math.floor(L(22,14,p))},${Math.floor(L(35,22,p))},${wallAl*0.6})`);
            wallG.addColorStop(0.3,`rgba(5,18,28,${wallAl*0.9})`);
            wallG.addColorStop(1,`rgba(2,8,15,${wallAl*0.4})`);
            cx.fillStyle=wallG;cx.fillRect(0,H*0.12,W,wallH);
            // white crest of wave
            cx.beginPath();cx.moveTo(0,H*0.12+wallH);
            for(let x=0;x<=W;x+=8)cx.lineTo(x,H*0.12+wallH+Math.sin(x*0.008+gt*0.04)*14);
            cx.strokeStyle=`rgba(220,235,245,${wallAl*0.5})`;cx.lineWidth=3;cx.stroke();
        }
    };
})();

/* ═══ 1 · SINGLE FEATHER FALL ══════════
   One white feather. No wind.
   A perfect silent arc through dark air.
══════════════════════════════════════ */
(()=>{
    R[1]=(gt,st,tot)=>{
        const cx=ctxs[1];const p=ei(st/tot);
        cx.fillStyle='rgba(3,3,4,0.24)';cx.fillRect(0,0,W,H);
        // void — near black, slight warmth
        const vg=cx.createRadialGradient(W*0.5,H*0.5,0,W*0.5,H*0.5,W*0.6);
        vg.addColorStop(0,'rgba(12,10,8,0.3)');vg.addColorStop(1,'rgba(2,2,3,0.2)');
        cx.fillStyle=vg;cx.fillRect(0,0,W,H);
        // feather path — a graceful parabolic arc with gentle rotation
        const fallY=H*(-0.12)+p*H*1.25;// enters top, exits bottom
        const driftX=W*0.5+Math.sin(p*Math.PI*2.5)*W*0.12;// pendulum drift
        const tilt=Math.sin(p*Math.PI*3)*0.4+p*0.3;// rotating slowly
        // feather glow — very soft aura
        const fg=cx.createRadialGradient(driftX,fallY,0,driftX,fallY,90);
        fg.addColorStop(0,`rgba(255,252,245,${0.06+Math.sin(gt*0.02)*0.01})`);fg.addColorStop(1,'rgba(0,0,0,0)');
        cx.fillStyle=fg;cx.fillRect(driftX-95,fallY-95,190,190);
        // draw feather
        cx.save();cx.translate(driftX,fallY);cx.rotate(tilt);
        // rachis (central shaft)
        cx.beginPath();cx.moveTo(0,-55);cx.lineTo(0,55);
        cx.strokeStyle='rgba(240,238,232,0.88)';cx.lineWidth=1.8;cx.stroke();
        // barbs — left side
        for(let b=-10;b<=10;b++){
            const by=b*5.2;const bw=Math.sqrt(Math.max(0,55*55-by*by))*0.88;
            cx.beginPath();cx.moveTo(0,by);cx.quadraticCurveTo(-bw*0.55,by-bw*0.08,-bw,by+bw*0.12);
            cx.strokeStyle=`rgba(238,235,228,${0.65+Math.abs(b)*0.006})`;cx.lineWidth=0.9;cx.stroke();
            cx.beginPath();cx.moveTo(0,by);cx.quadraticCurveTo(bw*0.55,by-bw*0.08,bw,by+bw*0.12);
            cx.strokeStyle=`rgba(238,235,228,${0.65+Math.abs(b)*0.006})`;cx.lineWidth=0.9;cx.stroke();
        }
        // quill tip
        cx.beginPath();cx.moveTo(0,55);cx.quadraticCurveTo(4,68,1,80);
        cx.strokeStyle='rgba(220,215,205,0.5)';cx.lineWidth=1.5;cx.stroke();
        cx.restore();
        // very faint air current lines — the invisible made visible
        for(let i=0;i<6;i++){
            const lx=driftX+rnd(-120,120),ly=fallY+rnd(-60,60);
            cx.beginPath();cx.moveTo(lx,ly);cx.lineTo(lx+rnd(20,60),ly+rnd(-4,4));
            cx.strokeStyle=`rgba(180,175,168,${0.015+Math.sin(gt*0.03+i)*0.008})`;cx.lineWidth=0.6;cx.stroke();
        }
    };
})();

/* ═══ 2 · MOON THROUGH PINES ═══════════
   A full moon climbs through dark pines.
   The branches do not care. The light
   finds the gaps anyway.
══════════════════════════════════════ */
(()=>{
    const pines=Array.from({length:22},(_,i)=>({
        x:i*(W/21)+rnd(-25,25),h:rnd(H*0.35,H*0.78),
        spread:rnd(W*0.03,W*0.065),layers:Math.floor(rnd(4,9)),
        sway:rnd(0.002,0.005),ph:Math.random()*Math.PI*2
    }));
    const mist=Array.from({length:8},(_,i)=>({y:H*0.55+i*H*0.055,ph:i*0.6,amp:12+i*6}));
    R[2]=(gt,st,tot)=>{
        const cx=ctxs[2];const p=ei(st/tot);
        cx.fillStyle='rgba(1,2,5,0.22)';cx.fillRect(0,0,W,H);
        // deep blue night — cold and clear
        const sky=cx.createLinearGradient(0,0,0,H*0.65);
        sky.addColorStop(0,'rgba(1,4,14,0.6)');sky.addColorStop(0.5,'rgba(2,6,20,0.4)');sky.addColorStop(1,'rgba(0,0,0,0)');
        cx.fillStyle=sky;cx.fillRect(0,0,W,H*0.65);
        // stars — crisp winter sky
        for(let i=0;i<180;i++){
            const sx=((i*337)%W),sy=((i*197)%(H*0.6));
            const tw=Math.sin(gt*0.04+i)*0.25+0.75;
            cx.beginPath();cx.arc(sx,sy,rnd(0.3,1.6)*tw,0,Math.PI*2);
            cx.fillStyle=`rgba(255,255,255,${tw*0.55})`;cx.fill();
        }
        // moon rising — enters from bottom right, climbs to upper center
        const moonAngle=Math.PI*0.72-p*Math.PI*0.52;
        const moonX=W*0.5+Math.cos(moonAngle)*W*0.38;
        const moonY=H*0.52-p*H*0.38;
        // moon halo
        const halo=cx.createRadialGradient(moonX,moonY,0,moonX,moonY,160);
        halo.addColorStop(0,`rgba(255,252,230,${0.12+p*0.06})`);
        halo.addColorStop(0.3,`rgba(240,238,210,${0.04+p*0.02})`);
        halo.addColorStop(1,'rgba(0,0,0,0)');
        cx.fillStyle=halo;cx.fillRect(moonX-165,moonY-165,330,330);
        // moon disk — full, luminous
        const moonG=cx.createRadialGradient(moonX-8,moonY-8,0,moonX,moonY,42);
        moonG.addColorStop(0,'rgba(255,255,240,0.98)');
        moonG.addColorStop(0.4,'rgba(252,248,220,0.92)');
        moonG.addColorStop(0.8,'rgba(240,235,200,0.85)');
        moonG.addColorStop(1,'rgba(220,215,180,0.6)');
        cx.beginPath();cx.arc(moonX,moonY,42,0,Math.PI*2);cx.fillStyle=moonG;cx.fill();
        // moon surface craters — faint
        [[15,-10,8],[-12,14,5],[18,18,6],[-6,-20,4]].forEach(([ox,oy,cr])=>{
            cx.beginPath();cx.arc(moonX+ox,moonY+oy,cr,0,Math.PI*2);
            cx.fillStyle='rgba(200,195,165,0.12)';cx.fill();
        });
        // pine forest — multiple layers, moon shining through
        pines.forEach(pine=>{
            const sw=Math.sin(gt*pine.sway+pine.ph)*8;
            cx.save();cx.translate(pine.x+sw,H);
            // trunk
            cx.beginPath();cx.rect(-4,-pine.h,8,pine.h);
            cx.fillStyle='rgba(15,12,8,0.92)';cx.fill();
            // layered canopy
            for(let l=0;l<pine.layers;l++){

/* ═══ 4 · HAWK THERMAL RISE ════════════

(()=>{
    const cloudPuffs=Array.from({length:12},(_,i)=>({x:rnd(0,W),y:rnd(H*0.05,H*0.35),w:rnd(80,250),h:rnd(30,80),ph:Math.random()*Math.PI*2}));

        sky.addColorStop(1,'rgba(0,0,0,0)');

        const thermalX=W*0.52,thermalW=W*0.18;
        for(let l=0;l<4;l++){
            const tg=cx.createLinearGradient(thermalX-thermalW*(0.5+l*0.2),0,thermalX+thermalW*(0.5+l*0.2),0);
            tg.addColorStop(0,'rgba(0,0,0,0)');

            tg.addColorStop(1,'rgba(0,0,0,0)');

            Math.sin(spiralAngle+0.1)*spiralR-(Math.sin(spiralAngle)*spiralR),

        // tail
        cx.beginPath();cx.moveTo(-18,0);cx.lineTo(-32,-4);cx.lineTo(-28,0);cx.lineTo(-32,4);cx.closePath();cx.fillStyle='rgba(10,7,4,0.88)';cx.fill();
        // wings — spread in full soar
        for(let s=-1;s<=1;s+=2){

            cx.bezierCurveTo(s*15,-2,s*32,-8*wingspread,s*44,-4*wingspread);
            cx.bezierCurveTo(s*38,4,s*20,5,0,0);

/* ═══ 5 · TEMPLE BELL AT DAWN ═══════════
   The bell struck once. The sound
   expands into the mountain silence.
   Then the mountain takes it back.
══════════════════════════════════════ */
(()=>{
    const rings=[];let struck=false,strikeGt=0;
    const mountainLayers=[
        {pts:Array.from({length:80},(_,i)=>({x:i*(W/79),y:H*0.45+Math.sin(i*0.08)*H*0.08+Math.sin(i*0.035+1)*H*0.06})),shade:'6,8,16',al:0.97},
        {pts:Array.from({length:80},(_,i)=>({x:i*(W/79),y:H*0.52+Math.sin(i*0.07+0.5)*H*0.07+Math.sin(i*0.028+2)*H*0.05})),shade:'4,6,12',al:0.92},
        {pts:Array.from({length:80},(_,i)=>({x:i*(W/79),y:H*0.6+Math.sin(i*0.06+1)*H*0.06})),shade:'3,4,8',al:0.9},
    ];
    R[5]=(gt,st,tot)=>{
        const cx=ctxs[5];const p=ei(st/tot);
        cx.fillStyle='rgba(2,3,6,0.22)';cx.fillRect(0,0,W,H);
        // pre-dawn sky becoming dawn
        const sky=cx.createLinearGradient(0,0,0,H*0.55);
        sky.addColorStop(0,`rgba(${Math.floor(L(4,25,p))},${Math.floor(L(4,15,p))},${Math.floor(L(16,42,p))},0.6)`);
        sky.addColorStop(0.5,`rgba(${Math.floor(L(12,70,p))},${Math.floor(L(8,30,p))},${Math.floor(L(20,35,p))},0.4)`);
        sky.addColorStop(0.8,`rgba(${Math.floor(L(30,180,p))},${Math.floor(L(15,80,p))},${Math.floor(L(8,18,p))},0.25)`);
        sky.addColorStop(1,'rgba(0,0,0,0)');
        cx.fillStyle=sky;cx.fillRect(0,0,W,H*0.55);
        // first star fading
        cx.beginPath();cx.arc(W*0.72,H*0.12,3,0,Math.PI*2);
        cx.fillStyle=`rgba(255,255,220,${Math.max(0,0.6-p)})`;cx.fill();
        // strike happens at p=0.2
        if(p>=0.2&&!struck){struck=true;strikeGt=gt;for(let i=0;i<6;i++)rings.push({r:0,al:0.85,spd:rnd(1.8,3.2),delay:i*12});}
        // expanding sound rings
        rings.forEach(r=>{

            cx.strokeStyle=`rgba(200,190,155,${r.al*0.15})`;cx.lineWidth=1;cx.stroke();
        });
        // temple bell structure
        const bx=W*0.5,by=H*0.4;
        // hang beam
        cx.beginPath();cx.rect(bx-80,by-H*0.12,160,16);cx.fillStyle='rgba(40,30,15,0.92)';cx.fill();

/* ═══ 6 · RIVER BENDS PAST ROCK ═════════
   The river meets a boulder it cannot
   move. It does not argue. It curves.
══════════════════════════════════════ */
(()=>{
    const currentPts=Array.from({length:30},(_,i)=>({y:H*(0.15+i*0.025),ph:i*0.22,spd:0.01+i*0.002}));
    const foamBubbles=Array.from({length:80},()=>({x:rnd(0,W),y:rnd(H*0.2,H*0.85),vx:rnd(0.5,2),vy:(Math.random()-0.5)*0.3,sz:rnd(2,8),ph:Math.random()*Math.PI*2}));
    R[6]=(gt,st,tot)=>{
        const cx=ctxs[6];const p=ei(st/tot);
        cx.fillStyle='rgba(1,4,8,0.2)';cx.fillRect(0,0,W,H);
        // river — deep green-blue moving water
        const riverG=cx.createLinearGradient(0,0,0,H);
        riverG.addColorStop(0,`rgba(${Math.floor(L(8,18,p))},${Math.floor(L(38,70,p))},${Math.floor(L(55,90,p))},0.55)`);
        riverG.addColorStop(0.5,`rgba(${Math.floor(L(5,12,p))},${Math.floor(L(28,55,p))},${Math.floor(L(45,78,p))},0.4)`);
        riverG.addColorStop(1,'rgba(2,10,20,0.25)');
        cx.fillStyle=riverG;cx.fillRect(0,0,W,H);
        // current lines bending around the rock
        const rockX=W*0.48,rockY=H*0.52,rockR=H*0.12;
        currentPts.forEach(c=>{
            cx.beginPath();cx.moveTo(-30,c.y);
            for(let x=0;x<=W+30;x+=12){
                const dx=x-rockX;const dy=c.y-rockY;
                const dist=Math.sqrt(dx*dx+dy*dy);
                const deflect=dist<rockR*2.5?Math.exp(-dist/(rockR*1.5))*rockR*0.6*Math.sign(dy||1):0;
                cx.lineTo(x,c.y+deflect+Math.sin(x*0.006+gt*c.spd+c.ph)*8*(1+deflect*0.02));
            }
            cx.strokeStyle=`rgba(${Math.floor(L(60,100,p))},${Math.floor(L(150,200,p))},${Math.floor(L(180,230,p))},${0.05+Math.sin(c.ph)*0.02})`;
            cx.lineWidth=1.2;cx.stroke();
        });
        // white water / turbulence around rock
        for(let a=0;a<Math.PI*2;a+=0.18){
            const foam_r=rockR+(0.8+Math.sin(gt*0.06+a)*0.2)*H*0.06;
            const fx=rockX+Math.cos(a)*foam_r,fy=rockY+Math.sin(a)*foam_r*0.5;
            if(a>Math.PI*0.15&&a<Math.PI*0.85)continue;// only upstream turbulence
            cx.beginPath();cx.arc(fx,fy,rnd(3,12),0,Math.PI*2);
            cx.fillStyle=`rgba(220,235,248,${0.15+Math.sin(gt*0.08+a)*0.08})`;cx.fill();
        }
        // foam bubbles drifting downstream
        foamBubbles.forEach(f=>{
            const dx=f.x-rockX;const dy=f.y-rockY;
            const dist=Math.sqrt(dx*dx+dy*dy);
            const deflect=dist<rockR*3?dy/dist*0.8:0;
            f.x+=f.vx;f.y+=f.vy+deflect;
            if(f.x>W+20)f.x=-20;
            const tw=Math.sin(gt*0.05+f.ph)*0.3+0.7;
            cx.beginPath();cx.arc(f.x,f.y,f.sz*tw*0.6,0,Math.PI*2);
            cx.fillStyle=`rgba(210,230,248,${0.2*tw})`;cx.fill();
        });
        // the rock itself
        const rockG=cx.createRadialGradient(rockX-rockR*0.2,rockY-rockR*0.2,0,rockX,rockY,rockR*1.1);
        rockG.addColorStop(0,'rgba(55,50,42,0.97)');rockG.addColorStop(0.4,'rgba(40,36,28,0.95)');rockG.addColorStop(0.8,'rgba(30,26,20,0.96)');rockG.addColorStop(1,'rgba(20,18,13,0.98)');
        cx.beginPath();cx.arc(rockX,rockY,rockR,0,Math.PI*2);cx.fillStyle=rockG;cx.fill();
        // lichen on rock
        for(let i=0;i<5;i++){
            const la=(i/5)*Math.PI;const lr=rockR*(0.4+Math.random()*0.4);
            cx.beginPath();cx.arc(rockX+Math.cos(la)*lr,rockY+Math.sin(la)*lr*0.7,rnd(5,14),0,Math.PI*2);
            cx.fillStyle=`rgba(${Math.floor(rnd(45,75))},${Math.floor(rnd(60,90))},${Math.floor(rnd(25,50))},0.35)`;cx.fill();

/* ═══ 14 · BEEHIVE AT NOON ═══════════════
   Ten thousand workers. Zero confusion.
   Purpose so complete it needs no name.
══════════════════════════════════════ */
(()=>{
    const bees=Array.from({length:180},(_,i)=>({
        a:Math.random()*Math.PI*2,r:rnd(60,W*0.45),
        vA:rnd(0.012,0.035)*(Math.random()<0.5?1:-1),
        vR:(Math.random()-0.5)*0.8,ph:Math.random()*Math.PI*2,sz:rnd(0.6,1.2)
    }));
    R[14]=(gt,st,tot)=>{
        const cx=ctxs[14];const p=ei(st/tot);
        cx.fillStyle='rgba(4,3,1,0.22)';cx.fillRect(0,0,W,H);
        // warm golden ambient — summer noon haze
        const bg=cx.createRadialGradient(W*0.5,H*0.45,0,W*0.5,H*0.5,W*0.65);
        bg.addColorStop(0,`rgba(${Math.floor(L(20,38,p))},${Math.floor(L(15,25,p))},${Math.floor(L(4,8,p))},0.4)`);
        bg.addColorStop(1,'rgba(3,2,1,0.2)');
        cx.fillStyle=bg;cx.fillRect(0,0,W,H);
        // hexagonal honeycomb — the architecture
        const hx=W*0.5,hy=H*0.5;const hexR=32;
        const hexW=hexR*Math.sqrt(3),hexH=hexR*2;
        for(let row=-8;row<=8;row++){
            for(let col=-12;col<=12;col++){
                const ox=col*hexW+(row%2)*hexW*0.5;const oy=row*hexH*0.75;
                const dist=Math.sqrt(ox*ox+oy*oy);const maxDist=W*0.4;
                if(dist>maxDist)continue;
                const vis=Math.max(0,1-dist/maxDist);
                cx.save();cx.translate(hx+ox,hy+oy);
                cx.beginPath();
                for(let v=0;v<6;v++){const va=(v/6)*Math.PI*2;cx.lineTo(Math.cos(va)*(hexR-1),Math.sin(va)*(hexR-1));}
                cx.closePath();
                // honey fill — varies by distance/phase
                const honeyFill=Math.sin(dist*0.02+gt*0.01)*0.3+0.7;
                const cellHue=rnd(38,52);
                cx.fillStyle=`hsla(${cellHue},${Math.floor(L(65,80,vis))}%,${Math.floor(L(22,38,honeyFill*vis))}%,${vis*0.9})`;cx.fill();
                cx.strokeStyle=`rgba(25,18,5,${vis*0.6})`;cx.lineWidth=1.2;cx.stroke();
                // honey shimmer
                if(dist<maxDist*0.5){
                    cx.beginPath();cx.arc(-5,-5,hexR*0.22,0,Math.PI*2);
                    cx.fillStyle=`rgba(255,220,80,${vis*honeyFill*0.12})`;cx.fill();
                }
                cx.restore();
            }
        }
        // bees flying
        bees.forEach(b=>{
            b.a+=b.vA;b.r+=b.vR+Math.sin(gt*0.02+b.ph)*0.5;
            if(b.r<20)b.r=20;if(b.r>W*0.5)b.r=rnd(50,W*0.35);
            const bx=hx+Math.cos(b.a)*b.r,by=hy+Math.sin(b.a)*b.r*0.65;
            const speed=Math.sqrt(b.vA*b.vA+b.vR*b.vR);
            const angle=Math.atan2(Math.sin(b.a)*b.r*0.65,Math.cos(b.a)*b.r)+Math.atan2(b.vR,b.vA*b.r);
            cx.save();cx.translate(bx,by);cx.rotate(angle);cx.scale(b.sz,b.sz);
            // wings blur
            for(let w=0;w<3;w++){
                const wa=w*0.25-0.25;
                cx.beginPath();cx.ellipse(0,-5,10,5,wa,0,Math.PI*2);
                cx.fillStyle='rgba(220,235,255,0.12)';cx.fill();
                cx.beginPath();cx.ellipse(0,5,10,5,-wa,0,Math.PI*2);
                cx.fillStyle='rgba(220,235,255,0.12)';cx.fill();
            }
            // body — striped
            for(let s=0;s<3;s++){cx.beginPath();cx.rect(-3+s*-0.5,-7+s*4,6+s,4);cx.fillStyle=s%2===0?'rgba(35,25,5,0.88)':'rgba(200,160,30,0.85)';cx.fill();}
            cx.restore();
        });
        // hive entrance glow
        const entG=cx.createRadialGradient(hx,hy,0,hx,hy,60);
        entG.addColorStop(0,`rgba(255,200,40,${0.25+Math.sin(gt*0.04)*0.06})`);entG.addColorStop(1,'rgba(0,0,0,0)');
        cx.fillStyle=entG;cx.fillRect(hx-65,hy-65,130,130);
    };
})();

            cx.fillStyle=sunG;cx.fillRect(0,H*0.3,W,H*0.55);
            if(sunR>0){
                cx.beginPath();cx.arc(W*0.5,sunY,sunR,0,Math.PI*2);
                cx.fillStyle=`rgba(255,${Math.floor(L(90,35,p))},${Math.floor(L(15,5,p))},${0.88-p*0.3})`;cx.fill();
            }
        }
        // landscape silhouette — dark tree line
        cx.beginPath();cx.moveTo(0,H);
        for(let x=0;x<=W;x+=14)cx.lineTo(x,H*0.72+Math.sin(x*0.004)*22+Math.abs(Math.sin(x*0.002))*H*0.04);
        cx.lineTo(W,H);cx.closePath();cx.fillStyle='rgba(5,3,2,0.97)';cx.fill();
        // individual tree silhouettes
        for(let i=0;i<12;i++){
            const tx=W*(0.04+i*0.09);const ty=H*0.72+Math.sin(tx*0.004)*22+Math.abs(Math.sin(tx*0.002))*H*0.04;
            const th=rnd(H*0.06,H*0.14);
            cx.beginPath();cx.moveTo(tx,ty);cx.lineTo(tx,ty-th);cx.strokeStyle='rgba(4,2,1,0.95)';cx.lineWidth=rnd(3,7);cx.stroke();
        }
        // ember bed — the fire dying
        emberCoals.forEach(e=>{
            const decay=Math.max(0.05,0.8-p*0.7)*(0.7+Math.sin(gt*0.04+e.ph)*0.3);
            const eg=cx.createRadialGradient(e.x,e.y,0,e.x,e.y,e.r*decay);
            eg.addColorStop(0,`rgba(255,${Math.floor(L(100,40,p))},${Math.floor(L(5,0,p))},${decay*0.8})`);
            eg.addColorStop(0.5,`rgba(180,${Math.floor(L(40,15,p))},0,${decay*0.3})`);
            eg.addColorStop(1,'rgba(0,0,0,0)');
            cx.fillStyle=eg;cx.fillRect(e.x-e.r,e.y-e.r,e.r*2,e.r*2);
        });
        // ash surface — the record of the fire
        cx.beginPath();cx.rect(W*0.12,H*0.73,W*0.76,H*0.05);
        const ashG=cx.createLinearGradient(0,H*0.73,0,H*0.78);
        ashG.addColorStop(0,`rgba(${Math.floor(L(45,28,p))},${Math.floor(L(38,22,p))},${Math.floor(L(30,16,p))},0.88)`);
        ashG.addColorStop(1,'rgba(15,10,5,0.95)');
        cx.fillStyle=ashG;cx.fill();
        // last sparks
        risingSparks.forEach(s=>{
            const heat=Math.max(0,0.8-p*0.75);
            s.y+=s.vy*heat;s.x+=s.vx*heat+Math.sin(gt*0.02+s.sz)*0.4;s.al*=0.99;
            if(s.y<H*0.5||s.al<0.03){s.y=H*0.74;s.x=rnd(W*0.2,W*0.8);s.al=rnd(0.3,0.7);}
            const glow=cx.createRadialGradient(s.x,s.y,0,s.x,s.y,s.sz*3);
            glow.addColorStop(0,`hsla(${s.hue},95%,${60+heat*25}%,${s.al*heat})`);glow.addColorStop(1,'rgba(0,0,0,0)');
            cx.fillStyle=glow;cx.fillRect(s.x-s.sz*3.5,s.y-s.sz*3.5,s.sz*7,s.sz*7);
            cx.beginPath();cx.arc(s.x,s.y,s.sz*(0.5+heat*0.5),0,Math.PI*2);
            cx.fillStyle=`hsla(${s.hue},100%,75%,${s.al*heat})`;cx.fill();
        });
        // first stars appearing in the darkening sky
        if(p>0.4){
            for(let i=0;i<40;i++){
                const sx=((i*337)%W),sy=((i*197)%(H*0.6));
                const starAl=Math.min(1,(p-0.4)*3*((Math.sin(sy*0.01+i)*0.4)+0.6));
                if(starAl<0.05)continue;
                cx.beginPath();cx.arc(sx,sy,rnd(0.4,1.8),0,Math.PI*2);
                cx.fillStyle=`rgba(255,255,240,${starAl*0.55})`;cx.fill();
            }
        }
    };
})();

goTo(0);
document.getElementById('scene-name').textContent=SCENES[0].name;
masterLoop();
</script>
