<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Stoicism Visual Engine VI — 20 Cinematic Scenes</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Georgia', serif; }
        #stage { position: fixed; top: 0; left: 0; right: 0; bottom: 110px; display: flex; align-items: center; justify-content: center; background: #000; }
        #wrapper { position: relative; transform-origin: center center; }
        #wrapper canvas { position: absolute; top: 0; left: 0; width: 1920px; height: 1080px; display: none; }
        #wrapper canvas.active { display: block; }
        #panel { position: fixed; bottom: 0; left: 0; right: 0; height: 110px; background: rgba(2,2,4,0.98); border-top: 1px solid rgba(255,255,255,0.06); display: flex; flex-direction: column; padding: 0 20px; backdrop-filter: blur(20px); }
        #progress-wrap { height: 3px; width: 100%; background: rgba(255,255,255,0.05); position: relative; cursor: pointer; flex-shrink: 0; }
        #progress-fill { height: 100%; background: linear-gradient(90deg,#e8b86d,#f0d080,#c8903a); width: 0%; transition: width 0.25s linear; position: relative; }
        #progress-fill::after { content: ''; position: absolute; right: -5px; top: -4px; width: 11px; height: 11px; border-radius: 50%; background: #e8b86d; box-shadow: 0 0 12px #e8b86d88; }
        #controls { display: flex; align-items: center; gap: 14px; padding: 8px 0 4px; flex-shrink: 0; }
        #playbtn { width: 44px; height: 44px; border-radius: 50%; border: 1px solid rgba(232,184,109,0.45); background: rgba(232,184,109,0.07); color: #e8b86d; font-size: 17px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .2s; flex-shrink: 0; }
        #playbtn:hover { background: rgba(232,184,109,0.18); border-color: #e8b86d; }
        .navbtn { width: 34px; height: 34px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.1); background: transparent; color: rgba(255,255,255,0.45); font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .2s; flex-shrink: 0; }
        .navbtn:hover { border-color: rgba(255,255,255,0.3); color: #fff; }
        #scene-info { display: flex; flex-direction: column; gap: 2px; margin-right: auto; }
        #scene-name { font-size: 13px; color: rgba(255,255,255,0.82); letter-spacing: .04em; }
        #scene-sub { font-size: 10px; color: rgba(255,255,255,0.22); letter-spacing: .1em; text-transform: uppercase; }
        #timer-wrap { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
        #timer-display { font-size: 12px; color: rgba(255,255,255,0.3); letter-spacing: .08em; font-variant-numeric: tabular-nums; }
        #speed-btn { padding: 4px 11px; border-radius: 3px; border: 1px solid rgba(255,255,255,0.1); background: transparent; color: rgba(255,255,255,0.3); font-size: 11px; cursor: pointer; transition: all .2s; }
        #speed-btn:hover { border-color: rgba(255,255,255,0.28); color: rgba(255,255,255,0.65); }
        #strip-wrap { overflow-x: auto; flex: 1; padding: 5px 0 8px; scrollbar-width: none; }
        #strip-wrap::-webkit-scrollbar { display: none; }
        #strip { display: flex; gap: 7px; align-items: center; min-width: max-content; }
        .thumb { flex-shrink: 0; width: 90px; height: 42px; border-radius: 5px; border: 1px solid rgba(255,255,255,0.07); background: rgba(255,255,255,0.03); cursor: pointer; transition: all .15s; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; position: relative; overflow: hidden; }
        .thumb:hover { border-color: rgba(255,255,255,0.22); background: rgba(255,255,255,0.07); }
        .thumb.active { border-color: #e8b86d; background: rgba(232,184,109,0.08); }
        .thumb .tnum { font-size: 9px; color: rgba(255,255,255,0.2); letter-spacing: .08em; }
        .thumb .tname { font-size: 9px; color: rgba(255,255,255,0.5); text-align: center; line-height: 1.25; padding: 0 5px; }
        .thumb.active .tname { color: #e8b86d; }
        .thumb .tbar { position: absolute; bottom: 0; left: 0; height: 2px; background: linear-gradient(90deg,#e8b86d,#f0d080); width: 0%; }
    </style>
</head>

<body>
    <div id="stage"><div id="wrapper"></div></div>
    <div id="panel">
        <div id="progress-wrap" onclick="seekClick(event)"><div id="progress-fill"></div></div>
        <div id="controls">
            <button class="navbtn" onclick="prev()">&#9664;</button>
            <button id="playbtn" onclick="togglePlay()">&#9654;</button>
            <button class="navbtn" onclick="next()">&#9654;&#9654;</button>
            <div id="scene-info">
                <div id="scene-name">Loading…</div>
                <div id="scene-sub">Cinematic Series VI · 1920×1080</div>
            </div>
            <div id="timer-wrap">
                <div id="timer-display">0:00 / 0:00</div>
                <button id="speed-btn" onclick="cycleSpeed()">1×</button>
            </div>
        </div>
        <div id="strip-wrap"><div id="strip"></div></div>
    </div>
    <script>
        const W = 1920, H = 1080;
        const SCENES = [
            { name: 'Salt Flat Mirage',     sub: 'Emptiness reflecting everything',        dur: 30 },
            { name: 'Mussel Bed',           sub: 'Holding together through the tide',       dur: 30 },
            { name: 'Paper Lantern Rise',   sub: 'Let it go. Watch it become light.',       dur: 30 },
            { name: 'Termite Cathedral',    sub: 'Architecture of the unseen mind',         dur: 30 },
            { name: 'Night Train',          sub: 'Every window a world passing',            dur: 30 },
            { name: 'Loom Weaving',         sub: 'One thread, one choice, one cloth',       dur: 30 },
            { name: 'Monsoon Puddle',       sub: 'The whole sky fits in a small pool',      dur: 30 },
            { name: 'Petrified Forest',     sub: 'Wood that learned to last',               dur: 30 },
            { name: 'Kelp Forest Current',  sub: 'Grace is just strength with direction',   dur: 30 },
            { name: 'Lighthouse Interior',  sub: 'The turning is the work',                 dur: 30 },
            { name: 'Prairie Fire Line',    sub: 'Renewal arrives as destruction',          dur: 30 },
            { name: 'Black Sand Beach',     sub: 'What burns becomes beautiful shore',      dur: 30 },
            { name: 'Moth Wing Pattern',    sub: 'Camouflage is also a kind of truth',      dur: 30 },
            { name: 'Sinkhole Opening',     sub: 'The ground was always hollow here',       dur: 30 },
            { name: 'Polar Bear Wait',      sub: 'Stillness is not the same as giving up',  dur: 30 },
            { name: 'Cathedral Pipe Organ', sub: 'Stone made to vibrate with meaning',      dur: 30 },
            { name: 'Lava Meets Sea',       sub: 'Two absolutes. One transformation.',      dur: 30 },
            { name: 'Chrysalis Interior',   sub: 'Change requires dissolving first',         dur: 30 },
            { name: 'Comet Tail Debris',    sub: 'What we shed becomes our trail',          dur: 30 },
            { name: 'Tide Clock',           sub: 'The moon keeps time without a face',      dur: 30 },
        ];

        const SPEEDS = [1, 1.5, 2, 0.5];
        let speedIdx = 0, cur = 0, playing = false, sT = 0, frameT = 0;
        const FPS = 60;
        const ctxs = [];

        const wrapper = document.getElementById('wrapper');
        wrapper.style.width = W + 'px'; wrapper.style.height = H + 'px';
        for (let i = 0; i < SCENES.length; i++) {
            const c = document.createElement('canvas');
            c.width = W; c.height = H; c.id = 'cv' + i;
            wrapper.appendChild(c); ctxs.push(c.getContext('2d'));
        }

        function scaleStage() {
            const st = document.getElementById('stage');
            const s = Math.min(st.clientWidth / W, st.clientHeight / H);
            wrapper.style.transform = `scale(${s})`;
            wrapper.style.marginLeft = ((st.clientWidth - W * s) / 2) + 'px';
            wrapper.style.marginTop = ((st.clientHeight - H * s) / 2) + 'px';
        }
        window.addEventListener('resize', scaleStage); scaleStage();

        const strip = document.getElementById('strip');
        SCENES.forEach((sc, i) => {
            const d = document.createElement('div');
            d.className = 'thumb' + (i === 0 ? ' active' : ''); d.id = 'th' + i;
            d.innerHTML = `<div class="tnum">${String(i+1).padStart(2,'0')}</div><div class="tname">${sc.name}</div><div class="tbar" id="tb${i}"></div>`;
            d.onclick = () => goTo(i); strip.appendChild(d);
        });

        function goTo(i) {
            document.getElementById('cv'+cur).classList.remove('active');
            document.getElementById('th'+cur).classList.remove('active');
            document.getElementById('tb'+cur).style.width = '0%';
            cur = i; sT = 0;
            document.getElementById('cv'+i).classList.add('active');
            document.getElementById('th'+i).classList.add('active');
            document.getElementById('scene-name').textContent = SCENES[i].name;
            document.getElementById('th'+i).scrollIntoView({ behavior:'smooth', inline:'center', block:'nearest' });
        }
        function prev() { if (cur > 0) goTo(cur - 1); }
        function next() { if (cur < SCENES.length - 1) goTo(cur + 1); }
        function togglePlay() { playing = !playing; document.getElementById('playbtn').innerHTML = playing ? '&#9646;&#9646;' : '&#9654;'; }
        function cycleSpeed() { speedIdx = (speedIdx+1) % SPEEDS.length; document.getElementById('speed-btn').textContent = SPEEDS[speedIdx] + '×'; }
        function seekClick(e) {
            const rect = e.currentTarget.getBoundingClientRect(); const pct = (e.clientX - rect.left) / rect.width;
            const tot = SCENES.reduce((a,s) => a+s.dur, 0); let acc = 0, tgt = pct * tot;
            for (let i = 0; i < SCENES.length; i++) {
                if (acc + SCENES[i].dur >= tgt) { goTo(i); sT = Math.floor((tgt-acc)*FPS/SPEEDS[speedIdx]); break; }
                acc += SCENES[i].dur;
            }
        }
        function fmt(s) { return Math.floor(s/60)+':'+(s%60<10?'0':'')+s%60; }

        function masterLoop() {
            requestAnimationFrame(masterLoop); frameT++;
            const sc = SCENES[cur]; const tot = sc.dur * FPS / SPEEDS[speedIdx];
            if (playing) { sT++; if (sT >= tot) { if (cur < SCENES.length-1) goTo(cur+1); else { playing=false; document.getElementById('playbtn').innerHTML='&#9654;'; } } }
            R[cur](frameT, sT, tot);
            const pct = Math.min(1, sT/tot)*100;
            document.getElementById('tb'+cur).style.width = pct+'%';
            const el = Math.floor(sT/FPS*SPEEDS[speedIdx]);
            document.getElementById('timer-display').textContent = fmt(el)+' / '+fmt(sc.dur);
            const totD = SCENES.reduce((a,s)=>a+s.dur,0);
            const doneD = SCENES.slice(0,cur).reduce((a,s)=>a+s.dur,0)+el;
            document.getElementById('progress-fill').style.width = (doneD/totD*100)+'%';
        }

        const L = (a,b,t) => a+(b-a)*t;
        const rnd = (a,b) => a+Math.random()*(b-a);
        const ei = (t) => t<.5 ? 2*t*t : 1-Math.pow(-2*t+2,2)/2;
        const R = [];

        /* ═══════════════════════════════════
           0 · SALT FLAT MIRAGE
           Infinite white plain reflects
           a perfect sky — horizon erased
        ═══════════════════════════════════ */
        (() => {
            const heatWaves = Array.from({length:12},(_,i)=>({x:rnd(0,W),y:H*0.48+rnd(-20,20),w:rnd(80,220),ph:Math.random()*Math.PI*2}));
            R[0] = (gt,st,tot) => {
                const cx = ctxs[0]; const p = ei(st/tot);
                // sky — bleached pale blue fading to white at horizon
                const sky = cx.createLinearGradient(0,0,0,H*0.5);
                sky.addColorStop(0,`rgba(${Math.floor(L(15,120,p))},${Math.floor(L(25,160,p))},${Math.floor(L(60,200,p))},1)`);
                sky.addColorStop(1,'rgba(240,240,235,1)');
                cx.fillStyle = sky; cx.fillRect(0,0,W,H*0.5);
                // salt flat — mirror white
                const flat = cx.createLinearGradient(0,H*0.5,0,H);
                flat.addColorStop(0,'rgba(242,240,232,1)');
                flat.addColorStop(0.3,`rgba(${Math.floor(L(220,200,p))},${Math.floor(L(218,198,p))},${Math.floor(L(210,185,p))},1)`);
                flat.addColorStop(1,'rgba(180,175,162,1)');
                cx.fillStyle = flat; cx.fillRect(0,H*0.5,W,H*0.5);
                // reflected sky in flat
                const refl = cx.createLinearGradient(0,H*0.5,0,H);
                refl.addColorStop(0,`rgba(${Math.floor(L(15,120,p))},${Math.floor(L(25,160,p))},${Math.floor(L(60,200,p))},${0.25+p*0.1})`);
                refl.addColorStop(0.5,'rgba(0,0,0,0)');
                cx.fillStyle = refl; cx.fillRect(0,H*0.5,W,H*0.5);
                // horizon — perfectly flat, blurred
                cx.beginPath(); cx.rect(0,H*0.498,W,4);
                cx.fillStyle=`rgba(255,255,252,${0.6+Math.sin(gt*0.01)*0.1})`; cx.fill();
                // heat shimmer bands
                heatWaves.forEach(h=>{
                    h.x += 0.2; if(h.x>W+120) h.x=-120;
                    const hg = cx.createRadialGradient(h.x,h.y,0,h.x,h.y,h.w);
                    hg.addColorStop(0,`rgba(255,252,240,${0.06+Math.sin(gt*0.02+h.ph)*0.02})`);
                    hg.addColorStop(1,'rgba(0,0,0,0)');
                    cx.fillStyle=hg; cx.fillRect(h.x-h.w,h.y-h.w*0.3,h.w*2,h.w*0.6);
                });
                // distant solitary figure silhouette (optional depth cue)
                if(p>0.3){
                    cx.beginPath(); cx.ellipse(W*0.5,H*0.5-1,2,5,0,0,Math.PI*2);
                    cx.fillStyle=`rgba(80,70,55,${(p-0.3)*0.6})`; cx.fill();
                    // reflection below horizon
                    cx.beginPath(); cx.ellipse(W*0.5,H*0.5+1,2,5,0,0,Math.PI*2);
                    cx.fillStyle=`rgba(80,70,55,${(p-0.3)*0.3})`; cx.fill();
                }
                // salt hexagon crust pattern
                for(let i=0;i<30;i++){
                    const hx=((i*337)%W), hy=H*0.52+((i*197)%(H*0.44));
                    cx.beginPath();
                    for(let s=0;s<6;s++){const a=s/6*Math.PI*2; cx.lineTo(hx+Math.cos(a)*18,hy+Math.sin(a)*8);}
                    cx.closePath();
                    cx.strokeStyle=`rgba(200,195,180,${0.08+Math.sin(i)*0.04})`; cx.lineWidth=0.5; cx.stroke();
                }
            };
        })();

        /* ═══════════════════════════════════
           1 · MUSSEL BED
           Packed bodies holding the rock
           together against every wave
        ═══════════════════════════════════ */
        (() => {
            const mussels = Array.from({length:200},(_,i)=>({
                x:W*0.08+(i%20)*(W*0.84/19)+rnd(-8,8),
                y:H*0.25+Math.floor(i/20)*(H*0.5/9)+rnd(-5,5),
                rot:rnd(-0.4,0.4), sz:rnd(0.7,1.3), hue:rnd(220,260)
            }));
            R[1] = (gt,st,tot) => {
                const cx = ctxs[1]; const p = ei(st/tot);
                cx.fillStyle='rgba(2,5,10,0.22)'; cx.fillRect(0,0,W,H);
                // water above
                const wg = cx.createLinearGradient(0,0,0,H*0.22);
                wg.addColorStop(0,'rgba(8,30,70,0.6)'); wg.addColorStop(1,'rgba(0,0,0,0)');
                cx.fillStyle=wg; cx.fillRect(0,0,W,H*0.22);
                // wave surge
                const waveY = H*0.18+Math.sin(gt*0.02)*H*0.04;
                cx.beginPath(); cx.moveTo(0,0);
                for(let x=0;x<=W;x+=8) cx.lineTo(x,waveY+Math.sin(x*0.01+gt*0.025)*12);
                cx.lineTo(W,0); cx.closePath();
                cx.fillStyle=`rgba(15,55,120,${0.5+Math.sin(gt*0.02)*0.1})`; cx.fill();
                // rock surface
                const rg = cx.createLinearGradient(0,H*0.18,0,H);
                rg.addColorStop(0,'rgba(25,22,18,0.9)'); rg.addColorStop(1,'rgba(35,30,22,0.95)');
                cx.fillStyle=rg; cx.fillRect(0,H*0.18,W,H*0.82);
                // mussels — gleaming blue-black shells
                mussels.forEach(m=>{
                    cx.save(); cx.translate(m.x,m.y); cx.rotate(m.rot);
                    cx.beginPath(); cx.ellipse(0,0,10*m.sz,22*m.sz,0,0,Math.PI*2);
                    const mg = cx.createLinearGradient(-10*m.sz,-22*m.sz,10*m.sz,22*m.sz);
                    mg.addColorStop(0,`hsla(${m.hue},40%,28%,0.9)`);
                    mg.addColorStop(0.4,`hsla(${m.hue},50%,18%,0.95)`);
                    mg.addColorStop(1,`hsla(${m.hue},35%,10%,0.9)`);
                    cx.fillStyle=mg; cx.fill();
                    // shell ridge gleam
                    cx.beginPath(); cx.ellipse(-3*m.sz,-5*m.sz,3*m.sz,12*m.sz,0.2,0,Math.PI*2);
                    cx.fillStyle=`hsla(${m.hue},30%,55%,0.12)`; cx.fill();
                    cx.restore();
                });
                // barnacles scattered between
                for(let i=0;i<40;i++){
                    const bx=((i*337)%W*0.9)+W*0.05, by=H*0.25+((i*197)%(H*0.5));
                    cx.beginPath(); cx.arc(bx,by,rnd(2,5),0,Math.PI*2);
                    cx.fillStyle='rgba(160,150,130,0.4)'; cx.fill();
                }
                // sea foam at wave line
                for(let i=0;i<15;i++){
                    const fx=rnd(0,W), fw=rnd(20,60);
                    cx.beginPath(); cx.ellipse(fx,waveY+rnd(-5,5),fw,fw*0.2,0,0,Math.PI*2);
                    cx.fillStyle=`rgba(220,235,250,${0.15+Math.sin(gt*0.04+i)*0.08})`; cx.fill();
                }
            };
        })();

        /* ═══════════════════════════════════
           2 · PAPER LANTERN RISE
           Fire lifts the thing you release
        ═══════════════════════════════════ */
        (() => {
            const lanterns = Array.from({length:18},(_,i)=>({
                x:W*(0.08+i*0.052)+rnd(-20,20),
                y:H*0.9+rnd(0,H*0.3),
                vy:-rnd(0.5,1.4), vx:(Math.random()-0.5)*0.4,
                sz:rnd(0.7,1.4), hue:rnd(15,45), ph:Math.random()*Math.PI*2,
                born:rnd(0,0.6)
            }));
            R[2] = (gt,st,tot) => {
                const cx = ctxs[2]; const p = ei(st/tot);
                cx.fillStyle='rgba(2,2,4,0.22)'; cx.fillRect(0,0,W,H);
                // night sky
                const sky = cx.createLinearGradient(0,0,0,H*0.7);
                sky.addColorStop(0,'rgba(2,4,18,0.5)'); sky.addColorStop(1,'rgba(0,0,0,0)');
                cx.fillStyle=sky; cx.fillRect(0,0,W,H*0.7);
                // stars
                for(let i=0;i<100;i++){
                    const sx=((i*337)%W),sy=((i*197)%(H*0.75));
                    cx.beginPath(); cx.arc(sx,sy,rnd(0.3,1.2),0,Math.PI*2);
                    cx.fillStyle=`rgba(255,255,255,${0.3+Math.sin(gt*0.04+i)*0.12})`; cx.fill();
                }
                // lanterns rising
                lanterns.forEach(l=>{
                    const vis = Math.max(0,(p-l.born)*2.5); if(vis<0.01) return;
                    l.y += l.vy*vis; l.x += l.vx+Math.sin(gt*0.01+l.ph)*0.3;
                    if(l.y<-l.sz*80) l.y=H*0.95;
                    const glow = cx.createRadialGradient(l.x,l.y,0,l.x,l.y,l.sz*55);
                    glow.addColorStop(0,`hsla(${l.hue},90%,70%,${vis*0.22})`);
                    glow.addColorStop(1,'rgba(0,0,0,0)');
                    cx.fillStyle=glow; cx.fillRect(l.x-l.sz*60,l.y-l.sz*60,l.sz*120,l.sz*120);
                    // lantern body
                    cx.save(); cx.translate(l.x,l.y);
                    const beat = Math.sin(gt*0.05+l.ph)*0.03;
                    cx.beginPath(); cx.ellipse(0,0,l.sz*18,l.sz*26,beat,0,Math.PI*2);
                    const lg = cx.createRadialGradient(0,0,0,0,0,l.sz*22);
                    lg.addColorStop(0,`hsla(${l.hue},95%,78%,${vis*0.85})`);
                    lg.addColorStop(0.6,`hsla(${l.hue},85%,55%,${vis*0.5})`);
                    lg.addColorStop(1,`hsla(${l.hue},70%,30%,${vis*0.2})`);
                    cx.fillStyle=lg; cx.fill();
                    // wire rim top/bottom
                    cx.beginPath(); cx.ellipse(0,-l.sz*26,l.sz*18,l.sz*4,0,0,Math.PI*2);
                    cx.strokeStyle=`rgba(80,60,20,${vis*0.5})`; cx.lineWidth=1.5; cx.stroke();
                    cx.beginPath(); cx.ellipse(0,l.sz*26,l.sz*18,l.sz*4,0,0,Math.PI*2);
                    cx.strokeStyle=`rgba(80,60,20,${vis*0.5})`; cx.lineWidth=1.5; cx.stroke();
                    // flame flicker inside
                    cx.beginPath(); cx.ellipse(0,l.sz*18,l.sz*4,l.sz*6+Math.sin(gt*0.1+l.ph)*l.sz*2,0,0,Math.PI*2);
                    cx.fillStyle=`rgba(255,200,60,${vis*0.6})`; cx.fill();
                    // smoke wisp
                    cx.beginPath(); cx.moveTo(0,-l.sz*28); cx.lineTo(Math.sin(gt*0.04+l.ph)*6,-l.sz*42);
                    cx.strokeStyle=`rgba(140,130,120,${vis*0.1})`; cx.lineWidth=2; cx.stroke();
                    cx.restore();
                });
                // ground line
                cx.beginPath(); cx.moveTo(0,H);
                for(let x=0;x<=W;x+=12) cx.lineTo(x,H*0.9+Math.sin(x*0.005)*8);
                cx.lineTo(W,H); cx.closePath(); cx.fillStyle='rgba(5,4,2,0.97)'; cx.fill();
            };
        })();

        /* ═══════════════════════════════════
           3 · TERMITE CATHEDRAL
           A city built from nothing
           by ten million blind architects
        ═══════════════════════════════════ */
        (() => {
            function drawMound(cx,x,y,w,h,p){
                // main tower
                cx.beginPath(); cx.moveTo(x-w*0.5,y);
                cx.bezierCurveTo(x-w*0.5,y-h*0.3,x-w*0.25,y-h*0.7,x,y-h);
                cx.bezierCurveTo(x+w*0.25,y-h*0.7,x+w*0.5,y-h*0.3,x+w*0.5,y);
                cx.closePath();
                const tg = cx.createLinearGradient(x-w*0.5,0,x+w*0.5,0);

                cx.fillStyle=haze; cx.fillRect(0,H*0.45,W,H*0.15);
                // mound cluster — growing over p
                drawMound(cx,W*0.5,H*0.78,W*0.14,H*0.6*p,p);
                drawMound(cx,W*0.34,H*0.8,W*0.08,H*0.35*p,p);
                drawMound(cx,W*0.66,H*0.79,W*0.09,H*0.4*p,p);
                drawMound(cx,W*0.22,H*0.82,W*0.055,H*0.22*p,p);
                drawMound(cx,W*0.78,H*0.81,W*0.06,H*0.28*p,p);
                // termite trails on surface
                for(let i=0;i<20;i++){
                    const tx=W*0.3+i*(W*0.02+rnd(-10,10)), ty=H*0.78+rnd(-5,10);
                    cx.beginPath(); cx.moveTo(tx,ty);
                    cx.quadraticCurveTo(tx+rnd(-20,20),ty-rnd(5,20),W*0.5,H*0.78);
                    cx.strokeStyle=`rgba(100,70,30,${0.06*p})`; cx.lineWidth=0.8; cx.stroke();
                }
                // ground

                for(let x=0;x<=W;x+=14) cx.lineTo(x,H*0.82+Math.sin(x*0.004)*12);

                cx.beginPath(); cx.ellipse(W*0.88,H*0.6,W*0.06,H*0.05,0,0,Math.PI*2);
                cx.fillStyle='rgba(18,25,8,0.5)'; cx.fill();
            };
        })();

        /* ═══════════════════════════════════

        (() => {

            R[4] = (gt,st,tot) => {

                    cx.fillStyle=`rgba(255,255,255,0.4)`; cx.fill();
                }

                cx.beginPath(); cx.moveTo(0,H);
                for(let x=0;x<=W+50;x+=12){
                    const lx=(x+offset)%W;

                }

                cx.fillStyle='rgba(28,26,30,0.96)'; cx.fill();
                cx.strokeStyle='rgba(55,52,60,0.8)'; cx.lineWidth=3; cx.stroke();

                    cx.fillStyle=outGlow; cx.fillRect(wx-ww,wy-wh*0.5,ww*3,wh*2);
                    // window interior

                    cx.fillStyle=`hsla(${w.hue},70%,${55+Math.sin(gt*0.02+i)*5}%,0.85)`; cx.fill();
                    // silhouette inside window
                    cx.beginPath(); cx.ellipse(wx+ww*0.5,wy+wh*0.35,ww*0.18,wh*0.2,0,0,Math.PI*2);
                    cx.fillStyle='rgba(20,15,10,0.6)'; cx.fill();
                    cx.beginPath(); cx.rect(wx+ww*0.3,wy+wh*0.55,ww*0.4,wh*0.3);
                    cx.fillStyle='rgba(20,15,10,0.4)'; cx.fill();
                    // window reflection streak
                    cx.beginPath(); cx.moveTo(wx+ww*0.15,wy+2); cx.lineTo(wx+ww*0.2,wy+wh-2);
                    cx.strokeStyle='rgba(255,255,255,0.08)'; cx.lineWidth=4; cx.stroke();
                });
                // train undercarriage / track blur

                cx.fillStyle='rgba(12,10,8,0.97)'; cx.fill();

                }

                cx.beginPath(); cx.ellipse(W*0.5,trackY+8,W*0.04,4,0,0,Math.PI*2);

            };
        })();

        /* ═══════════════════════════════════
           5 · LOOM WEAVING
           Thread by thread the cloth
           becomes more than the sum
        ═══════════════════════════════════ */
        (() => {
            R[5] = (gt,st,tot) => {
                const cx = ctxs[5]; const p = ei(st/tot);
                cx.fillStyle='rgba(5,4,2,0.22)'; cx.fillRect(0,0,W,H);
                const warpCount=60, weftCount=Math.floor(p*80);
                const x0=W*0.12, x1=W*0.88, y0=H*0.12, y1=H*0.88;
                const warpStep=(x1-x0)/warpCount;
                const weftStep=(y1-y0)/80;
                // loom frame
                cx.beginPath(); cx.rect(x0-20,y0-20,x1-x0+40,y1-y0+40);
                cx.strokeStyle='rgba(60,45,25,0.7)'; cx.lineWidth=12; cx.stroke();
                cx.strokeStyle='rgba(40,28,12,0.9)'; cx.lineWidth=6; cx.stroke();
                // warp threads (vertical) — always visible
                for(let i=0;i<=warpCount;i++){
                    const x=x0+i*warpStep;
                    cx.beginPath(); cx.moveTo(x,y0); cx.lineTo(x,y1);
                    cx.strokeStyle=`rgba(${Math.floor(L(160,120,i/warpCount))},${Math.floor(L(130,90,i/warpCount))},${Math.floor(L(70,40,i/warpCount))},0.35)`;
                    cx.lineWidth=1; cx.stroke();
                }
                // weft threads (horizontal) — weaving in
                for(let j=0;j<weftCount;j++){
                    const y=y0+j*weftStep;
                    const hue=L(25,180,j/80);
                    cx.beginPath(); cx.moveTo(x0,y);
                    for(let i=0;i<=warpCount;i++){
                        const x=x0+i*warpStep;
                        const over=(i+j)%2===0;
                        cx.lineTo(x,y+(over?-2:2));
                    }
                    cx.strokeStyle=`hsla(${hue},55%,50%,0.7)`; cx.lineWidth=weftStep*0.85; cx.lineCap='round'; cx.stroke();
                }
                // shuttle in motion
                if(weftCount<80){
                    const shutX = (weftCount%2===0) ? x0+weftCount*0.1 : x1-weftCount*0.1;
                    const shutY = y0+weftCount*weftStep;
                    cx.beginPath(); cx.ellipse(shutX,shutY,W*0.04,6,0,0,Math.PI*2);
                    cx.fillStyle='rgba(80,55,25,0.9)'; cx.fill();
                }
                // cloth drape at bottom
                const drapeH = weftCount*weftStep*0.6;
                if(drapeH>5){
                    cx.beginPath(); cx.moveTo(x0,y1);
                    for(let x=x0;x<=x1;x+=15) cx.lineTo(x,y1+drapeH+Math.sin(x*0.02+gt*0.01)*8);
                    cx.lineTo(x1,y1); cx.closePath();
                    cx.fillStyle=`rgba(${Math.floor(L(80,100,p))},${Math.floor(L(60,75,p))},${Math.floor(L(30,45,p))},0.7)`; cx.fill();
                }
            };
        })();

        /* ═══════════════════════════════════
           6 · MONSOON PUDDLE
           The whole sky fits in a
           pothole after the storm
        ═══════════════════════════════════ */
        (() => {
            const drops = [];let nextDrop=0;
            const ripples4=[];
            R[6] = (gt,st,tot) => {
                const cx = ctxs[6]; const p = ei(st/tot);
                cx.fillStyle='rgba(4,4,5,0.22)'; cx.fillRect(0,0,W,H);
                // road surface — dark wet asphalt
                cx.beginPath(); cx.rect(0,H*0.5,W,H*0.5);
                cx.fillStyle='rgba(12,12,14,0.97)'; cx.fill();
                // road markings
                for(let i=0;i<6;i++){
                    cx.beginPath(); cx.rect(W*(0.08+i*0.16),H*0.62,W*0.08,6);
                    cx.fillStyle='rgba(50,48,40,0.5)'; cx.fill();
                }
                // puddle ellipse
                const pudX=W*0.5, pudY=H*0.68, pudW=W*0.3, pudH=H*0.12;
                cx.save(); cx.beginPath(); cx.ellipse(pudX,pudY,pudW,pudH,0,0,Math.PI*2); cx.clip();
                // reflected sky in puddle
                const skyRefl = cx.createLinearGradient(0,pudY-pudH,0,pudY+pudH);
                skyRefl.addColorStop(0,`rgba(${Math.floor(L(10,30,p))},${Math.floor(L(20,60,p))},${Math.floor(L(50,120,p))},0.85)`);
                skyRefl.addColorStop(1,`rgba(5,15,40,0.9)`);

                    const rcx=W*(0.25+i*0.18), rcy=pudY-pudH*0.3;
                    const rcg = cx.createRadialGradient(rcx,rcy,0,rcx,rcy,W*0.06);
                    rcg.addColorStop(0,'rgba(180,190,210,0.2)'); rcg.addColorStop(1,'rgba(0,0,0,0)');
                    cx.fillStyle=rcg; cx.fillRect(0,0,W,H);
                }
                // rain ripples
                if(gt>=nextDrop){
                    ripples4.push({x:pudX+rnd(-pudW*0.7,pudW*0.7),y:pudY+rnd(-pudH*0.6,pudH*0.6),r:0,al:0.7});
                    nextDrop=gt+rnd(8,25);
                }
                for(let i=ripples4.length-1;i>=0;i--){
                    const r=ripples4[i]; r.r+=0.8; r.al*=0.96;
                    if(r.r>60||r.al<0.02){ripples4.splice(i,1);continue;}
                    cx.beginPath(); cx.ellipse(r.x,r.y,r.r*1.4,r.r*0.35,0,0,Math.PI*2);
                    cx.strokeStyle=`rgba(150,180,220,${r.al*0.4})`; cx.lineWidth=1; cx.stroke();
                }
                cx.restore();
                // puddle rim
                cx.beginPath(); cx.ellipse(pudX,pudY,pudW,pudH,0,0,Math.PI*2);
                cx.strokeStyle='rgba(20,20,22,0.8)'; cx.lineWidth=3; cx.stroke();
                // rain streaks above
                for(let i=0;i<60;i++){

        /* ═══════════════════════════════════
           7 · PETRIFIED FOREST
           Wood that traded growth
           for permanence
        ═══════════════════════════════════ */
        (() => {
            const logs = Array.from({length:8},(_,i)=>({
                x:W*(0.06+i*0.12), y:H*0.55+rnd(-20,30),
                len:rnd(W*0.08,W*0.18), rot:rnd(-0.15,0.15),
                r:rnd(18,42), hue:rnd(20,40)
            }));
            const standingTrunks = Array.from({length:12},(_,i)=>({x:W*(0.05+i*0.085),h:rnd(H*0.15,H*0.42),w:rnd(12,35)}));
            R[7] = (gt,st,tot) => {
                const cx = ctxs[7]; const p = ei(st/tot);
                cx.fillStyle='rgba(6,5,3,0.22)'; cx.fillRect(0,0,W,H);
                // desert sky — ochre and blue
                const sky = cx.createLinearGradient(0,0,0,H*0.5);
                sky.addColorStop(0,`rgba(${Math.floor(L(15,55,p))},${Math.floor(L(20,40,p))},${Math.floor(L(50,25,p))},0.55)`);
                sky.addColorStop(1,'rgba(0,0,0,0)');
                cx.fillStyle=sky; cx.fillRect(0,0,W,H*0.5);

                standingTrunks.forEach(t=>{

                    cx.beginPath(); cx.rect(-t.w*0.5,-t.h,t.w,t.h);
                    const tg = cx.createLinearGradient(-t.w*0.5,0,t.w*0.5,0);
                    tg.addColorStop(0,`rgba(80,55,28,0.9)`); tg.addColorStop(0.4,`rgba(110,75,35,0.88)`); tg.addColorStop(1,`rgba(65,42,18,0.9)`);
                    cx.fillStyle=tg; cx.fill();
                    // ring pattern at top — cross section
                    for(let r=2;r<t.w*0.45;r+=4){
                        cx.beginPath(); cx.arc(0,-t.h,r,0,Math.PI*2);
                        cx.strokeStyle=`rgba(60,38,14,0.3)`; cx.lineWidth=0.8; cx.stroke();
                    }
                    cx.restore();
                });
                // fallen logs
                logs.forEach(l=>{
                    cx.save(); cx.translate(l.x+l.len*0.5,l.y); cx.rotate(l.rot);

                        cx.strokeStyle=`hsla(${l.hue},20%,20%,0.3)`; cx.lineWidth=0.8; cx.stroke();
                    }

                    for(let c=0;c<4;c++){
                        const cy=rnd(-l.r,l.r);
                        cx.beginPath(); cx.moveTo(-l.len*0.4,cy); cx.lineTo(-l.len*0.4+rnd(20,80),cy+rnd(-5,5));

                    }
                    cx.restore();
                });
                // desert floor

            };
        })();

        /* ═══════════════════════════════════
           8 · KELP FOREST CURRENT
           A thousand amber streamers
           all pointing the same way
        ═══════════════════════════════════ */
        (() => {

                for(let i=0;i<10;i++){

                    lg.addColorStop(0,`rgba(60,${Math.floor(L(140,180,p))},80,${0.04+Math.sin(gt*0.02+i)*0.015})`);

                }
                // current flow lines
                for(let i=0;i<8;i++){
                    const fy=H*(0.1+i*0.12);
                    cx.beginPath(); cx.moveTo(0,fy);
                    for(let x=0;x<=W;x+=20) cx.lineTo(x,fy+Math.sin(x*0.005+gt*0.012+i*0.4)*12);
                    cx.strokeStyle=`rgba(80,160,100,${0.04+Math.sin(gt*0.01+i)*0.01})`; cx.lineWidth=0.8; cx.stroke();
                }
                // kelp fronds swaying in current
                kelp.forEach(k=>{
                    let kx=k.x, ky=H*0.98;
                    for(let s=0;s<k.segments;s++){
                        const t=s/k.segments;
                        const sway=Math.sin(gt*0.016+k.ph+t*2)*20*(t+0.3);

                        if(s%3===0&&s>2){

                            cx.beginPath(); cx.moveTo(nx,ny);
                            cx.lineTo(nx+Math.cos(bAngle)*30,ny+Math.sin(bAngle)*20);
                            cx.strokeStyle=`hsla(${k.hue},70%,40%,0.5)`; cx.lineWidth=k.w*0.5; cx.stroke();

                    }
                });

                cx.beginPath(); cx.rect(0,H*0.97,W,H*0.03); cx.fillStyle='rgba(20,14,6,0.97)'; cx.fill();

                    cx.save(); cx.translate(fx,fy);
                    cx.beginPath(); cx.ellipse(0,0,12,5,0,0,Math.PI*2); cx.fillStyle='rgba(30,80,50,0.4)'; cx.fill();
                    cx.beginPath(); cx.moveTo(-12,0); cx.lineTo(-20,-5); cx.lineTo(-20,5); cx.closePath(); cx.fill();
                    cx.restore();
                }
            };
        })();

        /* ═══════════════════════════════════
           9 · LIGHTHOUSE INTERIOR
           Looking up through the lens —
           the turning is the whole purpose
        ═══════════════════════════════════ */

                    cx.fillStyle=mg; cx.fillRect(moonX-60,moonY-60,120,120);
                    cx.beginPath(); cx.arc(moonX,moonY,20,0,Math.PI*2);
                    cx.fillStyle='rgba(255,252,220,0.65)'; cx.fill();
                }
                // ocean — tide level oscillates twice as moon completes arc
                const tideOffset=Math.sin(p*Math.PI*2)*H*0.08;
                const baseWater=H*0.52+tideOffset;
                waveLines.forEach((wl,i)=>{
                    cx.beginPath(); cx.moveTo(0,H);
                    for(let x=0;x<=W;x+=8) cx.lineTo(x,wl.y+tideOffset+Math.sin(x*0.007+gt*wl.spd+wl.ph)*wl.amp);
                    cx.lineTo(W,H); cx.closePath();
                    const wg = cx.createLinearGradient(0,wl.y,0,H);
                    wg.addColorStop(0,`rgba(${8+i*2},${30+i*8},${75+i*10},${0.75-i*0.04})`);
                    wg.addColorStop(1,`rgba(2,12,30,0.95)`);
                    cx.fillStyle=wg; cx.fill();
                });
                // tidal zone rocks
                cx.beginPath(); cx.moveTo(0,H); cx.lineTo(0,H*0.82);
                for(let x=0;x<=W*0.3;x+=15) cx.lineTo(x,H*0.82+Math.sin(x*0.008)*22+Math.sin(x*0.02)*10);
                cx.lineTo(W*0.3,H); cx.closePath(); cx.fillStyle='rgba(18,15,10,0.95)'; cx.fill();
                cx.beginPath(); cx.moveTo(W,H); cx.lineTo(W,H*0.8);
                for(let x=W;x>=W*0.72;x-=15) cx.lineTo(x,H*0.8+Math.sin(x*0.007)*25+Math.sin(x*0.018)*12);
                cx.lineTo(W*0.72,H); cx.closePath(); cx.fillStyle='rgba(16,13,9,0.95)'; cx.fill();
                // moonlit path on water
                if(moonY<H*0.42){
                    const pathG = cx.createLinearGradient(moonX-40,baseWater,moonX+40,H);
                    pathG.addColorStop(0,`rgba(255,250,210,${0.08+Math.sin(gt*0.02)*0.02})`);
                    pathG.addColorStop(1,'rgba(0,0,0,0)');
                    cx.fillStyle=pathG; cx.fillRect(W*0.2,baseWater,W*0.6,H-baseWater);
                }
                // tide marker on shore
                cx.beginPath(); cx.rect(W*0.05,H*0.82+tideOffset-2,W*0.01,4);
                cx.fillStyle=`rgba(200,190,160,0.4)`; cx.fill();
            };
        })();

        goTo(0);
        document.getElementById('scene-name').textContent = SCENES[0].name;
        masterLoop();
    </script>
</body>
