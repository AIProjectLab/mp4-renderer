<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stoicism Visual Engine VII — 20 Cinematic Scenes</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Georgia', serif; }
        #stage { position: fixed; top: 0; left: 0; right: 0; bottom: 110px; display: flex; align-items: center; justify-content: center; background: #000; }
        #wrapper { position: relative; transform-origin: center center; }
        #wrapper canvas { position: absolute; top: 0; left: 0; width: 1920px; height: 1080px; display: none; }
        #wrapper canvas.active { display: block; }
        #panel { position: fixed; bottom: 0; left: 0; right: 0; height: 110px; background: rgba(2,2,4,0.98); border-top: 1px solid rgba(255,255,255,0.06); display: flex; flex-direction: column; padding: 0 20px; backdrop-filter: blur(20px); }
        #progress-wrap { height: 3px; width: 100%; background: rgba(255,255,255,0.05); position: relative; cursor: pointer; flex-shrink: 0; }
        #progress-fill { height: 100%; background: linear-gradient(90deg,#e8b86d,#f0d080,#c8903a); width: 0%; transition: width 0.25s linear; position: relative; }
        #progress-fill::after { content:''; position: absolute; right:-5px; top:-4px; width:11px; height:11px; border-radius:50%; background:#e8b86d; box-shadow:0 0 12px #e8b86d88; }
        #controls { display: flex; align-items: center; gap: 14px; padding: 8px 0 4px; flex-shrink: 0; }
        #playbtn { width:44px; height:44px; border-radius:50%; border:1px solid rgba(232,184,109,0.45); background:rgba(232,184,109,0.07); color:#e8b86d; font-size:17px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .2s; flex-shrink:0; }
        #playbtn:hover { background:rgba(232,184,109,0.18); border-color:#e8b86d; }
        .navbtn { width:34px; height:34px; border-radius:50%; border:1px solid rgba(255,255,255,0.1); background:transparent; color:rgba(255,255,255,0.45); font-size:13px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .2s; flex-shrink:0; }
        .navbtn:hover { border-color:rgba(255,255,255,0.3); color:#fff; }
        #scene-info { display:flex; flex-direction:column; gap:2px; margin-right:auto; }
        #scene-name { font-size:13px; color:rgba(255,255,255,0.82); letter-spacing:.04em; }
        #scene-sub { font-size:10px; color:rgba(255,255,255,0.22); letter-spacing:.1em; text-transform:uppercase; }
        #timer-wrap { display:flex; align-items:center; gap:8px; flex-shrink:0; }
        #timer-display { font-size:12px; color:rgba(255,255,255,0.3); letter-spacing:.08em; font-variant-numeric:tabular-nums; }
        #speed-btn { padding:4px 11px; border-radius:3px; border:1px solid rgba(255,255,255,0.1); background:transparent; color:rgba(255,255,255,0.3); font-size:11px; cursor:pointer; transition:all .2s; }
        #speed-btn:hover { border-color:rgba(255,255,255,0.28); color:rgba(255,255,255,0.65); }
        #strip-wrap { overflow-x:auto; flex:1; padding:5px 0 8px; scrollbar-width:none; }
        #strip-wrap::-webkit-scrollbar { display:none; }
        #strip { display:flex; gap:7px; align-items:center; min-width:max-content; }
        .thumb { flex-shrink:0; width:90px; height:42px; border-radius:5px; border:1px solid rgba(255,255,255,0.07); background:rgba(255,255,255,0.03); cursor:pointer; transition:all .15s; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; position:relative; overflow:hidden; }
        .thumb:hover { border-color:rgba(255,255,255,0.22); background:rgba(255,255,255,0.07); }
        .thumb.active { border-color:#e8b86d; background:rgba(232,184,109,0.08); }
        .thumb .tnum { font-size:9px; color:rgba(255,255,255,0.2); letter-spacing:.08em; }
        .thumb .tname { font-size:9px; color:rgba(255,255,255,0.5); text-align:center; line-height:1.25; padding:0 5px; }
        .thumb.active .tname { color:#e8b86d; }
        .thumb .tbar { position:absolute; bottom:0; left:0; height:2px; background:linear-gradient(90deg,#e8b86d,#f0d080); width:0%; }
    </style>
</head>
<body>
    <div id="stage"><div id="wrapper"></div></div>
    <div id="panel">
        <div id="progress-wrap" onclick="seekClick(event)"><div id="progress-fill"></div></div>
        <div id="controls">
            <button class="navbtn" onclick="prev()">&#9664;</button>
            <button id="playbtn" onclick="togglePlay()">&#9654;</button>
            <button class="navbtn" onclick="next()">&#9654;&#9654;</button>
            <div id="scene-info">
                <div id="scene-name">Loading…</div>
                <div id="scene-sub">Cinematic Series VII · 1920×1080</div>
            </div>
            <div id="timer-wrap">
                <div id="timer-display">0:00 / 0:00</div>
                <button id="speed-btn" onclick="cycleSpeed()">1×</button>
            </div>
        </div>
        <div id="strip-wrap"><div id="strip"></div></div>
    </div>
    <script>
        const W=1920,H=1080;
        const SCENES=[
            {name:'Sun Pillar at Dawn',    sub:'Light stands before it spreads',              dur:30},
            {name:'Rain on Still Pond',    sub:'Each drop only disturbs what was ready',      dur:30},
            {name:'Murmuration at Dusk',   sub:'No one leads. All arrive.',                   dur:30},
            {name:'Monk Raking Sand',      sub:'The meaning is in motion, not mark',  dur:30},
            {name:'Ship in Fog',           sub:'Direction held without seeing far',            dur:30},
            {name:'Mushroom Spore Cloud',  sub:'A billion attempts. A few take hold.',         dur:30},
            {name:'Iron Chain Rust Free',  sub:'Freedom is a kind of maintained tension',     dur:30},
            {name:'Firefly and Mirror',    sub:'Even brief light knows itself',                dur:30},
            {name:'Drought Then First Rain',sub:'The earth remembers how to receive',         dur:30},
            {name:'Nomad Camp at Night',   sub:'Home is wherever fire is lit',             dur:30},
            {name:'Kelp Canopy Sunbreak',  sub:'Everything reaches for the same thing',       dur:30},
            {name:'Glacier Face at Noon',  sub:'Blue older than any human word for blue',     dur:30},
            {name:'Crows on Wire',         sub:'Witness without commentary',                   dur:30},
            {name:'Ink Drop in Water',     sub:'One decision. Irrevocable cloud.',             dur:30},
            {name:'Sycamore in January',   sub:'Patience written in bark',                    dur:30},
            {name:'Deep Cave Painting',    sub:'Someone reached here before language',         dur:30},
            {name:'Comet Returns',         sub:'Not lost. Orbiting on a longer clock.',        dur:30},
            {name:'Arctic Tern Migration', sub:'The longest journey requires no philosophy',   dur:30},
            {name:'Volcanic Plume at Sea', sub:'The island is still becoming itself',          dur:30},
            {name:'Lantern Descends River',sub:'Let it go. Watch where it goes.',             dur:30},
        ];

        const SPEEDS=[1,1.5,2,0.5];
        let speedIdx=0,cur=0,playing=false,sT=0,frameT=0;
        const FPS=60;
        const ctxs=[];

        const wrapper=document.getElementById('wrapper');
        wrapper.style.width=W+'px'; wrapper.style.height=H+'px';
        for(let i=0;i<SCENES.length;i++){
            const c=document.createElement('canvas');
            c.width=W; c.height=H; c.id='cv'+i;
            wrapper.appendChild(c); ctxs.push(c.getContext('2d'));
        }

        function scaleStage(){
            const st=document.getElementById('stage');
            const s=Math.min(st.clientWidth/W,st.clientHeight/H);
            wrapper.style.transform=`scale(${s})`;
            wrapper.style.marginLeft=((st.clientWidth-W*s)/2)+'px';
            wrapper.style.marginTop=((st.clientHeight-H*s)/2)+'px';
        }
        window.addEventListener('resize',scaleStage); scaleStage();

        const strip=document.getElementById('strip');
        SCENES.forEach((sc,i)=>{
            const d=document.createElement('div');
            d.className='thumb'+(i===0?' active':''); d.id='th'+i;
            d.innerHTML=`<div class="tnum">${String(i+1).padStart(2,'0')}</div><div class="tname">${sc.name}</div><div class="tbar" id="tb${i}"></div>`;
            d.onclick=()=>goTo(i); strip.appendChild(d);
        });

        function goTo(i){
            document.getElementById('cv'+cur).classList.remove('active');
            document.getElementById('th'+cur).classList.remove('active');
            document.getElementById('tb'+cur).style.width='0%';
            cur=i; sT=0;
            document.getElementById('cv'+i).classList.add('active');
            document.getElementById('th'+i).classList.add('active');
            document.getElementById('scene-name').textContent=SCENES[i].name;
            document.getElementById('th'+i).scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
        }
        function prev(){if(cur>0)goTo(cur-1);}
        function next(){if(cur<SCENES.length-1)goTo(cur+1);}
        function togglePlay(){playing=!playing;document.getElementById('playbtn').innerHTML=playing?'&#9646;&#9646;':'&#9654;';}
        function cycleSpeed(){speedIdx=(speedIdx+1)%SPEEDS.length;document.getElementById('speed-btn').textContent=SPEEDS[speedIdx]+'×';}
        function seekClick(e){
            const rect=e.currentTarget.getBoundingClientRect();const pct=(e.clientX-rect.left)/rect.width;
            const tot=SCENES.reduce((a,s)=>a+s.dur,0);let acc=0,tgt=pct*tot;
            for(let i=0;i<SCENES.length;i++){if(acc+SCENES[i].dur>=tgt){goTo(i);sT=Math.floor((tgt-acc)*FPS/SPEEDS[speedIdx]);break;}acc+=SCENES[i].dur;}
        }
        function fmt(s){return Math.floor(s/60)+':'+(s%60<10?'0':'')+s%60;}

        function masterLoop(){
            requestAnimationFrame(masterLoop);frameT++;
            const sc=SCENES[cur];const tot=sc.dur*FPS/SPEEDS[speedIdx];
            if(playing){sT++;if(sT>=tot){if(cur<SCENES.length-1)goTo(cur+1);else{playing=false;document.getElementById('playbtn').innerHTML='&#9654;';}}}
            R[cur](frameT,sT,tot);
            const pct=Math.min(1,sT/tot)*100;
            document.getElementById('tb'+cur).style.width=pct+'%';
            const el=Math.floor(sT/FPS*SPEEDS[speedIdx]);
            document.getElementById('timer-display').textContent=fmt(el)+' / '+fmt(sc.dur);
            const totD=SCENES.reduce((a,s)=>a+s.dur,0);
            const doneD=SCENES.slice(0,cur).reduce((a,s)=>a+s.dur,0)+el;
            document.getElementById('progress-fill').style.width=(doneD/totD*100)+'%';
        }

        const L=(a,b,t)=>a+(b-a)*t;
        const rnd=(a,b)=>a+Math.random()*(b-a);
        const ei=(t)=>t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;
        const R=[];

        /* ═══════════════════════════════════
           0 · SUN PILLAR AT DAWN
           A vertical blade of gold rises
           straight up from the horizon —
           ice crystals in the cold air
           act as ten thousand tiny mirrors
        ═══════════════════════════════════ */
        (() => {
            const iceSparkles=Array.from({length:500},(_,i)=>({
                x:W*0.5+rnd(-W*0.15,W*0.15),y:rnd(0,H),
                sz:rnd(0.5,2.5),ph:Math.random()*Math.PI*2,
                drift:(Math.random()-0.5)*0.15
            }));
            R[0]=(gt,st,tot)=>{
                const cx=ctxs[0];const p=ei(st/tot);
                cx.fillStyle='rgba(4,3,6,0.2)';cx.fillRect(0,0,W,H);
                // pre-dawn sky — deep indigo bleeding to rose
                const sky=cx.createLinearGradient(0,0,0,H);
                sky.addColorStop(0,`rgba(${Math.floor(L(8,30,p))},${Math.floor(L(5,15,p))},${Math.floor(L(28,50,p))},0.6)`);
                sky.addColorStop(0.5,`rgba(${Math.floor(L(20,80,p))},${Math.floor(L(10,35,p))},${Math.floor(L(35,55,p))},0.35)`);
                sky.addColorStop(0.82,`rgba(${Math.floor(L(40,180,p))},${Math.floor(L(15,80,p))},${Math.floor(L(20,30,p))},0.2)`);
                sky.addColorStop(1,'rgba(0,0,0,0)');
                cx.fillStyle=sky;cx.fillRect(0,0,W,H);
                // horizon glow — warm band
                const horizon=cx.createLinearGradient(0,H*0.62,0,H*0.82);
                horizon.addColorStop(0,'rgba(0,0,0,0)');
                horizon.addColorStop(0.4,`rgba(255,${Math.floor(L(80,160,p))},${Math.floor(L(10,40,p))},${0.18+p*0.25})`);
                horizon.addColorStop(1,'rgba(0,0,0,0)');
                cx.fillStyle=horizon;cx.fillRect(0,H*0.62,W,H*0.2);
                // THE PILLAR — vertical column of scattered light
                const pillarW=W*0.04;
                for(let layer=0;layer<6;layer++){
                    const lw=pillarW*(1+layer*0.4);
                    const pg=cx.createLinearGradient(W*0.5-lw,0,W*0.5+lw,0);
                    pg.addColorStop(0,'rgba(0,0,0,0)');
                    pg.addColorStop(0.3,`rgba(255,${Math.floor(L(140,210,p))},${Math.floor(L(40,80,p))},${(0.06-layer*0.008)*p})`);
                    pg.addColorStop(0.5,`rgba(255,${Math.floor(L(160,230,p))},${Math.floor(L(60,110,p))},${(0.12-layer*0.015)*p})`);
                    pg.addColorStop(0.7,`rgba(255,${Math.floor(L(140,210,p))},${Math.floor(L(40,80,p))},${(0.06-layer*0.008)*p})`);
                    pg.addColorStop(1,'rgba(0,0,0,0)');
                    const pillarFade=cx.createLinearGradient(0,0,0,H);
                    pillarFade.addColorStop(0,'rgba(0,0,0,0)');
                    pillarFade.addColorStop(0.1,`rgba(255,255,255,${p*0.5})`);
                    pillarFade.addColorStop(0.7,`rgba(255,255,255,${p*0.9})`);
                    pillarFade.addColorStop(0.85,'rgba(255,255,255,0.5)');
                    pillarFade.addColorStop(1,'rgba(0,0,0,0)');
                    cx.save();cx.globalCompositeOperation='lighter';
                    cx.fillStyle=pg;cx.fillRect(0,0,W,H);
                    cx.restore();
                }
                // sun disk just below horizon — causes pillar
                const sunG=cx.createRadialGradient(W*0.5,H*0.76,0,W*0.5,H*0.76,W*0.18);
                sunG.addColorStop(0,`rgba(255,${Math.floor(L(120,220,p))},${Math.floor(L(20,60,p))},${p*0.6})`);
                sunG.addColorStop(0.3,`rgba(255,${Math.floor(L(80,160,p))},0,${p*0.2})`);
                sunG.addColorStop(1,'rgba(0,0,0,0)');
                cx.fillStyle=sunG;cx.fillRect(0,H*0.5,W,H*0.5);
                // ice crystal sparkles drifting in the pillar
                iceSparkles.forEach(s=>{
                    s.x+=s.drift;s.y+=0.15;if(s.y>H+5)s.y=-5;
                    const glint=Math.pow(Math.max(0,Math.sin(gt*0.08+s.ph)),8)*p;
                    if(glint<0.01)return;
                    cx.beginPath();cx.arc(s.x,s.y,s.sz*glint,0,Math.PI*2);
                    cx.fillStyle=`rgba(255,240,200,${glint*0.9})`;cx.fill();
                });
                // frozen lake — dark mirror below
                cx.beginPath();cx.moveTo(0,H);
                for(let x=0;x<=W;x+=12)cx.lineTo(x,H*0.78+Math.sin(x*0.004)*8);
                cx.lineTo(W,H);cx.closePath();
                cx.fillStyle='rgba(4,5,10,0.95)';cx.fill();
                // pillar reflection in ice
                const refG=cx.createLinearGradient(W*0.5-pillarW*2,H*0.78,W*0.5+pillarW*2,H*0.78);
                refG.addColorStop(0,'rgba(0,0,0,0)');
                refG.addColorStop(0.5,`rgba(255,${Math.floor(L(130,180,p))},${Math.floor(L(30,60,p))},${p*0.15})`);
                refG.addColorStop(1,'rgba(0,0,0,0)');
                cx.fillStyle=refG;cx.fillRect(0,H*0.78,W,H*0.22);
            };
        })();

        /* ═══════════════════════════════════
           1 · RAIN ON STILL POND
           Thousand rings overlapping —
           geometry of interference
        ═══════════════════════════════════ */
        (() => {
            const drops=[];const rings=[];let nextD=0;
            const lilies=Array.from({length:6},(_,i)=>({x:rnd(W*0.1,W*0.9),y:rnd(H*0.35,H*0.85),r:rnd(20,55),hue:rnd(100,140)}));
            R[1]=(gt,st,tot)=>{
                const cx=ctxs[1];const p=ei(st/tot);
                cx.fillStyle='rgba(1,4,8,0.2)';cx.fillRect(0,0,W,H);
                // pond surface — dark reflective water
                const wg=cx.createLinearGradient(0,0,0,H);
                wg.addColorStop(0,`rgba(${Math.floor(L(5,15,p))},${Math.floor(L(18,40,p))},${Math.floor(L(35,65,p))},0.55)`);
                wg.addColorStop(1,'rgba(2,8,18,0.9)');
                cx.fillStyle=wg;cx.fillRect(0,0,W,H);
                // reflected sky shimmer
                for(let i=0;i<5;i++){
                    const rx=rnd(0,W),ry=rnd(0,H*0.5);
                    cx.beginPath();cx.ellipse(rx,ry,rnd(40,120),rnd(5,15),0,0,Math.PI*2);
                    cx.fillStyle=`rgba(${Math.floor(L(20,60,p))},${Math.floor(L(50,100,p))},${Math.floor(L(80,150,p))},${0.04+Math.sin(gt*0.02+i)*0.02})`;cx.fill();
                }
                // rain drops spawning
                const rate=2+p*8;
                if(gt>=nextD){drops.push({x:rnd(W*0.02,W*0.98),y:rnd(-30,-5),vy:rnd(10,20),sz:rnd(1,3)});nextD=gt+rnd(2,rate);}
                for(let i=drops.length-1;i>=0;i--){
                    const d=drops[i];d.y+=d.vy;
                    if(d.y>H){rings.push({x:d.x,y:d.y>H?H*rnd(0.1,0.95):d.y,r:0,maxR:rnd(40,120),al:0.7,spd:rnd(1.2,2.4)});drops.splice(i,1);continue;}
                    cx.beginPath();cx.ellipse(d.x,d.y,d.sz*0.4,d.sz*1.6,0,0,Math.PI*2);
                    cx.fillStyle='rgba(160,200,240,0.55)';cx.fill();
                }
                // expanding rings — the real beauty
                for(let i=rings.length-1;i>=0;i--){
                    const r=rings[i];r.r+=r.spd;r.al*=0.978;
                    if(r.r>r.maxR||r.al<0.015){rings.splice(i,1);continue;}
                    const fade=r.al*(1-r.r/r.maxR);
                    for(let l=0;l<3;l++){
                        const rr=r.r+l*8;
                        cx.beginPath();cx.ellipse(r.x,r.y,rr,rr*0.28,0,0,Math.PI*2);
                        cx.strokeStyle=`rgba(160,205,245,${fade*(0.5-l*0.14)})`;cx.lineWidth=1.2-l*0.3;cx.stroke();
                    }
                }
                // lily pads
                lilies.forEach(l=>{
                    cx.beginPath();cx.moveTo(l.x,l.y);
                    cx.arc(l.x,l.y,l.r,0.15,Math.PI*2-0.15);cx.closePath();
                    cx.fillStyle=`hsla(${l.hue},55%,22%,0.8)`;cx.fill();
                    cx.strokeStyle=`hsla(${l.hue},45%,35%,0.4)`;cx.lineWidth=1;cx.stroke();
                    // vein
                    cx.beginPath();cx.moveTo(l.x,l.y);cx.lineTo(l.x,l.y-l.r);
                    cx.strokeStyle=`hsla(${l.hue},40%,28%,0.3)`;cx.lineWidth=0.8;cx.stroke();
                });
                // rain streaks in air
                for(let i=0;i<60;i++){
                    const rx=rnd(0,W),ry=rnd(0,H);
                    cx.beginPath();cx.moveTo(rx,ry);cx.lineTo(rx-1,ry+16);
                    cx.strokeStyle=`rgba(140,180,220,${0.08+p*0.06})`;cx.lineWidth=0.7;cx.stroke();
                }
            };
        })();

        /* ═══════════════════════════════════
           2 · MURMURATION AT DUSK
           Ten thousand starlings become
           one living brushstroke on the sky
        ═══════════════════════════════════ */
        (() => {
            const N=1200;
            const bx=new Float32Array(N),by=new Float32Array(N);
            const bvx=new Float32Array(N),bvy=new Float32Array(N);
            for(let i=0;i<N;i++){bx[i]=rnd(W*0.2,W*0.8);by[i]=rnd(H*0.2,H*0.6);bvx[i]=(Math.random()-0.5)*3;bvy[i]=(Math.random()-0.5)*3;}
            R[2]=(gt,st,tot)=>{
                const cx=ctxs[2];const p=ei(st/tot);
                cx.fillStyle='rgba(3,4,8,0.18)';cx.fillRect(0,0,W,H);
                // rich sunset gradient — the famous murmuration sky
                const sky=cx.createLinearGradient(0,0,0,H);
                sky.addColorStop(0,`rgba(${Math.floor(L(12,35,p))},${Math.floor(L(8,18,p))},${Math.floor(L(25,45,p))},0.55)`);
                sky.addColorStop(0.35,`rgba(${Math.floor(L(40,120,p))},${Math.floor(L(18,45,p))},${Math.floor(L(20,30,p))},0.4)`);
                sky.addColorStop(0.62,`rgba(${Math.floor(L(80,220,p))},${Math.floor(L(35,100,p))},${Math.floor(L(10,20,p))},0.3)`);
                sky.addColorStop(0.8,`rgba(${Math.floor(L(120,255,p))},${Math.floor(L(60,150,p))},${Math.floor(L(15,30,p))},0.2)`);
                sky.addColorStop(1,'rgba(0,0,0,0)');
                cx.fillStyle=sky;cx.fillRect(0,0,W,H);
                // sun on horizon
                const sunG=cx.createRadialGradient(W*0.5,H*0.78,0,W*0.5,H*0.78,W*0.2);
                sunG.addColorStop(0,`rgba(255,${Math.floor(L(100,200,p))},${Math.floor(L(20,50,p))},${0.35+p*0.2})`);
                sunG.addColorStop(0.4,`rgba(255,${Math.floor(L(60,120,p))},0,${0.1+p*0.08})`);
                sunG.addColorStop(1,'rgba(0,0,0,0)');
                cx.fillStyle=sunG;cx.fillRect(0,H*0.55,W,H*0.45);
                // flocking — boids with shape driver
                const shapeA=gt*0.007,shapeR=H*0.25;
                const targetX=W*0.5+Math.cos(shapeA)*shapeR*1.8+Math.cos(shapeA*2.3)*shapeR*0.6;
                const targetY=H*0.45+Math.sin(shapeA)*shapeR*0.8+Math.sin(shapeA*1.7)*shapeR*0.3;
                for(let i=0;i<N;i++){

        })();

        /* ═══════════════════════════════════
           8 · DROUGHT THEN FIRST RAIN
           The earth cracks, then opens,
           then remembers it was soil
        ═══════════════════════════════════ */
        (() => {
            function crack(cx,x,y,a,len,d){if(d<1||len<6)return;const ex=x+Math.cos(a)*len,ey=y+Math.sin(a)*len;cx.beginPath();cx.moveTo(x,y);cx.lineTo(ex,ey);cx.strokeStyle=`rgba(15,9,3,${0.4+d*0.06})`;cx.lineWidth=d*0.7;cx.stroke();crack(cx,ex,ey,a+rnd(-0.6,0.6),len*rnd(0.55,0.75),d-1);if(Math.random()<0.5)crack(cx,ex,ey,a+rnd(-0.9,-0.4)*Math.sign(Math.random()-0.5),len*rnd(0.4,0.6),d-2);}
            const crackSeeds=Array.from({length:12},()=>({x:rnd(W*0.05,W*0.95),y:rnd(H*0.18,H*0.88),a:rnd(0,Math.PI*2)}));
            const rainDrops2=Array.from({length:600},()=>({x:rnd(0,W),y:rnd(-H,H*0.5),vy:rnd(14,24),vx:rnd(-1,-0.3),len:rnd(12,35),al:rnd(0.12,0.3)}));
            const splashes2=[];let nextSplash3=0;
            R[8]=(gt,st,tot)=>{
                const cx=ctxs[8];const p=ei(st/tot);
                cx.fillStyle='rgba(6,5,3,0.22)';cx.fillRect(0,0,W,H);
                // sky shifts: dry yellow→storm grey→release
                const dryPhase=Math.max(0,1-p*3);const rainPhase=Math.max(0,p*2-0.5);
                const sky=cx.createLinearGradient(0,0,0,H*0.45);
                sky.addColorStop(0,`rgba(${Math.floor(L(40,8,rainPhase))},${Math.floor(L(28,6,rainPhase))},${Math.floor(L(8,4,rainPhase))},0.55)`);
                sky.addColorStop(1,'rgba(0,0,0,0)');
                cx.fillStyle=sky;cx.fillRect(0,0,W,H*0.45);
                // parched earth
                const earthG=cx.createLinearGradient(0,H*0.1,0,H);
                earthG.addColorStop(0,`rgba(${Math.floor(L(95,65,p))},${Math.floor(L(68,46,p))},${Math.floor(L(30,20,p))},0.93)`);
                earthG.addColorStop(1,`rgba(${Math.floor(L(55,38,p))},${Math.floor(L(38,26,p))},${Math.floor(L(14,9,p))},0.97)`);
                cx.fillStyle=earthG;cx.fillRect(0,H*0.1,W,H*0.9);
                // cracks in dry earth
                crackSeeds.forEach(s=>crack(cx,s.x,s.y,s.a,rnd(60,150),6));
                // puddles forming in cracks when rain comes
                if(rainPhase>0.2){
                    crackSeeds.forEach(s=>{
                        cx.beginPath();cx.ellipse(s.x,s.y,rnd(20,50)*rainPhase,rnd(8,18)*rainPhase,s.a*0.3,0,Math.PI*2);
                        cx.fillStyle=`rgba(${Math.floor(L(30,50,rainPhase))},${Math.floor(L(60,90,rainPhase))},${Math.floor(L(90,140,rainPhase))},${rainPhase*0.5})`;cx.fill();
                    });
                }
                // rain
                if(p>0.35){
                    rainDrops2.forEach(r=>{
                        r.y+=r.vy*(p-0.35)*2.5;r.x+=r.vx*(p-0.35)*2;
                        if(r.y>H+10){r.y=-rnd(0,80);r.x=rnd(0,W);}
                        cx.beginPath();cx.moveTo(r.x,r.y);cx.lineTo(r.x+r.vx*r.len*0.15,r.y+r.len);
                        cx.strokeStyle=`rgba(${Math.floor(L(100,140,rainPhase))},${Math.floor(L(140,180,rainPhase))},${Math.floor(L(180,220,rainPhase))},${r.al*rainPhase*1.5})`;cx.lineWidth=0.8;cx.stroke();
                    });

                for(let i=splashes2.length-1;i>=0;i--){
                    const s=splashes2[i];s.r+=1;s.al*=0.92;
                    if(s.al<0.02){splashes2.splice(i,1);continue;}
                    cx.beginPath();cx.ellipse(s.x,s.y,s.r*1.3,s.r*0.25,0,0,Math.PI*2);

                }

                }
            };
        })();

        /* ═══════════════════════════════════

        (() => {
            const emberDrift=Array.from({length:120},()=>({x:W*0.5+rnd(-30,30),y:H*0.55,vx:(Math.random()-0.5)*1.5,vy:-rnd(0.5,3),al:rnd(0.3,0.8),sz:rnd(1,3.5),hue:rnd(15,45)}));
            const tentSegs=[{x:W*0.35,y:H*0.78,pts:[{x:W*0.22,y:H*0.82},{x:W*0.35,y:H*0.55},{x:W*0.48,y:H*0.82}]},{x:W*0.65,y:H*0.8,pts:[{x:W*0.54,y:H*0.84},{x:W*0.65,y:H*0.6},{x:W*0.76,y:H*0.84}]}];
            R[9]=(gt,st,tot)=>{

                const fireX=W*0.5,fireY=H*0.62;
                for(let layer=5;layer>=0;layer--){
                    const fr=80+layer*60;const fal=(0.12-layer*0.015)*(0.5+p*0.5);
                    const fg=cx.createRadialGradient(fireX,fireY,0,fireX,fireY,fr);

                    fg.addColorStop(1,'rgba(0,0,0,0)');
                    cx.fillStyle=fg;cx.fillRect(0,0,W,H);
                }
                // fire flames
                for(let flame=0;flame<8;flame++){
                    const fa=Math.PI*(-0.3+flame*0.08)+Math.sin(gt*0.04+flame)*0.15;
                    const flen=30+Math.sin(gt*0.07+flame*0.5)*15;
                    const ffg=cx.createLinearGradient(fireX,fireY,fireX+Math.cos(fa-Math.PI*0.5)*flen,fireY-flen);
                    ffg.addColorStop(0,`rgba(255,${Math.floor(rnd(160,220))},20,0.7)`);ffg.addColorStop(1,'rgba(0,0,0,0)');
                    cx.beginPath();cx.moveTo(fireX+Math.cos(fa)*8,fireY);cx.lineTo(fireX+Math.cos(fa-Math.PI*0.5)*flen,fireY-flen);cx.lineTo(fireX+Math.cos(fa+Math.PI*0.1)*8,fireY);
                    cx.fillStyle=ffg;cx.fill();
                }
                // logs
                cx.beginPath();cx.rect(fireX-35,fireY-8,70,14);cx.fillStyle='rgba(25,15,6,0.9)';cx.fill();
                cx.beginPath();cx.rect(fireX-28,fireY+2,56,10);cx.fillStyle='rgba(20,12,4,0.92)';cx.fill();
                // tents silhouetted by firelight
                tentSegs.forEach(t=>{
                    cx.beginPath();cx.moveTo(t.pts[0].x,t.pts[0].y);t.pts.forEach(pt=>cx.lineTo(pt.x,pt.y));cx.closePath();
                    const tg=cx.createLinearGradient(t.pts[0].x,t.pts[0].y,t.pts[2].x,t.pts[2].y);
                    const closeness=1-Math.abs(t.x-fireX)/W;
                    tg.addColorStop(0,`rgba(${Math.floor(15+closeness*30)},${Math.floor(10+closeness*15)},${Math.floor(4+closeness*5)},0.9)`);
                    tg.addColorStop(1,`rgba(8,5,2,0.95)`);
                    cx.fillStyle=tg;cx.fill();
                    // tent opening light
                    if(t.x<W*0.5){cx.beginPath();cx.moveTo(t.pts[0].x+W*0.03,t.pts[0].y);cx.lineTo(t.pts[0].x+W*0.03,t.pts[0].y-H*0.08);}
                    cx.strokeStyle=`rgba(255,180,60,0.08)`;cx.lineWidth=1;cx.stroke();
                });
                // sitting figure by fire
                cx.beginPath();cx.arc(fireX-W*0.07,fireY-8,12,0,Math.PI*2);cx.fillStyle='rgba(12,8,3,0.92)';cx.fill();
                cx.beginPath();cx.rect(fireX-W*0.07-9,fireY+4,18,H*0.12);cx.fillStyle='rgba(10,6,2,0.9)';cx.fill();

                });
                // desert ground
                cx.beginPath();cx.moveTo(0,H);for(let x=0;x<=W;x+=12)cx.lineTo(x,H*0.82+Math.sin(x*0.005)*14);

        })();

           Five witnesses. No conclusions.

        (() => {

                cx.fillStyle=sunFar;cx.fillRect(W*0.6,0,W*0.4,H*0.4);
                // comet elliptical orbit path — hint
                cx.beginPath();cx.ellipse(W*0.55,H*0.5,W*0.42,H*0.38,0.25,0,Math.PI*2);
                cx.strokeStyle=`rgba(80,90,120,${p*0.08})`;cx.lineWidth=1;cx.setLineDash([5,20]);cx.stroke();cx.setLineDash([]);
                // previous visit ghost trail — faint
                oldTrail.forEach(ot=>{
                    const ox=W*0.12+ot.t*W*0.75+ot.scatter,oy=H*0.35+Math.sin(ot.t*Math.PI)*H*0.2+ot.scatter*0.5;
                    cx.beginPath();cx.arc(ox,oy,rnd(0.5,2),0,Math.PI*2);
                    cx.fillStyle=`rgba(180,160,220,${(1-ot.t)*0.06*p})`;cx.fill();
                });
                // comet arriving on its arc
                const cAngle=p*Math.PI*0.85-0.1;
                const cometX=W*0.55+Math.cos(cAngle)*W*0.42;
                const cometY=H*0.5+Math.sin(cAngle)*H*0.38;
                // tail — pointing away from sun
                const tailAngle=Math.atan2(cometY-H*0.12*0.12,cometX-W*0.88);
                for(let tl=0;tl<8;tl++){
                    const tLen=60+tl*50;
                    const tg=cx.createLinearGradient(cometX,cometY,cometX+Math.cos(tailAngle)*tLen,cometY+Math.sin(tailAngle)*tLen);
                    tg.addColorStop(0,`rgba(255,240,180,${0.2-tl*0.022})`);tg.addColorStop(0.4,`rgba(180,210,255,${0.08-tl*0.008})`);tg.addColorStop(1,'rgba(0,0,0,0)');
                    cx.beginPath();cx.moveTo(cometX,cometY);cx.lineTo(cometX+Math.cos(tailAngle+rnd(-0.05,0.05))*tLen*1.5,cometY+Math.sin(tailAngle+rnd(-0.05,0.05))*tLen*1.5);
                    cx.strokeStyle=tg;cx.lineWidth=4-tl*0.4;cx.stroke();
                }
                // coma and nucleus
                const comaG=cx.createRadialGradient(cometX,cometY,0,cometX,cometY,28);
                comaG.addColorStop(0,'rgba(255,255,255,0.95)');comaG.addColorStop(0.2,'rgba(200,230,255,0.5)');comaG.addColorStop(0.6,'rgba(150,200,255,0.12)');comaG.addColorStop(1,'rgba(0,0,0,0)');
                cx.fillStyle=comaG;cx.fillRect(cometX-30,cometY-30,60,60);
                cx.beginPath();cx.arc(cometX,cometY,5,0,Math.PI*2);cx.fillStyle='rgba(255,255,255,1)';cx.fill();
            };
        })();

        /* ═══════════════════════════════════
           17 · ARCTIC TERN MIGRATION
           Pole to pole without a map —
           the longest faith in the world
        ═══════════════════════════════════ */
        (() => {
            const terns=Array.from({length:25},(_,i)=>({
                x:rnd(-100,W*0.2),y:rnd(H*0.15,H*0.65),
                vx:rnd(1.5,4),vy:(Math.random()-0.5)*0.5,
                ph:Math.random()*Math.PI*2,wingCycle:rnd(0.08,0.15),
                sz:rnd(0.6,1.2),formation:i
            }));
            R[17]=(gt,st,tot)=>{
                const cx=ctxs[17];const p=ei(st/tot);
                cx.fillStyle='rgba(2,4,8,0.2)';cx.fillRect(0,0,W,H);
                // open ocean sky — vast and blue
                const sky=cx.createLinearGradient(0,0,0,H*0.55);
                sky.addColorStop(0,`rgba(${Math.floor(L(10,30,p))},${Math.floor(L(25,65,p))},${Math.floor(L(65,130,p))},0.55)`);
                sky.addColorStop(0.5,`rgba(${Math.floor(L(15,40,p))},${Math.floor(L(40,85,p))},${Math.floor(L(90,160,p))},0.35)`);
                sky.addColorStop(1,'rgba(0,0,0,0)');
                cx.fillStyle=sky;cx.fillRect(0,0,W,H*0.55);
                // horizon cloud layer
                for(let i=0;i<8;i++){
                    const ccx=W*(0.04+i*0.14)+Math.sin(gt*0.004+i)*20;const ccy=H*(0.12+i%3*0.08);
                    const cg=cx.createRadialGradient(ccx,ccy,0,ccx,ccy,W*0.09);
                    cg.addColorStop(0,`rgba(${Math.floor(L(150,200,p))},${Math.floor(L(165,215,p))},${Math.floor(L(180,235,p))},0.12)`);cg.addColorStop(1,'rgba(0,0,0,0)');
                    cx.fillStyle=cg;cx.fillRect(0,0,W,H*0.5);
                }
                // open ocean
                const waterY=H*0.52;
                cx.beginPath();cx.moveTo(0,H);
                for(let x=0;x<=W;x+=10)cx.lineTo(x,waterY+Math.sin(x*0.006+gt*0.012)*15+Math.sin(x*0.015+gt*0.02)*6);
                cx.lineTo(W,H);cx.closePath();
                const wg=cx.createLinearGradient(0,waterY,0,H);
                wg.addColorStop(0,`rgba(${Math.floor(L(8,22,p))},${Math.floor(L(55,100,p))},${Math.floor(L(100,170,p))},0.88)`);
                wg.addColorStop(1,'rgba(3,20,50,0.97)');
                cx.fillStyle=wg;cx.fill();
                // wave highlights
                for(let i=0;i<12;i++){
                    const wx=((i*234+gt*2)%W);const wy=waterY+rnd(-5,15);
                    cx.beginPath();cx.moveTo(wx,wy);cx.lineTo(wx+rnd(20,60),wy);
                    cx.strokeStyle=`rgba(180,220,255,${0.06+Math.sin(gt*0.04+i)*0.03})`;cx.lineWidth=1.5;cx.stroke();
                }
                // arctic terns in formation flight
                terns.forEach(t=>{
                    t.x+=t.vx;t.y+=t.vy+Math.sin(gt*0.015+t.ph)*0.4;
                    if(t.x>W+120){t.x=-80;t.y=H*(0.15+Math.random()*0.45);}
                    const wing=Math.sin(gt*t.wingCycle+t.ph)*0.9;
                    cx.save();cx.translate(t.x,t.y);cx.scale(t.sz,t.sz);
                    // body — streamlined
                    cx.beginPath();cx.ellipse(0,0,16,5,0,0,Math.PI*2);cx.fillStyle='rgba(230,232,236,0.88)';cx.fill();
                    // black cap
                    cx.beginPath();cx.arc(14,0,6,0,Math.PI*2);cx.fillStyle='rgba(12,10,10,0.9)';cx.fill();
                    // tail fork
                    cx.beginPath();cx.moveTo(-16,0);cx.lineTo(-26,-4+wing*3);cx.moveTo(-16,0);cx.lineTo(-26,4-wing*3);
                    cx.strokeStyle='rgba(225,228,232,0.85)';cx.lineWidth=3;cx.lineCap='round';cx.stroke();
                    // wings
                    cx.beginPath();cx.moveTo(-5,0);cx.bezierCurveTo(-5,-22*Math.abs(wing),-8-wing*15,-22,-16,-16*Math.abs(wing));
                    cx.bezierCurveTo(-8,4,0,4,-5,0);
                    cx.fillStyle='rgba(220,222,228,0.82)';cx.fill();
                    cx.beginPath();cx.moveTo(-5,0);cx.bezierCurveTo(-5,22*Math.abs(wing),-8+wing*15,22,-16,16*Math.abs(wing));
                    cx.bezierCurveTo(-8,-4,0,-4,-5,0);cx.fillStyle='rgba(220,222,228,0.82)';cx.fill();
                    // beak — red
                    cx.beginPath();cx.moveTo(19,0);cx.lineTo(28,-1);cx.strokeStyle='rgba(200,45,35,0.85)';cx.lineWidth=2.5;cx.stroke();
                    cx.restore();
                });
            };
        })();

        /* ═══════════════════════════════════
           18 · VOLCANIC PLUME AT SEA
           The island is still becoming —
           it was never finished, never will be
        ═══════════════════════════════════ */
        (() => {
            const plumePuffs=Array.from({length:80},(_,i)=>({x:W*0.52+rnd(-30,30),y:H*0.42,vy:-rnd(0.8,3.5),vx:(Math.random()-0.5)*1.5,sz:rnd(25,90),al:rnd(0.06,0.18),ph:Math.random()*Math.PI*2}));
            const lavaFlows=Array.from({length:5},(_,i)=>({x:W*0.42+i*W*0.04,angle:rnd(-0.3,0.3),len:rnd(H*0.08,H*0.22)}));
            R[18]=(gt,st,tot)=>{
                const cx=ctxs[18];const p=ei(st/tot);
                cx.fillStyle='rgba(3,2,1,0.22)';cx.fillRect(0,0,W,H);
                // haze-filled sky — grey with pink volcanic glow
                const sky=cx.createLinearGradient(0,0,0,H*0.5);
                sky.addColorStop(0,`rgba(${Math.floor(L(12,35,p))},${Math.floor(L(8,20,p))},${Math.floor(L(6,12,p))},0.6)`);
                sky.addColorStop(0.4,`rgba(${Math.floor(L(30,70,p))},${Math.floor(L(18,35,p))},${Math.floor(L(10,16,p))},0.4)`);
                sky.addColorStop(1,'rgba(0,0,0,0)');
                cx.fillStyle=sky;cx.fillRect(0,0,W,H*0.5);
                // ocean
                cx.beginPath();cx.moveTo(0,H);
                for(let x=0;x<=W;x+=10)cx.lineTo(x,H*0.62+Math.sin(x*0.007+gt*0.015)*18+Math.sin(x*0.018+gt*0.025)*8);
                cx.lineTo(W,H);cx.closePath();
                const seaG=cx.createLinearGradient(0,H*0.62,0,H);
                seaG.addColorStop(0,`rgba(${Math.floor(L(12,20,p))},${Math.floor(L(35,55,p))},${Math.floor(L(65,95,p))},0.9)`);
                seaG.addColorStop(1,'rgba(4,15,35,0.97)');
                cx.fillStyle=seaG;cx.fill();
                // volcanic island — dark cone emerging from sea
                cx.beginPath();cx.moveTo(0,H);cx.lineTo(W*0.25,H*0.62);cx.lineTo(W*0.38,H*0.45);cx.lineTo(W*0.52,H*0.32);cx.lineTo(W*0.62,H*0.42);cx.lineTo(W*0.72,H*0.58);cx.lineTo(W,H*0.62);cx.lineTo(W,H);cx.closePath();
                const islandG=cx.createLinearGradient(W*0.25,H*0.62,W*0.52,H*0.32);
                islandG.addColorStop(0,'rgba(15,10,6,0.97)');islandG.addColorStop(0.5,'rgba(22,15,8,0.95)');islandG.addColorStop(1,'rgba(30,20,10,0.92)');
                cx.fillStyle=islandG;cx.fill();
                // lava flows on flanks — glowing orange rivers
                lavaFlows.forEach(lf=>{
                    cx.save();cx.translate(lf.x,H*0.42);cx.rotate(lf.angle);
                    for(let seg=0;seg<8;seg++){
                        const sy=seg*(lf.len/7);const width=8-seg;
                        cx.beginPath();cx.rect(-width*0.5,sy,width,lf.len/7+2);
                        const lg=cx.createLinearGradient(-width,0,width,0);
                        lg.addColorStop(0,'rgba(0,0,0,0)');
                        lg.addColorStop(0.3,`rgba(255,${Math.floor(L(80,160,p))},${Math.floor(L(0,20,p))},${0.6*(1-seg/8)})`);
                        lg.addColorStop(0.7,`rgba(220,${Math.floor(L(50,100,p))},0,${0.4*(1-seg/8)})`);
                        lg.addColorStop(1,'rgba(0,0,0,0)');
                        cx.fillStyle=lg;cx.fill();
                    }
                    cx.restore();
                });
                // summit glow
                const summitG=cx.createRadialGradient(W*0.52,H*0.32,0,W*0.52,H*0.35,W*0.12);
                summitG.addColorStop(0,`rgba(255,${Math.floor(L(80,160,p))},0,${0.4+Math.sin(gt*0.05)*0.08})`);
                summitG.addColorStop(0.3,`rgba(200,${Math.floor(L(40,80,p))},0,0.15)`);
                summitG.addColorStop(1,'rgba(0,0,0,0)');
                cx.fillStyle=summitG;cx.fillRect(W*0.3,H*0.1,W*0.44,H*0.4);
                // volcanic plume
                plumePuffs.forEach(pf=>{
                    pf.y+=pf.vy;pf.x+=pf.vx+Math.sin(gt*0.01+pf.ph)*1.5;pf.sz+=0.3;
                    if(pf.y<-pf.sz||pf.sz>200){pf.y=H*0.38;pf.x=W*0.52+rnd(-25,25);pf.sz=rnd(25,60);}
                    const riseAl=Math.max(0,(H*0.38-pf.y)/(H*0.38));
                    const sg=cx.createRadialGradient(pf.x,pf.y,0,pf.x,pf.y,pf.sz);
                    const smR=Math.floor(L(60,90,riseAl)),smG2=Math.floor(L(50,75,riseAl)),smB=Math.floor(L(45,68,riseAl));
                    sg.addColorStop(0,`rgba(${smR},${smG2},${smB},${pf.al*riseAl})`);sg.addColorStop(1,'rgba(0,0,0,0)');
                    cx.fillStyle=sg;cx.fillRect(pf.x-pf.sz,pf.y-pf.sz,pf.sz*2,pf.sz*2);
                });
                // steam where lava meets sea
                for(let i=0;i<4;i++){
                    const sx=W*(0.62+i*0.03),sy=H*0.6;
                    const stg=cx.createRadialGradient(sx,sy,0,sx,sy-30,30);
                    stg.addColorStop(0,`rgba(200,210,220,${0.15+Math.sin(gt*0.04+i)*0.05})`);stg.addColorStop(1,'rgba(0,0,0,0)');
                    cx.fillStyle=stg;cx.fillRect(sx-35,sy-60,70,65);
                }
            };
        })();

        /* ═══════════════════════════════════
           19 · LANTERN DESCENDS RIVER
           Released without destination —
           the current knows what you don't
        ═══════════════════════════════════ */
        (() => {
            const currentLines2=Array.from({length:20},(_,i)=>({y:H*0.25+i*(H*0.65/19),ph:i*0.3,spd:0.008+i*0.002,amp:8+i*4}));
            const floatingLanterns=Array.from({length:12},(_,i)=>({
                x:rnd(-W*0.1,W*0.4),y:H*(0.3+i*0.045)+rnd(-15,15),
                vx:rnd(0.4,1.2),vy:(Math.random()-0.5)*0.1,
                sz:rnd(0.6,1.1),hue:rnd(20,55),ph:Math.random()*Math.PI*2,
                born:rnd(0,0.5)
            }));
            R[19]=(gt,st,tot)=>{
                const cx=ctxs[19];const p=ei(st/tot);
                cx.fillStyle='rgba(1,3,5,0.22)';cx.fillRect(0,0,W,H);
                // night riverside — very dark
                const bg=cx.createLinearGradient(0,0,0,H);
                bg.addColorStop(0,'rgba(1,4,10,0.55)');bg.addColorStop(0.5,'rgba(2,6,14,0.4)');bg.addColorStop(1,'rgba(0,2,6,0.3)');
                cx.fillStyle=bg;cx.fillRect(0,0,W,H);
                // stars reflecting in river
                for(let i=0;i<80;i++){
                    const sx=((i*337)%W),sy=((i*197)%H);
                    const tw=Math.sin(gt*0.04+i)*0.3+0.7;
                    cx.beginPath();cx.arc(sx,sy,rnd(0.2,1.2),0,Math.PI*2);
                    cx.fillStyle=`rgba(255,255,255,${tw*0.3})`;cx.fill();
                }
                // river current lines — gentle flow
                currentLines2.forEach(cl=>{
                    cx.beginPath();cx.moveTo(-20,cl.y);
                    for(let x=0;x<=W+20;x+=14)cx.lineTo(x,cl.y+Math.sin(x*0.007+gt*cl.spd+cl.ph)*cl.amp);
                    cx.strokeStyle=`rgba(${Math.floor(L(20,35,p))},${Math.floor(L(50,80,p))},${Math.floor(L(90,140,p))},0.055)`;cx.lineWidth=0.8;cx.stroke();
                });
                // river banks — dark reeds and earth
                // left bank
                cx.beginPath();cx.rect(0,0,W*0.08,H);cx.fillStyle='rgba(5,5,3,0.97)';cx.fill();
                cx.beginPath();for(let i=0;i<12;i++){const rx=rnd(W*0.04,W*0.12),ry=rnd(H*0.1,H*0.9);cx.moveTo(rx,ry);cx.lineTo(rx+rnd(-4,4),ry-rnd(20,55));}
                cx.strokeStyle='rgba(12,16,6,0.7)';cx.lineWidth=2;cx.stroke();
                // right bank receding
                cx.beginPath();cx.rect(W*0.92,0,W*0.08,H);cx.fillStyle='rgba(5,5,3,0.97)';cx.fill();
                // lanterns floating downstream
                floatingLanterns.forEach(l=>{
                    const vis=Math.max(0,(p-l.born)*2.5);if(vis<0.01)return;
                    l.x+=l.vx*vis;l.y+=l.vy+Math.sin(gt*0.015+l.ph)*0.3;
                    if(l.x>W+60)l.x=-60;
                    // water reflection glow
                    const refY=l.y+l.sz*35;
                    const refg=cx.createRadialGradient(l.x,refY,0,l.x,refY,l.sz*50);
                    refg.addColorStop(0,`hsla(${l.hue},85%,60%,${vis*0.25})`);refg.addColorStop(1,'rgba(0,0,0,0)');
                    cx.fillStyle=refg;cx.fillRect(l.x-l.sz*55,refY-l.sz*25,l.sz*110,l.sz*50);
                    // undulating reflection streak
                    cx.beginPath();cx.moveTo(l.x-l.sz*12,refY);
                    for(let rx=l.x-l.sz*12;rx<=l.x+l.sz*12;rx+=4)cx.lineTo(rx,refY+Math.sin(rx*0.2+gt*0.05)*3*l.sz);
                    cx.strokeStyle=`hsla(${l.hue},80%,65%,${vis*0.2})`;cx.lineWidth=l.sz*4;cx.stroke();
                    // lantern body
                    cx.save();cx.translate(l.x,l.y);
                    // outer glow
                    const og=cx.createRadialGradient(0,0,0,0,0,l.sz*45);
                    og.addColorStop(0,`hsla(${l.hue},90%,68%,${vis*0.2})`);og.addColorStop(1,'rgba(0,0,0,0)');
                    cx.fillStyle=og;cx.fillRect(-l.sz*50,-l.sz*50,l.sz*100,l.sz*100);
                    // paper lantern
                    cx.beginPath();cx.ellipse(0,0,l.sz*14,l.sz*18,Math.sin(gt*0.04+l.ph)*0.05,0,Math.PI*2);
                    const lg2=cx.createRadialGradient(0,0,0,0,0,l.sz*16);
                    lg2.addColorStop(0,`hsla(${l.hue},95%,80%,${vis*0.88})`);
                    lg2.addColorStop(0.5,`hsla(${l.hue},85%,60%,${vis*0.6})`);
                    lg2.addColorStop(1,`hsla(${l.hue},70%,35%,${vis*0.2})`);
                    cx.fillStyle=lg2;cx.fill();
                    // ribbing
                    for(let r=-2;r<=2;r++){
                        cx.beginPath();cx.ellipse(0,r*l.sz*3.5,l.sz*14,l.sz*2,0,0,Math.PI*2);
                        cx.strokeStyle=`hsla(${l.hue},60%,40%,${vis*0.15})`;cx.lineWidth=1;cx.stroke();
                    }
                    // flame
                    cx.beginPath();cx.ellipse(0,l.sz*14,l.sz*3,l.sz*5+Math.sin(gt*0.1+l.ph)*l.sz,0,0,Math.PI*2);
                    cx.fillStyle=`rgba(255,210,80,${vis*0.7})`;cx.fill();
                    cx.restore();
                });
                // far bank glow — many lanterns ahead in the distance
                const distGlow=cx.createLinearGradient(W*0.75,0,W,0);
                distGlow.addColorStop(0,'rgba(0,0,0,0)');
                distGlow.addColorStop(0.5,`rgba(255,${Math.floor(L(120,180,p))},${Math.floor(L(20,50,p))},${p*0.08})`);
                distGlow.addColorStop(1,'rgba(0,0,0,0)');
                cx.fillStyle=distGlow;cx.fillRect(W*0.6,H*0.3,W*0.4,H*0.5);
                // temple/pagoda silhouette far right
                if(p>0.2){
                    const tx=W*0.87,ty=H*0.45;const tal=(p-0.2)*0.7;
                    cx.save();cx.globalAlpha=tal;
                    // pagoda tiers
                    [[0,0,W*0.03,H*0.04],[0,-H*0.04,W*0.022,H*0.032],[0,-H*0.072,W*0.015,H*0.025]].forEach(([ox,oy,rw,rh])=>{
                        cx.beginPath();cx.moveTo(tx+ox-rw,ty+oy+rh);cx.lineTo(tx+ox,ty+oy);cx.lineTo(tx+ox+rw,ty+oy+rh);cx.closePath();
                        cx.fillStyle='rgba(10,7,3,0.92)';cx.fill();
                    });
                    cx.restore();
                }
            };
        })();

        goTo(0);
        document.getElementById('scene-name').textContent=SCENES[0].name;
        masterLoop();
    </script>
</body>
