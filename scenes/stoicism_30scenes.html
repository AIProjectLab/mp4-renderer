<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stoicism Visual Engine — 30 Scenes</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Georgia',serif;}

/* ── CANVAS STAGE ── */
#stage{
  position:fixed;top:0;left:0;right:0;
  bottom:110px;
  display:flex;align-items:center;justify-content:center;
  background:#000;
}
#wrapper{position:relative;transform-origin:center center;}
#wrapper canvas{position:absolute;top:0;left:0;width:1920px;height:1080px;display:none;}
#wrapper canvas.active{display:block;}

/* ── BOTTOM PANEL ── */
#panel{
  position:fixed;bottom:0;left:0;right:0;height:110px;
  background:rgba(4,4,6,0.97);
  border-top:1px solid rgba(255,255,255,0.07);
  display:flex;flex-direction:column;gap:0;
  padding:0 20px;
  backdrop-filter:blur(20px);
}

/* progress bar */
#progress-wrap{
  height:3px;width:100%;background:rgba(255,255,255,0.06);
  position:relative;cursor:pointer;flex-shrink:0;
}
#progress-fill{
  height:100%;background:linear-gradient(90deg,#ffc850,#ff8c40);
  width:0%;transition:width 0.3s linear;
  position:relative;
}
#progress-fill::after{
  content:'';position:absolute;right:-4px;top:-3px;
  width:9px;height:9px;border-radius:50%;
  background:#ffc850;box-shadow:0 0 8px #ffc850;
}
#progress-wrap:hover #progress-fill::after{transform:scale(1.4);}

/* main controls row */
#controls{
  display:flex;align-items:center;gap:14px;
  padding:8px 0 4px;flex-shrink:0;
}

/* play/pause */
#playbtn{
  width:42px;height:42px;border-radius:50%;
  border:1px solid rgba(255,200,80,0.4);
  background:rgba(255,200,80,0.08);
  color:#ffc850;font-size:16px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;flex-shrink:0;
}
#playbtn:hover{background:rgba(255,200,80,0.18);border-color:#ffc850;}

/* prev/next */
.navbtn{
  width:34px;height:34px;border-radius:50%;
  border:1px solid rgba(255,255,255,0.12);
  background:transparent;color:rgba(255,255,255,0.5);
  font-size:13px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;flex-shrink:0;
}
.navbtn:hover{border-color:rgba(255,255,255,0.35);color:#fff;}

/* scene info */
#scene-info{
  display:flex;flex-direction:column;gap:2px;margin-right:auto;
}
#scene-name{font-size:13px;color:rgba(255,255,255,0.8);letter-spacing:.04em;}
#scene-counter{font-size:11px;color:rgba(255,255,255,0.28);letter-spacing:.08em;}

/* timer */
#timer-wrap{display:flex;align-items:center;gap:8px;flex-shrink:0;}
#timer-display{font-size:12px;color:rgba(255,255,255,0.35);letter-spacing:.08em;font-variant-numeric:tabular-nums;}
#speed-btn{
  padding:4px 10px;border-radius:3px;
  border:1px solid rgba(255,255,255,0.1);
  background:transparent;color:rgba(255,255,255,0.35);
  font-size:11px;cursor:pointer;transition:all .2s;
}
#speed-btn:hover{border-color:rgba(255,255,255,0.3);color:rgba(255,255,255,0.7);}

/* scene strip */
#strip-wrap{overflow-x:auto;flex:1;padding:6px 0 8px;scrollbar-width:none;}
#strip-wrap::-webkit-scrollbar{display:none;}
#strip{display:flex;gap:6px;align-items:center;min-width:max-content;}
.thumb{
  flex-shrink:0;width:72px;height:40px;border-radius:4px;
  border:1px solid rgba(255,255,255,0.08);
  background:rgba(255,255,255,0.04);
  cursor:pointer;transition:all .15s;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;position:relative;overflow:hidden;
}
.thumb:hover{border-color:rgba(255,255,255,0.25);background:rgba(255,255,255,0.08);}
.thumb.active{border-color:#ffc850;background:rgba(255,200,80,0.1);}
.thumb .tnum{font-size:9px;color:rgba(255,255,255,0.25);letter-spacing:.06em;}
.thumb .tname{font-size:9px;color:rgba(255,255,255,0.55);text-align:center;line-height:1.2;padding:0 4px;}
.thumb.active .tname{color:#ffc850;}
.thumb .tbar{
  position:absolute;bottom:0;left:0;height:2px;
  background:#ffc850;width:0%;transition:width 0.1s linear;
}
</style>
</head>
<body>

<div id="stage">
  <div id="wrapper"></div>
</div>

<!-- BOTTOM PANEL -->
<div id="panel">
  <div id="progress-wrap" onclick="seekByClick(event)">
    <div id="progress-fill"></div>
  </div>
  <div id="controls">
    <button class="navbtn" onclick="prevScene()">&#9664;</button>
    <button id="playbtn" onclick="togglePlay()">&#9654;</button>
    <button class="navbtn" onclick="nextScene()">&#9654;&#9654;</button>
    <div id="scene-info">
      <div id="scene-name">Loading…</div>
      <div id="scene-counter">Scene 1 of 30</div>
    </div>
    <div id="timer-wrap">
      <div id="timer-display">0:00 / 0:00</div>
      <button id="speed-btn" onclick="cycleSpeed()">1×</button>
    </div>
  </div>
  <div id="strip-wrap">
    <div id="strip"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  SCENE DEFINITIONS
// ═══════════════════════════════════════════════════════
const SCENES=[
  {name:'Crumbling Stone',      dur:18, color:'#888'},
  {name:'Dual Orbs',            dur:16, color:'#c84'},
  {name:'Ripple Pond',          dur:20, color:'#48f'},
  {name:'Solar System',         dur:18, color:'#fa8'},
  {name:'Fire to Gold',         dur:20, color:'#f84'},
  {name:'Sand Mandala',         dur:22, color:'#fc8'},
  {name:'Storm Horizon',        dur:20, color:'#68a'},
  {name:'Fortress Walls',       dur:18, color:'#aa8'},
  {name:'Thread of Light',      dur:16, color:'#ffc'},
  {name:'Constellation',        dur:20, color:'#aaf'},
  {name:'Smoke Spiral',         dur:16, color:'#998'},
  {name:'Infinity Knot',        dur:18, color:'#c8f'},
  {name:'Deep Ocean Drift',     dur:20, color:'#28c'},
  {name:'Hourglass Sand',       dur:18, color:'#ca8'},
  {name:'Mirror Lake',          dur:16, color:'#4ac'},
  {name:'Atom Orbits',          dur:18, color:'#8cf'},
  {name:'Phoenix Embers',       dur:20, color:'#f62'},
  {name:'Sacred Geometry',      dur:22, color:'#fda'},
  {name:'Nebula Bloom',         dur:20, color:'#a6f'},
  {name:'Mountain Silhouette',  dur:18, color:'#689'},
  {name:'DNA Helix',            dur:16, color:'#6fc'},
  {name:'Tidal Breath',         dur:20, color:'#48e'},
  {name:'Gold Dust Fall',       dur:18, color:'#fb6'},
  {name:'Eye of Calm',          dur:16, color:'#8df'},
  {name:'Stone Circles',        dur:20, color:'#876'},
  {name:'Aurora Flow',          dur:22, color:'#4fc'},
  {name:'Void Lotus',           dur:18, color:'#daf'},
  {name:'Solar Flare',          dur:16, color:'#f96'},
  {name:'Fractal Tree',         dur:20, color:'#8c6'},
  {name:'Final Peace',          dur:24, color:'#ffd'},
];

const W=1920,H=1080;
const SPEEDS=[1,1.5,2,0.5];
let speedIdx=0;
let currentScene=0;
let isPlaying=false;
let sceneTimer=0;       // frames elapsed in current scene
let raf=null;
const ctxs=[];

// ── BUILD CANVASES ──
const wrapper=document.getElementById('wrapper');
wrapper.style.width=W+'px';
wrapper.style.height=H+'px';
for(let i=0;i<SCENES.length;i++){
  const c=document.createElement('canvas');
  c.width=W;c.height=H;
  c.id='cv'+i;
  wrapper.appendChild(c);
  ctxs.push(c.getContext('2d'));
}

// ── SCALE ──
function scaleStage(){
  const stage=document.getElementById('stage');
  const sw=stage.clientWidth,sh=stage.clientHeight;
  const s=Math.min(sw/W,sh/H);
  wrapper.style.transform=`scale(${s})`;
  wrapper.style.marginLeft=((sw-W*s)/2)+'px';
  wrapper.style.marginTop=((sh-H*s)/2)+'px';
}
window.addEventListener('resize',scaleStage);scaleStage();

// ── BUILD STRIP ──
const strip=document.getElementById('strip');
SCENES.forEach((sc,i)=>{
  const d=document.createElement('div');
  d.className='thumb'+(i===0?' active':'');
  d.id='th'+i;
  d.innerHTML=`<div class="tnum">${String(i+1).padStart(2,'0')}</div><div class="tname">${sc.name}</div><div class="tbar" id="tb${i}"></div>`;
  d.onclick=()=>goTo(i);
  strip.appendChild(d);
});

// ── PLAYBACK ENGINE ──
let frameT=0;
const FPS=60;

function masterLoop(){
  raf=requestAnimationFrame(masterLoop);
  frameT++;
  const sc=SCENES[currentScene];
  const totalFrames=sc.dur*FPS/SPEEDS[speedIdx];

  if(isPlaying){
    sceneTimer++;
    if(sceneTimer>=totalFrames){
      if(currentScene<SCENES.length-1){goTo(currentScene+1);}
      else{isPlaying=false;updatePlayBtn();}
    }
  }

  // draw current scene
  RENDERERS[currentScene](frameT,sceneTimer,totalFrames);
  updateUI(sc,totalFrames);
}

function updateUI(sc,totalFrames){
  const pct=Math.min(1,sceneTimer/totalFrames)*100;
  document.getElementById('progress-fill').style.width=pct+'%';
  document.getElementById('tb'+currentScene).style.width=pct+'%';

  const elapsed=Math.floor(sceneTimer/FPS*SPEEDS[speedIdx]);
  const total=sc.dur;
  document.getElementById('timer-display').textContent=
    `${fmt(elapsed)} / ${fmt(total)}`;

  // total video progress
  const totalDur=SCENES.reduce((a,s)=>a+s.dur,0);
  const doneDur=SCENES.slice(0,currentScene).reduce((a,s)=>a+s.dur,0)+elapsed;
  document.getElementById('progress-fill').style.width=
    (doneDur/totalDur*100)+'%';
}

function fmt(s){return Math.floor(s/60)+':'+(s%60<10?'0':'')+s%60;}

function goTo(i){
  document.getElementById('cv'+currentScene).classList.remove('active');
  document.getElementById('th'+currentScene).classList.remove('active');
  document.getElementById('tb'+currentScene).style.width='0%';
  currentScene=i;
  sceneTimer=0;
  document.getElementById('cv'+i).classList.add('active');
  document.getElementById('th'+i).classList.add('active');
  document.getElementById('scene-name').textContent=SCENES[i].name;
  document.getElementById('scene-counter').textContent=`Scene ${i+1} of ${SCENES.length}`;
  // scroll thumb into view
  document.getElementById('th'+i).scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
}

function prevScene(){if(currentScene>0)goTo(currentScene-1);}
function nextScene(){if(currentScene<SCENES.length-1)goTo(currentScene+1);}

function togglePlay(){
  isPlaying=!isPlaying;
  updatePlayBtn();
}
function updatePlayBtn(){
  document.getElementById('playbtn').innerHTML=isPlaying?'&#9646;&#9646;':'&#9654;';
}

function cycleSpeed(){
  speedIdx=(speedIdx+1)%SPEEDS.length;
  document.getElementById('speed-btn').textContent=SPEEDS[speedIdx]+'×';
}

function seekByClick(e){
  const rect=e.currentTarget.getBoundingClientRect();
  const pct=(e.clientX-rect.left)/rect.width;
  const totalDur=SCENES.reduce((a,s)=>a+s.dur,0);
  let acc=0,target=pct*totalDur;
  for(let i=0;i<SCENES.length;i++){
    if(acc+SCENES[i].dur>=target){
      goTo(i);
      sceneTimer=Math.floor((target-acc)*FPS/SPEEDS[speedIdx]);
      break;
    }
    acc+=SCENES[i].dur;
  }
}

// ── HELPERS ──
function lerp(a,b,t){return a+(b-a)*t;}
function rnd(a,b){return a+Math.random()*(b-a);}
function easeInOut(t){return t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;}

// ═══════════════════════════════════════════════════════
//  RENDERERS — one per scene
// ═══════════════════════════════════════════════════════
// Each: fn(globalT, sceneT, totalFrames)
// globalT = frame counter (never resets)
// sceneT  = frame within this scene (resets on goTo)
// totalFrames = total frames for this scene at current speed

const RENDERERS=[];

/* ── shared particle factory ── */
function makePts(n,opts={}){
  return Array.from({length:n},()=>({
    x:rnd(opts.x0??0,opts.x1??W),
    y:rnd(opts.y0??0,opts.y1??H),
    vx:(Math.random()-.5)*(opts.spd??0.5),
    vy:(Math.random()-.5)*(opts.spd??0.5),
    r:rnd(opts.rMin??1,opts.rMax??3),
    a:Math.random(),
    phase:Math.random()*Math.PI*2,
    col:opts.col??[255,255,255],
  }));
}

// ─── 0 · CRUMBLING STONE → SOLID ───
(()=>{
  const N=1800;
  const pts=Array.from({length:N},(_,i)=>{
    const a=(i/N)*Math.PI*2,tr=rnd(0,160)*(1+Math.abs(Math.cos(a*6))*.3);
    return{
      sx:W/2+Math.cos(Math.random()*Math.PI*2)*rnd(200,900),
      sy:H/2+Math.sin(Math.random()*Math.PI*2)*rnd(100,500),
      tx:W/2+Math.cos(a)*tr,ty:H/2+Math.sin(a)*tr,
      x:0,y:0,sz:rnd(1,3.5),col:rnd(140,220),ph:Math.random()*Math.PI*2,
    };
  });
  pts.forEach(p=>{p.x=p.sx;p.y=p.sy;});
  RENDERERS[0]=(gt,st,tot)=>{
    const cx=ctxs[0];
    const prog=st/tot,cyc=prog%1;
    const lp=cyc<.45?cyc/.45:cyc<.55?1:1-(cyc-.55)/.45;
    const ease=easeInOut(lp);
    cx.fillStyle='rgba(0,0,0,0.18)';cx.fillRect(0,0,W,H);
    pts.forEach(p=>{
      p.x=lerp(p.sx,p.tx,ease)+Math.sin(gt*.02+p.ph)*2*(1-ease);
      p.y=lerp(p.sy,p.ty,ease)+Math.cos(gt*.02+p.ph)*2*(1-ease);
      const br=Math.floor(lerp(p.col*.5,p.col,ease));
      cx.beginPath();cx.arc(p.x,p.y,p.sz*(.6+ease*.4),0,Math.PI*2);
      cx.fillStyle=`rgba(${br},${br-10},${br-30},${.4+ease*.5})`;cx.fill();
    });
    if(ease>.5){const g=cx.createRadialGradient(W/2,H/2,0,W/2,H/2,200);
      g.addColorStop(0,`rgba(255,230,180,${(ease-.5)*.15})`);g.addColorStop(1,'rgba(0,0,0,0)');
      cx.fillStyle=g;cx.fillRect(0,0,W,H);}
  };
})();

// ─── 1 · DUAL ORBS ───
(()=>{
  const chaos=Array.from({length:300},()=>({a:Math.random()*Math.PI*2,r:rnd(20,110),spd:rnd(.04,.14)*(Math.random()<.5?1:-1),sz:rnd(1,3),ra:rnd(220,255),gb:rnd(40,120)}));
  const calm=Array.from({length:300},()=>({a:Math.random()*Math.PI*2,r:rnd(10,100),spd:rnd(.002,.008),sz:rnd(1,2.5),ph:Math.random()*Math.PI*2}));
  RENDERERS[1]=(gt,st,tot)=>{
    const cx=ctxs[1];const prog=st/tot;
    const mergeP=prog<.55?0:Math.min(1,(prog-.55)/.35);
    const ease=easeInOut(mergeP);
    cx.fillStyle='rgba(0,0,0,0.15)';cx.fillRect(0,0,W,H);
    const lx=lerp(W*.3,W/2,ease),rx=lerp(W*.7,W/2,ease);
    chaos.forEach(p=>{p.a+=p.spd*(1-ease*.7);
      const jx=(1-ease)*(Math.random()-.5)*6,jy=(1-ease)*(Math.random()-.5)*6;
      cx.beginPath();cx.arc(lx+Math.cos(p.a)*p.r*(1-ease*.5)+jx,H/2+Math.sin(p.a)*p.r*(1-ease*.5)+jy,p.sz,0,Math.PI*2);
      cx.fillStyle=`rgba(${p.ra},${Math.floor(p.gb*(1-ease))},${Math.floor(40*(1-ease))},${.6+Math.random()*.2})`;cx.fill();});
    const cg=cx.createRadialGradient(lx,H/2,0,lx,H/2,130);
    cg.addColorStop(0,`rgba(255,80,20,${.08*(1-ease)})`);cg.addColorStop(1,'rgba(0,0,0,0)');
    cx.fillStyle=cg;cx.fillRect(0,0,W,H);
    calm.forEach(p=>{p.a+=p.spd;
      cx.beginPath();cx.arc(rx+Math.cos(p.a)*p.r*(1+ease*.3),H/2+Math.sin(p.a+Math.cos(gt*.01+p.ph)*.3)*p.r*(1+ease*.3),p.sz*(.8+ease*.4),0,Math.PI*2);
      cx.fillStyle=`rgba(${Math.floor(lerp(0,200,ease))},${Math.floor(lerp(150,220,ease))},${Math.floor(lerp(180,255,ease))},${.5+ease*.3})`;cx.fill();});
    if(ease>.7){const mg=cx.createRadialGradient(W/2,H/2,0,W/2,H/2,200);
      mg.addColorStop(0,`rgba(255,220,100,${(ease-.7)*.3})`);mg.addColorStop(1,'rgba(0,0,0,0)');
      cx.fillStyle=mg;cx.fillRect(0,0,W,H);}
  };
})();

// ─── 2 · RIPPLE POND ───
(()=>{
  const ripples=[];let nextDrop=80;
  const shimmer=Array.from({length:120},()=>({x:rnd(100,W-100),y:rnd(200,H-200),ph:Math.random()*Math.PI*2,sz:rnd(.5,2)}));
  RENDERERS[2]=(gt,st,tot)=>{
    const cx=ctxs[2];
    cx.fillStyle='rgba(2,8,18,0.25)';cx.fillRect(0,0,W,H);
    shimmer.forEach(s=>{const b=(Math.sin(gt*.03+s.ph)+1)/2;cx.beginPath();cx.arc(s.x,s.y,s.sz,0,Math.PI*2);cx.fillStyle=`rgba(120,180,255,${b*.06})`;cx.fill();});
    if(gt>=nextDrop){
      ripples.push({x:Math.random()<.3?W/2:rnd(W*.2,W*.8),y:Math.random()<.3?H/2:rnd(H*.25,H*.75),r:0,maxR:rnd(180,420),alpha:.6,spd:rnd(1.2,2.4)});
      nextDrop=gt+rnd(60,180);
    }
    for(let i=ripples.length-1;i>=0;i--){
      const rp=ripples[i];rp.r+=rp.spd;rp.alpha*=.985;
      if(rp.r>rp.maxR||rp.alpha<.01){ripples.splice(i,1);continue;}
      const fade=rp.alpha*(1-rp.r/rp.maxR);
      for(let ring=0;ring<3;ring++){const ro=rp.r-ring*18;if(ro<=0)continue;
        cx.beginPath();cx.ellipse(rp.x,rp.y,ro,ro*.28,0,0,Math.PI*2);
        cx.strokeStyle=`rgba(100,170,255,${fade*(1-ring*.3)})`;cx.lineWidth=1-ring*.2;cx.stroke();}
    }
    const mr=cx.createLinearGradient(W/2-80,0,W/2+80,0);
    mr.addColorStop(0,'rgba(255,255,255,0)');mr.addColorStop(.5,`rgba(200,230,255,${.015+Math.sin(gt*.008)*.005})`);mr.addColorStop(1,'rgba(255,255,255,0)');
    cx.fillStyle=mr;cx.fillRect(W/2-80,0,160,H);
  };
})();

// ─── 3 · SOLAR SYSTEM ───
(()=>{
  const orbits=[
    {r:160,spd:.025,sz:14,col:'220,80,60'},{r:240,spd:-.018,sz:10,col:'200,120,40'},
    {r:320,spd:.032,sz:18,col:'180,60,180'},{r:400,spd:-.014,sz:12,col:'80,160,220'},
    {r:460,spd:.022,sz:8,col:'200,200,60'},{r:520,spd:-.009,sz:16,col:'60,200,140'},
    {r:570,spd:.016,sz:7,col:'200,80,100'},
  ];
  orbits.forEach(o=>{o.angle=Math.random()*Math.PI*2;});
  const trails=orbits.map(()=>[]);
  RENDERERS[3]=(gt,st,tot)=>{
    const cx=ctxs[3];
    cx.fillStyle='rgba(0,0,0,0.12)';cx.fillRect(0,0,W,H);
    const ox=W/2,oy=H/2;
    orbits.forEach(o=>{cx.beginPath();cx.arc(ox,oy,o.r,0,Math.PI*2);cx.strokeStyle='rgba(255,255,255,0.04)';cx.lineWidth=.5;cx.stroke();});
    const pg=(Math.sin(gt*.03)*.5+.5);
    const sg=cx.createRadialGradient(ox,oy,0,ox,oy,80);
    sg.addColorStop(0,`rgba(255,220,160,${.25+pg*.1})`);sg.addColorStop(1,'rgba(0,0,0,0)');
    cx.fillStyle=sg;cx.fillRect(0,0,W,H);
    cx.beginPath();cx.arc(ox,oy,22,0,Math.PI*2);cx.fillStyle=`rgba(255,230,180,${.9+pg*.1})`;cx.fill();
    cx.beginPath();cx.arc(ox,oy,14,0,Math.PI*2);cx.fillStyle='rgba(255,255,240,1)';cx.fill();
    orbits.forEach((o,i)=>{
      o.angle+=o.spd;const px=ox+Math.cos(o.angle)*o.r,py=oy+Math.sin(o.angle)*o.r;
      trails[i].push({x:px,y:py});if(trails[i].length>40)trails[i].shift();
      trails[i].forEach((tp,ti)=>{const fa=ti/trails[i].length;cx.beginPath();cx.arc(tp.x,tp.y,o.sz*.4*fa,0,Math.PI*2);cx.fillStyle=`rgba(${o.col},${fa*.3})`;cx.fill();});
      cx.beginPath();cx.arc(px+(Math.random()-.5)*3,py+(Math.random()-.5)*3,o.sz,0,Math.PI*2);
      cx.fillStyle=`rgba(${o.col},0.85)`;cx.fill();
    });
  };
})();

// ─── 4 · FIRE → GOLD ───
(()=>{
  const pts=Array.from({length:600},()=>({x:rnd(W*.25,W*.75),y:H+rnd(0,200),vx:(Math.random()-.5)*1.2,vy:-rnd(1.5,4.5),age:0,maxLife:rnd(80,200),sz:rnd(2,8),ph:Math.random()*Math.PI*2}));

    cx.fillStyle='rgba(4,2,0,0.2)';cx.fillRect(0,0,W,H);
    const ox=W/2,oy=H/2;
    layers.forEach((l,li)=>{

        cx.strokeStyle=`rgba(255,200,80,${lp*al*(.15+li*.02)})`;cx.lineWidth=.8;cx.stroke();

    });
    [12,28,48,72].forEach((r,i)=>{const cp=Math.max(0,Math.min(1,(bp-.1*i)/.3));if(cp<=0)return;cx.beginPath();cx.arc(ox,oy,r,0,Math.PI*2);cx.strokeStyle=`rgba(255,220,100,${cp*al*.4})`;cx.lineWidth=.8;cx.stroke();});

(()=>{
  function makeBlocks(){
    const bl=[],bY=H*.65,lays=[{y:0,n:18,w:108,h:55},{y:55,n:14,w:110,h:58},{y:113,n:10,w:124,h:60},{y:173,n:7,w:130,h:62},{y:235,n:5,w:130,h:65},{y:300,n:9,w:56,h:45,cr:true}];

    return bl;
  }
  const blocks=makeBlocks();
  RENDERERS[7]=(gt,st,tot)=>{

      cx.fillStyle=`rgba(0,0,0,${.3*le})`;cx.fillRect(b.x+b.w-3,cy,3,b.h);

// ─── 13 · HOURGLASS SAND ───
(()=>{
  const grains=Array.from({length:600},(_,i)=>({x:rnd(W/2-80,W/2+80),y:rnd(H*.15,H*.45),vy:rnd(.5,2),done:false,ph:Math.random()*Math.PI*2,sz:rnd(1,3)}));
  RENDERERS[13]=(gt,st,tot)=>{
    const cx=ctxs[13];const prog=Math.min(st/tot,1);
    cx.fillStyle='rgba(0,0,0,0.14)';cx.fillRect(0,0,W,H);
    // hourglass outline
    const mx=W/2;
    cx.beginPath();cx.moveTo(mx-180,H*.12);cx.lineTo(mx+180,H*.12);cx.lineTo(mx+8,H*.5);cx.lineTo(mx+180,H*.88);cx.lineTo(mx-180,H*.88);cx.lineTo(mx-8,H*.5);cx.closePath();
    cx.strokeStyle='rgba(200,180,120,0.15)';cx.lineWidth=1;cx.stroke();
    // falling grains
    const active=Math.floor(prog*grains.length);
    for(let i=0;i<active;i++){
      const g=grains[i];
      if(!g.done){
        g.y+=g.vy;
        // narrow at middle
        const neck=Math.abs(g.y-H*.5);const spread=Math.max(8,neck*.8);
        g.x=W/2+(g.x-W/2)*(spread/Math.max(spread,80));
        if(g.y>H*.85){g.done=true;g.y=H*.85-Math.random()*60;}
      }
      const shade=rnd(180,220);
      cx.beginPath();cx.arc(g.x,g.y,g.sz,0,Math.PI*2);
      cx.fillStyle=`rgba(${shade},${shade-20},${shade-60},0.7)`;cx.fill();
    }
  };
})();

(()=>{

// ─── 17 · SACRED GEOMETRY ───
(()=>{
  RENDERERS[17]=(gt,st,tot)=>{
    const cx=ctxs[17];const prog=st/tot;
    cx.fillStyle='rgba(0,0,0,0.15)';cx.fillRect(0,0,W,H);
    const ox=W/2,oy=H/2;
    // Flower of life rings
    const R=90;
    const centers=[{x:0,y:0}];
    for(let i=0;i<6;i++){centers.push({x:R*Math.cos(i*Math.PI/3),y:R*Math.sin(i*Math.PI/3)});}
    for(let i=0;i<6;i++){centers.push({x:2*R*Math.cos(i*Math.PI/3),y:2*R*Math.sin(i*Math.PI/3)});centers.push({x:R*Math.cos(i*Math.PI/3)+R*Math.cos((i+1)*Math.PI/3),y:R*Math.sin(i*Math.PI/3)+R*Math.sin((i+1)*Math.PI/3)});}
    const rot=gt*.004;
    centers.forEach((c,ci)=>{
      const revP=Math.max(0,Math.min(1,(prog-ci*.04)/.4));if(revP<=0)return;
      cx.beginPath();cx.arc(ox+c.x*Math.cos(rot)-c.y*Math.sin(rot),oy+c.x*Math.sin(rot)+c.y*Math.cos(rot),R,0,Math.PI*2);
      cx.strokeStyle=`rgba(255,200,80,${revP*.15})`;cx.lineWidth=.8;cx.stroke();
    });
    // outer rings
    [R,R*2,R*3].forEach((r,i)=>{cx.beginPath();cx.arc(ox,oy,r,0,Math.PI*2);cx.strokeStyle=`rgba(255,200,80,${(.1-i*.02)*prog})`;cx.lineWidth=.5;cx.stroke();});
    // center dot
    cx.beginPath();cx.arc(ox,oy,6,0,Math.PI*2);cx.fillStyle=`rgba(255,240,180,${prog*.8})`;cx.fill();
  };
})();

// ─── 20 · DNA HELIX ───
(()=>{
  RENDERERS[20]=(gt,st,tot)=>{
    const cx=ctxs[20];
    cx.fillStyle='rgba(0,0,0,0.14)';cx.fillRect(0,0,W,H);
    const ox=W/2,speed=gt*.03;
    const numRungs=30,spread=260,step=H/numRungs;
    for(let i=0;i<numRungs;i++){
      const y=((i*step+gt*.8)%H);
      const t2=i*.5+speed;
      const x1=ox+Math.sin(t2)*spread,x2=ox+Math.sin(t2+Math.PI)*spread;
      const depth=(Math.cos(t2)+1)/2;
      // rung
      cx.beginPath();cx.moveTo(x1,y);cx.lineTo(x2,y);
      cx.strokeStyle=`rgba(60,180,255,${depth*.25})`;cx.lineWidth=1;cx.stroke();
      // nodes
      [x1,x2].forEach((x,si)=>{
        const nc=cx.createRadialGradient(x,y,0,x,y,10);
        nc.addColorStop(0,si===0?`rgba(80,200,255,${depth*.6})`:`rgba(120,255,160,${depth*.6})`);nc.addColorStop(1,'rgba(0,0,0,0)');
        cx.fillStyle=nc;cx.fillRect(x-12,y-12,24,24);
        cx.beginPath();cx.arc(x,y,3*depth+1,0,Math.PI*2);
        cx.fillStyle=si===0?`rgba(100,220,255,${depth*.9})`:`rgba(140,255,180,${depth*.9})`;cx.fill();
      });
    }
    // backbone curves
    cx.beginPath();for(let y=0;y<=H;y+=3){const t2=y*.015+speed;cx.lineTo(ox+Math.sin(t2)*spread,y);}cx.strokeStyle='rgba(80,180,255,0.15)';cx.lineWidth=2;cx.stroke();
    cx.beginPath();for(let y=0;y<=H;y+=3){const t2=y*.015+speed+Math.PI;cx.lineTo(ox+Math.sin(t2)*spread,y);}cx.strokeStyle='rgba(120,255,160,0.15)';cx.lineWidth=2;cx.stroke();
  };
})();

// ─── 21 · TIDAL BREATH ───
(()=>{

      cx.lineTo(W,H);cx.closePath();

    // foam at top of wave
    for(let x=0;x<W;x+=rnd(20,60)){
      const y=waveY+Math.sin(x*.006+gt*.02)*30+Math.random()*4;

        cx.fillStyle=`rgba(${shade+30},${shade+20},${shade},${revP*.5})`;

  RENDERERS[25]=(gt,st,tot)=>{
    const cx=ctxs[25];
    cx.fillStyle='rgba(0,2,10,0.18)';cx.fillRect(0,0,W,H);
    // stars
    for(let i=0;i<200;i++){const sx=((i*337)%W),sy=((i*197)%(H*.45));const b=Math.sin(gt*.04+i)*.3+.7;cx.beginPath();cx.arc(sx,sy,.8,0,Math.PI*2);cx.fillStyle=`rgba(255,255,255,${b*.35})`;cx.fill();}
    bands.forEach(b=>{
      cx.beginPath();cx.moveTo(0,H);
      for(let x=0;x<=W;x+=6){
        const y=b.baseY+Math.sin(x*.004+gt*b.speed+b.ph)*b.amp+Math.sin(x*.008-gt*b.speed*.7+b.ph)*b.amp*.4;
        cx.lineTo(x,y);
      }
      cx.lineTo(W,H);cx.closePath();
      const grad=cx.createLinearGradient(0,b.baseY-b.amp,0,b.baseY+b.amp*2);
      grad.addColorStop(0,`hsla(${b.hue},90%,70%,0)`);
      grad.addColorStop(.3,`hsla(${b.hue},90%,65%,${b.al})`);
      grad.addColorStop(.7,`hsla(${b.hue+15},80%,55%,${b.al*.7})`);
      grad.addColorStop(1,`hsla(${b.hue},90%,70%,0)`);
      cx.fillStyle=grad;cx.fill();
    });
    // mountain horizon
    cx.beginPath();cx.moveTo(0,H);const mpts=[0,.12,.22,.3,.38,.5,.6,.7,.78,.88,.95,1];const mhs=[.72,.6,.68,.52,.65,.58,.62,.55,.63,.56,.6,.7];mpts.forEach((x,i)=>{cx.lineTo(x*W,mhs[i]*H);});cx.lineTo(W,H);cx.closePath();cx.fillStyle='rgba(2,4,12,0.9)';cx.fill();
  };
})();

// ─── 26 · VOID LOTUS ───
(()=>{
  RENDERERS[26]=(gt,st,tot)=>{
    const cx=ctxs[26];const prog=st/tot;
    cx.fillStyle='rgba(0,0,0,0.14)';cx.fillRect(0,0,W,H);
    const ox=W/2,oy=H/2;
    const layers=8,petalsPerLayer=8;
    for(let l=layers;l>=1;l--){
      const layerP=Math.max(0,Math.min(1,(prog-l*.08)/.35));if(layerP<=0)continue;
      const lr=40+l*50,rot=gt*.003*(l%2?1:-1)+(l*.2);
      const hue=260+l*10;
      for(let p=0;p<petalsPerLayer;p++){
        const a=(p/petalsPerLayer)*Math.PI*2+rot;
        const px1=ox+Math.cos(a)*lr*.3,py1=oy+Math.sin(a)*lr*.3;
        const px2=ox+Math.cos(a)*lr,py2=oy+Math.sin(a)*lr;
        const na=a+Math.PI/petalsPerLayer;
        const mx=ox+Math.cos(na)*lr*.7,my=oy+Math.sin(na)*lr*.7;
        cx.beginPath();cx.moveTo(ox,oy);cx.quadraticCurveTo(px1*1.2-ox*.2,py1*1.2-oy*.2,px2,py2);cx.quadraticCurveTo(mx,my,ox,oy);
        cx.fillStyle=`hsla(${hue},60%,40%,${layerP*.08})`;cx.fill();
        cx.strokeStyle=`hsla(${hue},70%,60%,${layerP*.12})`;cx.lineWidth=.6;cx.stroke();
      }
    }
    // center glow
    const cg=cx.createRadialGradient(ox,oy,0,ox,oy,60);cg.addColorStop(0,`rgba(200,160,255,${prog*.3})`);cg.addColorStop(1,'rgba(0,0,0,0)');cx.fillStyle=cg;cx.fillRect(ox-65,oy-65,130,130);
    cx.beginPath();cx.arc(ox,oy,6,0,Math.PI*2);cx.fillStyle=`rgba(240,220,255,${prog*.8})`;cx.fill();
  };
})();

// ─── 27 · SOLAR FLARE ───
(()=>{
  const flares=Array.from({length:12},(_,i)=>({angle:i/12*Math.PI*2,len:rnd(100,300),ph:Math.random()*Math.PI*2,speed:rnd(.01,.03)*(Math.random()<.5?1:-1),width:rnd(10,40)}));
  RENDERERS[27]=(gt,st,tot)=>{
    const cx=ctxs[27];
    cx.fillStyle='rgba(0,0,0,0.12)';cx.fillRect(0,0,W,H);
    const ox=W/2,oy=H/2;
    // corona
    for(let r=8;r>=1;r--){
      const cg=cx.createRadialGradient(ox,oy,r*15,ox,oy,r*20);cg.addColorStop(0,`rgba(255,${Math.floor(80+r*15)},0,${.04-r*.003})`);cg.addColorStop(1,'rgba(0,0,0,0)');cx.fillStyle=cg;cx.fillRect(0,0,W,H);
    }
    // flare arcs
    flares.forEach(f=>{
      f.angle+=f.speed;const a=f.angle+Math.sin(gt*.02+f.ph)*.4;
      const ex=ox+Math.cos(a)*f.len,ey=oy+Math.sin(a)*f.len;
      const fg=cx.createLinearGradient(ox,oy,ex,ey);fg.addColorStop(0,'rgba(255,200,50,0.4)');fg.addColorStop(1,'rgba(255,80,10,0)');
      cx.strokeStyle=fg;cx.lineWidth=f.width*(Math.sin(gt*.03+f.ph)*.3+.7);cx.lineCap='round';
      cx.beginPath();cx.moveTo(ox+Math.cos(a)*60,oy+Math.sin(a)*60);cx.quadraticCurveTo(ox+Math.cos(a+.3)*f.len*.6,oy+Math.sin(a+.3)*f.len*.6,ex,ey);cx.stroke();
    });
    // sun body
    const sg=cx.createRadialGradient(ox,oy,0,ox,oy,70);sg.addColorStop(0,'rgba(255,255,200,1)');sg.addColorStop(.4,'rgba(255,230,80,0.8)');sg.addColorStop(.7,'rgba(255,140,20,0.4)');sg.addColorStop(1,'rgba(0,0,0,0)');cx.fillStyle=sg;cx.fillRect(ox-75,oy-75,150,150);
  };
})();

// ─── 28 · FRACTAL TREE ───
(()=>{
  function drawBranch(cx,x,y,angle,len,depth,gt,prog){
    if(depth<=0||len<4)return;
    const ep=x+Math.cos(angle)*len,ey=y+Math.sin(angle)*len;
    const depthFade=depth/10;
    cx.beginPath();cx.moveTo(x,y);cx.lineTo(ep,ey);
    cx.strokeStyle=`rgba(${Math.floor(lerp(60,160,depthFade))},${Math.floor(lerp(140,220,depthFade))},${Math.floor(lerp(40,100,depthFade))},${depthFade*.6})`;
    cx.lineWidth=depth*.8;cx.stroke();
    const sway=Math.sin(gt*.015)*0.15;
    drawBranch(cx,ep,ey,angle-.4+sway,len*.68,depth-1,gt,prog);
    drawBranch(cx,ep,ey,angle+.4+sway,len*.68,depth-1,gt,prog);
  }
  RENDERERS[28]=(gt,st,tot)=>{
    const cx=ctxs[28];const prog=st/tot;
    cx.fillStyle='rgba(0,0,0,0.15)';cx.fillRect(0,0,W,H);
    const maxDepth=Math.floor(prog*11);
    if(maxDepth>=1)drawBranch(cx,W/2,H*.92,-Math.PI/2,140,Math.min(maxDepth,10),gt,prog);
    // ground mist
    const gm=cx.createLinearGradient(0,H*.85,0,H);gm.addColorStop(0,'rgba(0,0,0,0)');gm.addColorStop(1,'rgba(20,30,15,0.4)');cx.fillStyle=gm;cx.fillRect(0,H*.85,W,H*.15);
  };
})();

// ─── 29 · FINAL PEACE ───
(()=>{
  const motes=Array.from({length:200},()=>({x:rnd(W*.2,W*.8),y:rnd(H*.2,H*.8),vx:(Math.random()-.5)*.15,vy:(Math.random()-.5)*.15,sz:rnd(.5,2.5),ph:Math.random()*Math.PI*2,al:rnd(.1,.5)}));
  RENDERERS[29]=(gt,st,tot)=>{
    const cx=ctxs[29];const prog=st/tot;
    cx.fillStyle='rgba(0,0,0,0.1)';cx.fillRect(0,0,W,H);
    const ox=W/2,oy=H/2;
    // expanding rings of light
    for(let r=1;r<=6;r++){
      const rad=r*90+Math.sin(gt*.01+r)*.5*(r*10);
      cx.beginPath();cx.arc(ox,oy,rad,0,Math.PI*2);cx.strokeStyle=`rgba(255,240,200,${(.06-r*.008)*prog})`;cx.lineWidth=.5;cx.stroke();
    }
    // gentle motes
    motes.forEach(m=>{m.x+=m.vx+Math.sin(gt*.008+m.ph)*.1;m.y+=m.vy+Math.cos(gt*.008+m.ph)*.1;
      if(m.x<W*.1)m.x=W*.9;if(m.x>W*.9)m.x=W*.1;if(m.y<H*.1)m.y=H*.9;if(m.y>H*.9)m.y=H*.1;
      const b=Math.sin(gt*.02+m.ph)*.3+.7;cx.beginPath();cx.arc(m.x,m.y,m.sz,0,Math.PI*2);cx.fillStyle=`rgba(255,230,180,${m.al*b*prog})`;cx.fill();
    });
    // central radiant glow — builds through prog
    const cg=cx.createRadialGradient(ox,oy,0,ox,oy,320);
    cg.addColorStop(0,`rgba(255,240,200,${prog*.18})`);cg.addColorStop(.4,`rgba(255,200,120,${prog*.08})`);cg.addColorStop(1,'rgba(0,0,0,0)');cx.fillStyle=cg;cx.fillRect(0,0,W,H);
    // final single dot
    cx.beginPath();cx.arc(ox,oy,4+Math.sin(gt*.02)*2,0,Math.PI*2);cx.fillStyle=`rgba(255,255,240,${prog*.9})`;cx.fill();
  };
})();

// ── INIT ──
goTo(0);
document.getElementById('scene-name').textContent=SCENES[0].name;
document.getElementById('scene-counter').textContent=`Scene 1 of ${SCENES.length}`;
masterLoop();
</script>
