<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stoicism — 10 Visual Animations 1920×1080</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;font-family:sans-serif;}

#nav{
  position:fixed;top:0;left:0;right:0;z-index:999;
  display:flex;align-items:center;gap:6px;padding:8px 14px;
  background:rgba(0,0,0,0.92);border-bottom:1px solid rgba(255,255,255,0.07);
  flex-wrap:wrap;
}
#nav .label{color:rgba(255,255,255,0.25);font-size:10px;letter-spacing:.12em;margin-right:6px;text-transform:uppercase;}
#nav button{
  padding:5px 12px;border-radius:3px;border:1px solid rgba(255,255,255,0.15);
  background:transparent;color:rgba(255,255,255,0.5);font-size:11px;
  cursor:pointer;letter-spacing:.05em;transition:all .2s;
}
#nav button.active,#nav button:hover{background:rgba(255,200,80,0.12);color:#ffc850;border-color:rgba(255,200,80,0.4);}
#nav .info{margin-left:auto;color:rgba(255,255,255,0.18);font-size:10px;letter-spacing:.08em;}

#wrapper{position:fixed;transform-origin:top left;}
canvas{position:absolute;top:0;left:0;display:none;}
canvas.active{display:block;}
</style>
</head>
<body>

<div id="nav">
  <span class="label">Stoicism Visuals</span>
  <button onclick="show(0)" id="btn0" class="active">1 · Stone</button>
  <button onclick="show(1)" id="btn1">2 · Dual Orbs</button>
  <button onclick="show(2)" id="btn2">3 · Ripple Pond</button>
  <button onclick="show(3)" id="btn3">4 · Solar System</button>
  <button onclick="show(4)" id="btn4">5 · Fire→Gold</button>
  <button onclick="show(5)" id="btn5">6 · Sand Mandala</button>
  <button onclick="show(6)" id="btn6">7 · Storm Horizon</button>
  <button onclick="show(7)" id="btn7">8 · Fortress</button>
  <button onclick="show(8)" id="btn8">9 · Thread of Light</button>
  <button onclick="show(9)" id="btn9">10 · Constellation</button>
  <span class="info">1920×1080 · visual only · loop-ready</span>
</div>

<div id="wrapper">
  <canvas id="c0" width="1920" height="1080"></canvas>
  <canvas id="c1" width="1920" height="1080"></canvas>
  <canvas id="c2" width="1920" height="1080"></canvas>
  <canvas id="c3" width="1920" height="1080"></canvas>
  <canvas id="c4" width="1920" height="1080"></canvas>
  <canvas id="c5" width="1920" height="1080"></canvas>
  <canvas id="c6" width="1920" height="1080"></canvas>
  <canvas id="c7" width="1920" height="1080"></canvas>
  <canvas id="c8" width="1920" height="1080"></canvas>
  <canvas id="c9" width="1920" height="1080"></canvas>
</div>

<script>
const W=1920,H=1080;
let active=0;
const rafs={};

function scale(){
  const s=Math.min(window.innerWidth/W,(window.innerHeight-40)/H);
  const w=document.getElementById('wrapper');
  w.style.transform=`scale(${s})`;
  w.style.top='40px';
  w.style.left=((window.innerWidth-W*s)/2)+'px';
  w.style.width=W+'px';
  w.style.height=H+'px';
}
window.addEventListener('resize',scale);scale();

function show(n){
  cancelAnimationFrame(rafs[active]);
  document.getElementById('c'+active).classList.remove('active');
  document.getElementById('btn'+active).classList.remove('active');
  active=n;
  document.getElementById('c'+n).classList.add('active');
  document.getElementById('btn'+n).classList.add('active');
  SCENES[n]();
}

/* ─────────────────────────────────────────────────────
   UTILS
───────────────────────────────────────────────────── */
function ctx(n){return document.getElementById('c'+n).getContext('2d');}
function rnd(a,b){return a+Math.random()*(b-a);}
function lerp(a,b,t){return a+(b-a)*t;}

/* ─────────────────────────────────────────────────────
   0 · CRUMBLING STONE → SOLID ROCK
───────────────────────────────────────────────────── */
function scene0(){
  const cx=ctx(0);
  const N=1800;
  let t=0;
  const pts=Array.from({length:N},(_,i)=>{
    const angle=Math.random()*Math.PI*2;
    const r=rnd(0,380);
    // target: dense stone cluster
    const ta=((i/N)*Math.PI*2);
    const tr=rnd(0,160)*(1+Math.abs(Math.cos(ta*6))*0.3);
    return{
      // scattered start
      sx:W/2+Math.cos(angle)*rnd(200,900),
      sy:H/2+Math.sin(angle)*rnd(100,500),
      // solid target
      tx:W/2+Math.cos(ta)*tr,
      ty:H/2+Math.sin(ta)*tr,
      x:0,y:0,
      size:rnd(1,3.5),
      col:rnd(140,220),
      speed:rnd(0.003,0.009),
      phase:Math.random()*Math.PI*2,
    };
  });
  pts.forEach(p=>{p.x=p.sx;p.y=p.sy;});

  const CYCLE=600; // frames per loop
  function draw(){
    rafs[0]=requestAnimationFrame(draw);
    if(active!==0)return;
    t++;
    const loop=t%CYCLE;
    // 0–200: scatter→gather, 200–400: hold solid, 400–600: dissolve back
    let prog=0;
    if(loop<200) prog=loop/200;
    else if(loop<400) prog=1;
    else prog=1-(loop-400)/200;
    const ease=prog<0.5?2*prog*prog:1-Math.pow(-2*prog+2,2)/2;

    cx.fillStyle='rgba(0,0,0,0.18)';
    cx.fillRect(0,0,W,H);

    pts.forEach(p=>{
      p.x=lerp(p.sx,p.tx,ease)+Math.sin(t*0.02+p.phase)*2*(1-ease);
      p.y=lerp(p.sy,p.ty,ease)+Math.cos(t*0.02+p.phase)*2*(1-ease);
      const brightness=Math.floor(lerp(p.col*0.5,p.col,ease));
      const alpha=0.4+ease*0.5;
      cx.beginPath();
      cx.arc(p.x,p.y,p.size*(0.6+ease*0.4),0,Math.PI*2);
      cx.fillStyle=`rgba(${brightness},${brightness-10},${brightness-30},${alpha})`;
      cx.fill();
    });

    // center glow when solid
    if(ease>0.5){
      const g=cx.createRadialGradient(W/2,H/2,0,W/2,H/2,200);
      g.addColorStop(0,`rgba(255,230,180,${(ease-0.5)*0.15})`);
      g.addColorStop(1,'rgba(0,0,0,0)');
      cx.fillStyle=g;cx.fillRect(0,0,W,H);
    }
  }
  draw();
}

/* ─────────────────────────────────────────────────────
   1 · DUAL ORBS — CHAOS vs CALM
───────────────────────────────────────────────────── */
function scene1(){
  const cx=ctx(1);
  let t=0;
  const CYCLE=720;

  // chaos particles (left orb)
  const chaos=Array.from({length:300},()=>({
    a:Math.random()*Math.PI*2,
    r:rnd(20,110),
    speed:rnd(0.04,0.14)*(Math.random()<.5?1:-1),
    size:rnd(1,3),
    ra:rnd(220,255),gb:rnd(40,120),
  }));
  // calm particles (right orb)
  const calm=Array.from({length:300},()=>({
    a:Math.random()*Math.PI*2,
    r:rnd(10,100),
    speed:rnd(0.002,0.008),
    size:rnd(1,2.5),
    phase:Math.random()*Math.PI*2,
  }));

  function draw(){
    rafs[1]=requestAnimationFrame(draw);
    if(active!==1)return;
    t++;
    const loop=t%CYCLE;
    // merge progress: 0.6–1.0 of cycle
    const mergeT=loop/CYCLE;
    const mergeP=mergeT<0.55?0:Math.min(1,(mergeT-0.55)/0.35);
    const ease=mergeP<0.5?2*mergeP*mergeP:1-Math.pow(-2*mergeP+2,2)/2;

    cx.fillStyle='rgba(0,0,0,0.15)';cx.fillRect(0,0,W,H);

    // orb centers: chaos left, calm right → converge to center
    const lx=lerp(W*0.3,W/2,ease), ly=H/2;
    const rx=lerp(W*0.7,W/2,ease), ry=H/2;

    // CHAOS ORB
    chaos.forEach(p=>{
      p.a+=p.speed*(1-ease*0.7);
      const jitter=(1-ease)*(Math.random()-0.5)*6;
      const px=lx+Math.cos(p.a)*p.r*(1-ease*0.5)+jitter;
      const py=ly+Math.sin(p.a)*p.r*(1-ease*0.5)+jitter;
      cx.beginPath();cx.arc(px,py,p.size,0,Math.PI*2);
      cx.fillStyle=`rgba(${p.ra},${Math.floor(p.gb*(1-ease))},${Math.floor(40*(1-ease))},${0.6+Math.random()*0.2})`;
      cx.fill();
    });
    // chaos glow
    const cg=cx.createRadialGradient(lx,ly,0,lx,ly,130);
    cg.addColorStop(0,`rgba(255,80,20,${0.08*(1-ease)})`);
    cg.addColorStop(1,'rgba(0,0,0,0)');
    cx.fillStyle=cg;cx.fillRect(0,0,W,H);

    // CALM ORB
    calm.forEach(p=>{
      p.a+=p.speed;
      const px=rx+Math.cos(p.a+Math.sin(t*0.01+p.phase)*0.3)*p.r*(1+ease*0.3);
      const py=ry+Math.sin(p.a+Math.cos(t*0.01+p.phase)*0.3)*p.r*(1+ease*0.3);
      const blue=Math.floor(lerp(180,255,ease));
      const gold=Math.floor(lerp(0,200,ease));
      cx.beginPath();cx.arc(px,py,p.size*(0.8+ease*0.4),0,Math.PI*2);
      cx.fillStyle=`rgba(${gold},${Math.floor(lerp(150,220,ease))},${blue},${0.5+ease*0.3})`;
      cx.fill();
    });
    // calm glow
    const bg=cx.createRadialGradient(rx,ry,0,rx,ry,150);
    bg.addColorStop(0,`rgba(80,180,255,${0.06+ease*0.08})`);
    bg.addColorStop(1,'rgba(0,0,0,0)');
    cx.fillStyle=bg;cx.fillRect(0,0,W,H);

    // merged gold burst
    if(ease>0.7){
      const mg=cx.createRadialGradient(W/2,H/2,0,W/2,H/2,200);
      mg.addColorStop(0,`rgba(255,220,100,${(ease-0.7)*0.3})`);
      mg.addColorStop(1,'rgba(0,0,0,0)');
      cx.fillStyle=mg;cx.fillRect(0,0,W,H);
    }
  }
  draw();
}

/* ─────────────────────────────────────────────────────
   2 · RIPPLE POND
───────────────────────────────────────────────────── */
function scene2(){
  const cx=ctx(2);
  let t=0;
  const ripples=[];
  let nextDrop=80;

  // subtle caustic-like shimmer points
  const shimmer=Array.from({length:120},()=>({
    x:rnd(100,W-100),y:rnd(200,H-200),
    phase:Math.random()*Math.PI*2,
    size:rnd(0.5,2),
  }));

  function addRipple(){
    // random drop or center
    const cx2=Math.random()<0.3?W/2:rnd(W*0.2,W*0.8);
    const cy2=Math.random()<0.3?H/2:rnd(H*0.25,H*0.75);
    ripples.push({x:cx2,y:cy2,r:0,maxR:rnd(180,420),alpha:0.6,speed:rnd(1.2,2.4)});
  }

  function draw(){
    rafs[2]=requestAnimationFrame(draw);
    if(active!==2)return;
    t++;

    // dark water bg
    cx.fillStyle='rgba(2,8,18,0.25)';cx.fillRect(0,0,W,H);

    // horizon depth gradient
    const hg=cx.createLinearGradient(0,0,0,H);
    hg.addColorStop(0,'rgba(5,15,35,0.04)');
    hg.addColorStop(0.5,'rgba(10,25,50,0.02)');
    hg.addColorStop(1,'rgba(2,8,20,0.04)');
    cx.fillStyle=hg;cx.fillRect(0,0,W,H);

    // shimmer
    shimmer.forEach(s=>{
      const b=(Math.sin(t*0.03+s.phase)+1)/2;
      cx.beginPath();cx.arc(s.x,s.y,s.size,0,Math.PI*2);
      cx.fillStyle=`rgba(120,180,255,${b*0.06})`;cx.fill();
    });

    // ripples
    if(t>=nextDrop){addRipple();nextDrop=t+rnd(60,180);}
    for(let i=ripples.length-1;i>=0;i--){
      const rp=ripples[i];
      rp.r+=rp.speed;
      rp.alpha*=0.985;
      if(rp.r>rp.maxR||rp.alpha<0.01){ripples.splice(i,1);continue;}
      const fade=rp.alpha*(1-rp.r/rp.maxR);

      // multiple concentric rings per ripple
      for(let ring=0;ring<3;ring++){
        const ro=rp.r-ring*18;
        if(ro<=0)continue;
        cx.beginPath();
        cx.ellipse(rp.x,rp.y,ro,ro*0.28,0,0,Math.PI*2);
        cx.strokeStyle=`rgba(100,170,255,${fade*(1-ring*0.3)})`;
        cx.lineWidth=1-ring*0.2;cx.stroke();
      }

      // center drop splash (small)
      if(rp.r<12){
        cx.beginPath();cx.arc(rp.x,rp.y,rp.r*0.4,0,Math.PI*2);
        cx.fillStyle=`rgba(180,220,255,${rp.alpha*0.3})`;cx.fill();
      }
    }

    // moonlight reflection strip
    const mr=cx.createLinearGradient(W/2-80,0,W/2+80,0);
    mr.addColorStop(0,'rgba(255,255,255,0)');
    mr.addColorStop(0.5,`rgba(200,230,255,${0.015+Math.sin(t*0.008)*0.005})`);
    mr.addColorStop(1,'rgba(255,255,255,0)');
    cx.fillStyle=mr;cx.fillRect(W/2-80,0,160,H);
  }
  draw();
}

/* ─────────────────────────────────────────────────────
   3 · SOLAR SYSTEM OF CIRCLES
───────────────────────────────────────────────────── */
function scene3(){
  const cx=ctx(3);
  let t=0;

  const orbits=[
    {r:160,speed:0.025,size:14,col:'220,80,60',trail:true},
    {r:240,speed:-0.018,size:10,col:'200,120,40',trail:true},
    {r:320,speed:0.032,size:18,col:'180,60,180',trail:true},
    {r:400,speed:-0.014,size:12,col:'80,160,220',trail:true},
    {r:460,speed:0.022,size:8, col:'200,200,60',trail:true},
    {r:520,speed:-0.009,size:16,col:'60,200,140',trail:true},
    {r:570,speed:0.016,size:7, col:'200,80,100',trail:true},
  ];
  orbits.forEach(o=>{o.angle=Math.random()*Math.PI*2;});

  const trails=orbits.map(()=>[]);

  function draw(){
    rafs[3]=requestAnimationFrame(draw);
    if(active!==3)return;
    t++;

    cx.fillStyle='rgba(0,0,0,0.12)';cx.fillRect(0,0,W,H);

    const ox=W/2,oy=H/2;

    // orbit rings
    orbits.forEach(o=>{
      cx.beginPath();cx.arc(ox,oy,o.r,0,Math.PI*2);
      cx.strokeStyle='rgba(255,255,255,0.04)';cx.lineWidth=0.5;cx.stroke();
    });

    // center "self" — perfectly still
    // pulse glow
    const pg=Math.sin(t*0.03)*0.5+0.5;
    const sg=cx.createRadialGradient(ox,oy,0,ox,oy,80);
    sg.addColorStop(0,`rgba(255,220,160,${0.25+pg*0.1})`);
    sg.addColorStop(0.4,`rgba(255,180,80,${0.1+pg*0.05})`);
    sg.addColorStop(1,'rgba(0,0,0,0)');
    cx.fillStyle=sg;cx.fillRect(0,0,W,H);
    cx.beginPath();cx.arc(ox,oy,22,0,Math.PI*2);
    cx.fillStyle=`rgba(255,230,180,${0.9+pg*0.1})`;cx.fill();
    cx.beginPath();cx.arc(ox,oy,14,0,Math.PI*2);
    cx.fillStyle='rgba(255,255,240,1)';cx.fill();

    // orbiting chaos bodies
    orbits.forEach((o,i)=>{
      o.angle+=o.speed;
      const px=ox+Math.cos(o.angle)*o.r;
      const py=oy+Math.sin(o.angle)*o.r;

      // trail
      trails[i].push({x:px,y:py});
      if(trails[i].length>40)trails[i].shift();
      trails[i].forEach((tp,ti)=>{
        const fa=ti/trails[i].length;
        cx.beginPath();cx.arc(tp.x,tp.y,o.size*0.4*fa,0,Math.PI*2);
        cx.fillStyle=`rgba(${o.col},${fa*0.3})`;cx.fill();
      });

      // body with jitter (chaotic)
      const jx=px+(Math.random()-0.5)*3;
      const jy=py+(Math.random()-0.5)*3;
      cx.beginPath();cx.arc(jx,jy,o.size,0,Math.PI*2);
      cx.fillStyle=`rgba(${o.col},0.85)`;cx.fill();

      // inner chaos shimmer
      cx.beginPath();cx.arc(jx-o.size*0.3,jy-o.size*0.3,o.size*0.35,0,Math.PI*2);
      cx.fillStyle=`rgba(255,255,255,0.3)`;cx.fill();
    });
  }
  draw();
}

/* ─────────────────────────────────────────────────────
   4 · FIRE → GOLD
───────────────────────────────────────────────────── */
function scene4(){
  const cx=ctx(4);
  let t=0;
  const CYCLE=900;
  const N=600;

  const pts=Array.from({length:N},(_,i)=>({
    x:rnd(W*0.25,W*0.75),
    y:H+rnd(0,200),
    vx:(Math.random()-0.5)*1.2,
    vy:-rnd(1.5,4.5),
    life:rnd(0.4,1),
    maxLife:rnd(80,200),
    age:0,
    size:rnd(2,8),
    phase:Math.random()*Math.PI*2,
  }));

  function resetPt(p){
    p.x=rnd(W*0.2,W*0.8);
    p.y=H*0.9+rnd(0,80);
    p.vx=(Math.random()-0.5)*1.5;
    p.vy=-rnd(1.5,5);
    p.age=0;
    p.maxLife=rnd(80,200);
    p.size=rnd(2,8);
  }

  function draw(){
    rafs[4]=requestAnimationFrame(draw);
    if(active!==4)return;
    t++;
    const loop=t%CYCLE;
    const prog=loop/CYCLE; // 0→1
    // fire→gold transition: 0–0.5 fire, 0.5–1 gold drift
    const transP=Math.max(0,Math.min(1,(prog-0.35)/0.4));
    const ease=transP<0.5?2*transP*transP:1-Math.pow(-2*transP+2,2)/2;

    cx.fillStyle=`rgba(${Math.floor(lerp(0,2,ease))},${Math.floor(lerp(0,4,ease))},${Math.floor(lerp(0,8,ease))},0.14)`;
    cx.fillRect(0,0,W,H);

    // ground glow
    const gg=cx.createRadialGradient(W/2,H*0.85,0,W/2,H*0.85,W*0.4);
    gg.addColorStop(0,`rgba(${Math.floor(lerp(255,200,ease))},${Math.floor(lerp(80,160,ease))},${Math.floor(lerp(10,60,ease))},${0.12-ease*0.08})`);
    gg.addColorStop(1,'rgba(0,0,0,0)');
    cx.fillStyle=gg;cx.fillRect(0,0,W,H);

    pts.forEach(p=>{
      p.age++;
      if(p.age>p.maxLife)resetPt(p);
      p.x+=p.vx+Math.sin(t*0.02+p.phase)*0.8;
      p.vy+=-0.015; // slight upward accel
      p.y+=p.vy*(1+ease*0.3);

      const life=1-(p.age/p.maxLife);
      const sway=Math.sin(t*0.04+p.phase);

      // color: fire orange → gold → ascending sparkle
      let r,g,b;
      if(ease<0.5){
        // fire
        const fl=p.age/p.maxLife;
        r=255;
        g=Math.floor(lerp(200,40,fl));
        b=Math.floor(lerp(20,0,fl));
      } else {
        // gold drift
        r=255;
        g=Math.floor(lerp(180,220,life));
        b=Math.floor(lerp(20,100,ease)*life);
      }

      const sz=p.size*(0.3+life*0.7);
      cx.beginPath();
      cx.arc(p.x+sway*4*(1-ease),p.y,sz,0,Math.PI*2);
      cx.fillStyle=`rgba(${r},${g},${b},${life*(0.5+ease*0.3)})`;
      cx.fill();
    });

    // bloom center
    const bc=cx.createRadialGradient(W/2,H*0.5,0,W/2,H*0.5,300);
    bc.addColorStop(0,`rgba(255,200,80,${ease*0.12})`);
    bc.addColorStop(1,'rgba(0,0,0,0)');
    cx.fillStyle=bc;cx.fillRect(0,0,W,H);
  }
  draw();
}

/* ─────────────────────────────────────────────────────
   5 · BREATHING SAND MANDALA
───────────────────────────────────────────────────── */
function scene5(){
  const cx=ctx(5);
  let t=0;
  const CYCLE=1200;

  function drawMandala(progress,alpha){
    const ox=W/2,oy=H/2;
    const layers=[
      {petals:8, r:70,  innerR:20, speed:0.5},
      {petals:12,r:130, innerR:60, speed:-0.35},
      {petals:16,r:200, innerR:120,speed:0.25},
      {petals:20,r:275, innerR:190,speed:-0.18},
      {petals:24,r:355, innerR:265,speed:0.12},
      {petals:32,r:440, innerR:350,speed:-0.08},
    ];

    layers.forEach((l,li)=>{
      const layerP=Math.max(0,Math.min(1,(progress-li*0.12)/0.35));
      if(layerP<=0)return;
      const angle0=t*l.speed*0.01;

      for(let p=0;p<l.petals;p++){
        const a=(p/l.petals)*Math.PI*2+angle0;
        const na=a+Math.PI/l.petals;

        // petal (two arcs)
        const px1=ox+Math.cos(a)*l.r,py1=oy+Math.sin(a)*l.r;
        const px2=ox+Math.cos(na)*l.r,py2=oy+Math.sin(na)*l.r;
        const mid=Math.sqrt((px2-px1)**2+(py2-py1)**2)*0.6;

        cx.beginPath();
        cx.moveTo(ox+Math.cos(a)*l.innerR,oy+Math.sin(a)*l.innerR);
        cx.quadraticCurveTo(px1,py1,ox+Math.cos(na)*l.innerR,oy+Math.sin(na)*l.innerR);
        cx.strokeStyle=`rgba(255,200,80,${layerP*alpha*(0.15+li*0.02)})`;
        cx.lineWidth=0.8;
        cx.stroke();

        // dots at petal tips
        cx.beginPath();cx.arc(px1,py1,1.5,0,Math.PI*2);
        cx.fillStyle=`rgba(255,220,120,${layerP*alpha*0.5})`;cx.fill();
      }
    });

    // center circles
    [12,28,48,72].forEach((r,i)=>{
      const cp=Math.max(0,Math.min(1,(progress-0.1*i)/0.3));
      if(cp<=0)return;
      cx.beginPath();cx.arc(ox,oy,r,0,Math.PI*2);
      cx.strokeStyle=`rgba(255,220,100,${cp*alpha*0.4})`;cx.lineWidth=0.8;cx.stroke();
    });
    cx.beginPath();cx.arc(ox,oy,5,0,Math.PI*2);
    cx.fillStyle=`rgba(255,240,180,${progress*alpha*0.8})`;cx.fill();
  }

  function draw(){
    rafs[5]=requestAnimationFrame(draw);
    if(active!==5)return;
    t++;
    const loop=t%CYCLE;
    const p=loop/CYCLE;
    // build 0–0.45, hold 0.45–0.55, dissolve 0.55–1
    let buildP,alpha;
    if(p<0.45){buildP=p/0.45;alpha=1;}
    else if(p<0.55){buildP=1;alpha=1;}
    else{buildP=1;alpha=1-(p-0.55)/0.45;}

    cx.fillStyle='rgba(4,2,0,0.2)';cx.fillRect(0,0,W,H);
    drawMandala(buildP,alpha);

    // subtle background glow
    const bg=cx.createRadialGradient(W/2,H/2,0,W/2,H/2,600);
    bg.addColorStop(0,`rgba(80,40,0,${buildP*alpha*0.06})`);
    bg.addColorStop(1,'rgba(0,0,0,0)');
    cx.fillStyle=bg;cx.fillRect(0,0,W,H);
  }
  draw();
}

/* ─────────────────────────────────────────────────────
   6 · STORM → STILL HORIZON
───────────────────────────────────────────────────── */
function scene6(){
  const cx=ctx(6);
  let t=0;
  const CYCLE=960;

  const clouds=Array.from({length:18},(_,i)=>({
    x:rnd(0,W),y:rnd(0,H*0.7),
    w:rnd(200,600),h:rnd(80,220),
    vx:rnd(-1.5,1.5)*(i%2?1:-1),
    vy:rnd(-0.4,0.4),
    alpha:rnd(0.3,0.7),
    rot:rnd(-0.3,0.3),
  }));

  // lightning state
  let lightning={active:false,x:0,t:0,next:80};

  function draw(){
    rafs[6]=requestAnimationFrame(draw);
    if(active!==6)return;
    t++;
    const loop=t%CYCLE;
    const prog=loop/CYCLE;
    // storm 0–0.5, clear 0.5–1
    const calmP=Math.max(0,Math.min(1,(prog-0.45)/0.4));
    const ease=calmP<0.5?2*calmP*calmP:1-Math.pow(-2*calmP+2,2)/2;

    // sky color
    const r=Math.floor(lerp(8,12,ease)),g2=Math.floor(lerp(8,18,ease)),b=Math.floor(lerp(18,32,ease));
    cx.fillStyle=`rgb(${r},${g2},${b})`;cx.fillRect(0,0,W,H);

    // horizon glow (appears as calm)
    if(ease>0.1){
      const hg=cx.createLinearGradient(0,H*0.5,0,H);
      hg.addColorStop(0,`rgba(255,160,60,${ease*0.15})`);
      hg.addColorStop(0.4,`rgba(255,100,30,${ease*0.08})`);
      hg.addColorStop(1,'rgba(0,0,0,0)');
      cx.fillStyle=hg;cx.fillRect(0,0,W,H);

      // horizon line
      cx.beginPath();cx.moveTo(0,H*0.62);cx.lineTo(W,H*0.62);
      cx.strokeStyle=`rgba(255,180,80,${ease*0.4})`;cx.lineWidth=1;cx.stroke();
    }

    // clouds
    clouds.forEach(c=>{
      c.x+=c.vx*(1-ease*0.95);
      c.y+=c.vy*(1-ease*0.95);
      if(c.x>W+c.w)c.x=-c.w;if(c.x<-c.w)c.x=W+c.w;
      if(c.y>H*0.7+c.h)c.y=-c.h;if(c.y<-c.h)c.y=H*0.7+c.h;

      const targetY=H*1.2; // drift below screen
      const cy2=lerp(c.y,targetY,ease);

      cx.save();cx.translate(c.x+c.w/2,cy2+c.h/2);cx.rotate(c.rot*(1-ease));
      cx.beginPath();cx.ellipse(0,0,c.w/2,c.h/2,0,0,Math.PI*2);
      cx.fillStyle=`rgba(20,20,35,${c.alpha*(1-ease*0.98)})`;
      cx.fill();cx.restore();
    });

    // lightning
    if(!lightning.active&&t>=lightning.next&&ease<0.3){
      lightning.active=true;lightning.x=rnd(W*0.2,W*0.8);lightning.t=0;
      lightning.next=t+rnd(60,200);
    }
    if(lightning.active){
      lightning.t++;
      if(lightning.t<8){
        cx.fillStyle=`rgba(220,230,255,${0.12-lightning.t*0.015})`;
        cx.fillRect(0,0,W,H);
        // bolt
        let bx=lightning.x,by=0;
        cx.beginPath();cx.moveTo(bx,by);
        cx.strokeStyle=`rgba(220,240,255,${0.8-lightning.t*0.1})`;cx.lineWidth=2;
        while(by<H*0.7){
          bx+=(Math.random()-0.5)*60;by+=rnd(20,60);
          cx.lineTo(bx,by);
        }
        cx.stroke();
      } else {lightning.active=false;}
    }

    // rain (storm phase)
    if(ease<0.5){
      const rainA=0.06*(1-ease*2);
      for(let i=0;i<80;i++){
        const rx=((i*97+t*3)%W);
        const ry=((i*137+t*4)%(H*0.65));
        cx.beginPath();cx.moveTo(rx,ry);cx.lineTo(rx-4,ry+18);
        cx.strokeStyle=`rgba(150,180,220,${rainA})`;cx.lineWidth=0.5;cx.stroke();
      }
    }

    // stars appear as calm
    if(ease>0.4){
      for(let i=0;i<120;i++){
        const sx=((i*337)%W),sy=((i*197)%(H*0.55));
        const sb=Math.sin(t*0.05+i)*0.4+0.6;
        cx.beginPath();cx.arc(sx,sy,0.8,0,Math.PI*2);
        cx.fillStyle=`rgba(255,255,255,${(ease-0.4)*1.5*sb*0.6})`;cx.fill();
      }
    }
  }
  draw();
}

/* ─────────────────────────────────────────────────────
   7 · FORTRESS WALLS
───────────────────────────────────────────────────── */
function scene7(){
  const cx=ctx(7);
  let t=0;
  const CYCLE=900;

  // Define blocks for a fortress silhouette
  function getFortressBlocks(){
    const blocks=[];
    const baseY=H*0.65;
    const layers=[
      // bottom base
      {y:0,count:18,w:108,h:55,gapY:0},
      // second layer
      {y:55,count:14,w:110,h:58,gapY:0},
      // third layer
      {y:113,count:10,w:124,h:60,gapY:0},
      // fourth
      {y:173,count:7,w:130,h:62,gapY:0},
      // fifth
      {y:235,count:5,w:130,h:65,gapY:0},
      // top battlements
      {y:300,count:9,w:56,h:45,gapY:0,crenels:true},
    ];
    layers.forEach(l=>{
      const totalW=l.count*l.w;
      const startX=(W-totalW)/2;
      for(let i=0;i<l.count;i++){
        if(l.crenels&&i%2===1)continue;
        blocks.push({
          x:startX+i*l.w,
          finalY:baseY-l.y-l.h,
          w:l.w-2,h:l.h,
          layer:layers.indexOf(l),
          i:i,
        });
      }
    });
    return blocks;
  }
  const blocks=getFortressBlocks();

  function draw(){
    rafs[7]=requestAnimationFrame(draw);
    if(active!==7)return;
    t++;
    const loop=t%CYCLE;
    const prog=loop/CYCLE;
    // rise 0–0.45, hold 0.45–1
    const riseP=Math.min(1,prog/0.45);
    const ease=riseP<0.5?2*riseP*riseP:1-Math.pow(-2*riseP+2,2)/2;

    cx.fillStyle='rgba(0,0,0,0.15)';cx.fillRect(0,0,W,H);

    // ambient ground
    const gg=cx.createLinearGradient(0,H*0.6,0,H);
    gg.addColorStop(0,'rgba(30,25,15,0.3)');gg.addColorStop(1,'rgba(0,0,0,0)');
    cx.fillStyle=gg;cx.fillRect(0,0,W,H);

    blocks.forEach(b=>{
      // each layer rises with slight stagger
      const layerDelay=b.layer*0.08;
      const lp=Math.max(0,Math.min(1,(riseP-layerDelay)/(1-layerDelay*0.5)));
      const le=lp<0.5?2*lp*lp:1-Math.pow(-2*lp+2,2)/2;
      const currentY=lerp(H+60,b.finalY,le);

      // stone texture suggestion
      const shade=Math.floor(lerp(40,75,le)+(b.i%3)*8);
      cx.fillStyle=`rgba(${shade},${shade-5},${shade-12},${0.7+le*0.25})`;
      cx.fillRect(b.x,currentY,b.w,b.h);

      // top highlight
      cx.fillStyle=`rgba(180,170,140,${le*0.12})`;
      cx.fillRect(b.x,currentY,b.w,2);

      // side shadow
      cx.fillStyle=`rgba(0,0,0,${0.3*le})`;
      cx.fillRect(b.x+b.w-3,currentY,3,b.h);

      // mortar lines
      cx.strokeStyle=`rgba(20,18,12,${le*0.4})`;cx.lineWidth=1;
      cx.strokeRect(b.x,currentY,b.w,b.h);
    });

    // inner glow once built
    if(ease>0.7){
      const ig=cx.createRadialGradient(W/2,H*0.45,0,W/2,H*0.45,250);
      ig.addColorStop(0,`rgba(255,200,80,${(ease-0.7)*0.12})`);
      ig.addColorStop(1,'rgba(0,0,0,0)');
      cx.fillStyle=ig;cx.fillRect(0,0,W,H);
    }

    // ground line
    cx.beginPath();cx.moveTo(0,H*0.65);cx.lineTo(W,H*0.65);
    cx.strokeStyle=`rgba(100,90,60,${ease*0.3})`;cx.lineWidth=1;cx.stroke();
  }
  draw();
}

/* ─────────────────────────────────────────────────────
   8 · THREAD OF LIGHT THROUGH DARKNESS
───────────────────────────────────────────────────── */
function scene8(){
  const cx=ctx(8);
  let t=0;

  // dark turbulent particles
  const dark=Array.from({length:500},()=>({
    x:rnd(0,W),y:rnd(0,H),
    vx:(Math.random()-0.5)*0.6,
    vy:(Math.random()-0.5)*0.6,
    size:rnd(1,4),
    phase:Math.random()*Math.PI*2,
    alpha:rnd(0.05,0.25),
  }));

  // thread path control points (wander slowly)
  const ctrl=[
    {x:W*0.1,y:H*0.5,tx:W*0.1,ty:H*0.5},
    {x:W*0.35,y:H*0.4,tx:W*0.35,ty:H*0.4},
    {x:W*0.6,y:H*0.55,tx:W*0.6,ty:H*0.55},
    {x:W*0.8,y:H*0.45,tx:W*0.8,ty:H*0.45},
    {x:W*0.95,y:H*0.5,tx:W*0.95,ty:H*0.5},
  ];

  function draw(){
    rafs[8]=requestAnimationFrame(draw);
    if(active!==8)return;
    t++;

    cx.fillStyle='rgba(0,0,0,0.14)';cx.fillRect(0,0,W,H);

    // wander control points
    ctrl.forEach((c,i)=>{
      if(i===0||i===ctrl.length-1)return; // keep endpoints fixed
      c.tx+=Math.sin(t*0.007+i*1.3)*0.5;
      c.ty+=Math.cos(t*0.009+i*0.9)*0.5;
      c.tx=Math.max(W*0.1,Math.min(W*0.9,c.tx));
      c.ty=Math.max(H*0.2,Math.min(H*0.8,c.ty));
      c.x=lerp(c.x,c.tx,0.02);
      c.y=lerp(c.y,c.ty,0.02);
    });

    // dark particles — avoid the thread path
    dark.forEach(p=>{
      p.x+=p.vx+Math.sin(t*0.015+p.phase)*0.3;
      p.y+=p.vy+Math.cos(t*0.012+p.phase)*0.3;
      if(p.x<0)p.x=W;if(p.x>W)p.x=0;
      if(p.y<0)p.y=H;if(p.y>H)p.y=0;
      cx.beginPath();cx.arc(p.x,p.y,p.size,0,Math.PI*2);
      cx.fillStyle=`rgba(30,25,40,${p.alpha})`;cx.fill();
    });

    // thread glow (wide soft)
    cx.beginPath();
    cx.moveTo(ctrl[0].x,ctrl[0].y);
    for(let i=1;i<ctrl.length-1;i++){
      const mx=(ctrl[i].x+ctrl[i+1].x)/2;
      const my=(ctrl[i].y+ctrl[i+1].y)/2;
      cx.quadraticCurveTo(ctrl[i].x,ctrl[i].y,mx,my);
    }
    cx.lineTo(ctrl[ctrl.length-1].x,ctrl[ctrl.length-1].y);

    // outer glow
    cx.strokeStyle='rgba(255,220,120,0.04)';cx.lineWidth=30;cx.stroke();
    cx.strokeStyle='rgba(255,200,100,0.08)';cx.lineWidth=14;cx.stroke();
    cx.strokeStyle='rgba(255,240,180,0.15)';cx.lineWidth=6;cx.stroke();
    // core thread
    cx.strokeStyle='rgba(255,255,220,0.9)';cx.lineWidth=1.5;cx.stroke();

    // light particles along thread
    const seg=80;
    for(let s=0;s<=seg;s++){
      const u=s/seg;
      // cubic bezier approximation
      let bx=ctrl[0].x,by=ctrl[0].y;
      const n=ctrl.length-1;
      for(let k=0;k<n;k++){
        const t2=u;
        // simple linear interpolation along segments
      }
      // sample point on path
      const si=Math.floor(u*(ctrl.length-1));
      const st=u*(ctrl.length-1)-si;
      if(si>=ctrl.length-1)continue;
      const px=lerp(ctrl[si].x,ctrl[si+1].x,st);
      const py=lerp(ctrl[si].y,ctrl[si+1].y,st);
      const sparkle=Math.sin(t*0.1+s*0.4)*0.5+0.5;
      if(sparkle>0.7&&Math.random()<0.3){
        cx.beginPath();cx.arc(px,py,rnd(0.5,2),0,Math.PI*2);
        cx.fillStyle=`rgba(255,250,220,${sparkle*0.8})`;cx.fill();
      }
    }
  }
  draw();
}

/* ─────────────────────────────────────────────────────
   9 · CONSTELLATION PATH
───────────────────────────────────────────────────── */
function scene9(){
  const cx=ctx(9);
  let t=0;
  const CYCLE=1080;

  // stars
  const stars=Array.from({length:280},(_,i)=>({
    x:rnd(60,W-60),y:rnd(60,H-60),
    size:rnd(0.5,2.2),
    twinkle:Math.random()*Math.PI*2,
    speed:rnd(0.02,0.06),
    alpha:rnd(0.1,0.5),
  }));

  // constellation nodes — form a winding path
  const nodes=[
    {x:W*0.08,y:H*0.5},
    {x:W*0.18,y:H*0.3},
    {x:W*0.28,y:H*0.55},
    {x:W*0.38,y:H*0.25},
    {x:W*0.48,y:H*0.5},
    {x:W*0.55,y:H*0.7},
    {x:W*0.63,y:H*0.38},
    {x:W*0.72,y:H*0.6},
    {x:W*0.8, y:H*0.28},
    {x:W*0.88,y:H*0.5},
    {x:W*0.94,y:H*0.42},
  ];

  function draw(){
    rafs[9]=requestAnimationFrame(draw);
    if(active!==9)return;
    t++;
    const loop=t%CYCLE;
    const prog=loop/CYCLE;
    // reveal 0–0.6, hold 0.6–0.85, dissolve 0.85–1
    let revP,alpha;
    if(prog<0.6){revP=prog/0.6;alpha=1;}
    else if(prog<0.85){revP=1;alpha=1;}
    else{revP=1;alpha=1-(prog-0.85)/0.15;}

    cx.fillStyle='rgba(0,0,0,0.12)';cx.fillRect(0,0,W,H);

    // background stars
    stars.forEach(s=>{
      s.twinkle+=s.speed;
      const tb=Math.sin(s.twinkle)*0.4+0.6;
      cx.beginPath();cx.arc(s.x,s.y,s.size,0,Math.PI*2);
      cx.fillStyle=`rgba(255,255,255,${s.alpha*tb*alpha})`;cx.fill();
    });

    // total connections to draw
    const totalLines=nodes.length-1;
    const linesShown=revP*totalLines;

    // draw lines progressively
    for(let i=0;i<totalLines;i++){
      const lp=Math.max(0,Math.min(1,linesShown-i));
      if(lp<=0)continue;
      const a=nodes[i],b=nodes[i+1];
      cx.beginPath();
      cx.moveTo(a.x,a.y);
      cx.lineTo(lerp(a.x,b.x,lp),lerp(a.y,b.y,lp));
      cx.strokeStyle=`rgba(180,220,255,${0.35*alpha})`;cx.lineWidth=1;cx.stroke();

      // glow around line
      cx.strokeStyle=`rgba(120,180,255,${0.08*alpha})`;cx.lineWidth=6;cx.stroke();
    }

    // constellation nodes
    nodes.forEach((n,i)=>{
      const np=Math.max(0,Math.min(1,revP*totalLines-i+1));
      if(np<=0)return;
      const pulse=Math.sin(t*0.04+i*0.7)*0.3+0.7;

      // outer glow
      const ng=cx.createRadialGradient(n.x,n.y,0,n.x,n.y,22);
      ng.addColorStop(0,`rgba(160,210,255,${np*alpha*0.25*pulse})`);
      ng.addColorStop(1,'rgba(0,0,0,0)');
      cx.fillStyle=ng;cx.fillRect(n.x-25,n.y-25,50,50);

      // star node
      cx.beginPath();cx.arc(n.x,n.y,3+pulse*1.5,0,Math.PI*2);
      cx.fillStyle=`rgba(220,240,255,${np*alpha*0.9})`;cx.fill();
      cx.beginPath();cx.arc(n.x,n.y,1.5,0,Math.PI*2);
      cx.fillStyle=`rgba(255,255,255,${np*alpha})`;cx.fill();
    });

    // travelling light along path
    if(revP>0.05){
      const travelP=(t%300)/300;
      const totalN=nodes.length-1;
      const ti=Math.floor(travelP*totalN);
      const tf=travelP*totalN-ti;
      if(ti<totalN){
        const ta=nodes[ti],tb2=nodes[ti+1];
        const tx=lerp(ta.x,tb2.x,tf),ty=lerp(ta.y,tb2.y,tf);
        const tg=cx.createRadialGradient(tx,ty,0,tx,ty,18);
        tg.addColorStop(0,`rgba(255,240,180,${alpha*0.8})`);
        tg.addColorStop(1,'rgba(0,0,0,0)');
        cx.fillStyle=tg;cx.fillRect(tx-20,ty-20,40,40);
        cx.beginPath();cx.arc(tx,ty,3,0,Math.PI*2);
        cx.fillStyle=`rgba(255,255,200,${alpha})`;cx.fill();
      }
    }
  }
  draw();
}

const SCENES=[scene0,scene1,scene2,scene3,scene4,scene5,scene6,scene7,scene8,scene9];
